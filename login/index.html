<!DOCTYPE html>
<html>

<head>

<title>DCA System Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#eef2f7;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
border-radius:12px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.title{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#007bff;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
font-size:13px;
text-align:center;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="box">

<div class="title">
<i class="fa fa-lock"></i> System Login
</div>

<input id="user" placeholder="User ID">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">
<i class="fa fa-sign-in"></i> Login
</button>

<div class="error" id="err">
Invalid Login
</div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbymhAGb9ijuqzrxNvxl69mTJM9KALsytHAtJIcwrNcbiHWBy8Zo3IRu_LsvqRRbjIUs/exec";

/* SESSION TIMEOUT (MINUTES) */

const SESSION_TIMEOUT = 10;

/* boleh tukar:
5
10
30
*/

function login(){

const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

if(!user || !pass){
showError();
return;
}

fetch(api+"?action=login&user="+user+"&pass="+pass)

.then(res=>res.json())

.then(data=>{

if(data.status=="OK"){

/* SAVE SESSION */

localStorage.setItem("user",data.user);
localStorage.setItem("role",data.role);
localStorage.setItem("branch",data.branch);

/* SAVE LAST ACTIVITY */

localStorage.setItem("lastActivity",Date.now());

/* SAVE SESSION TIME */

localStorage.setItem("timeout",SESSION_TIMEOUT);

/* REDIRECT */

window.location="lock.html";

}else{

showError();

}

});

}

function showError(){

document.getElementById("err").style.display="block";

}

</script>

</body>
</html>
