<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agency Contact Info Submission</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== BASE ===== */
html, body { height:100%; margin:0; }
body{
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top,#f4f8ff,#eef2f5);
  padding:20px;
  color:#000;
}

/* ===== CONTAINER ===== */
.container{
  max-width:420px;
  margin:auto;
  background:#fff;
  padding:22px 22px 26px;
  border-radius:14px;
  box-shadow:
    0 10px 25px rgba(0,0,0,.08),
    0 2px 6px rgba(0,0,0,.04);
  position:relative;
  animation:fade .3s ease;
}

.container::before{
  content:"";
  position:absolute;
  top:0; left:0;
  height:4px; width:100%;
  background:linear-gradient(90deg,#1e88e5,#42a5f5);
  border-radius:14px 14px 0 0;
}

.success-container{
  text-align:center;
  padding-top:26px;
  animation:successFade .5s ease;
}

/* ===== HEADER ===== */
.form-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
  padding-bottom:12px;
  border-bottom:1px solid #eee;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
  background:linear-gradient(135deg,#1e88e5,#42a5f5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:#fff;
}

.title{ font-size:15px; font-weight:bold; }
.subtitle{ font-size:11px; color:#777; }

/* ===== TEXT ===== */
h2{ text-align:center; margin:6px 0 12px }

label{
  font-size:12px;
  color:#555;
  font-weight:bold;
}

.req{ color:#e53935 }

/* ===== INPUT ===== */
.input-wrap{ position:relative }

.input-wrap span{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  opacity:.6;
}

input{
  width:100%;
  padding:12px 12px 12px 36px;
  margin:6px 0;
  border:1px solid #dcdcdc;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
  transition:.2s;
}

input:hover{ border-color:#90caf9; }

input:focus{
  border-color:#1e88e5;
  box-shadow:0 0 0 2px rgba(30,136,229,.15);
  transform:scale(1.01);
  outline:none;
}

input.error{
  border-color:#e53935;
  background:#fff5f5;
}

.errorText{
  font-size:11px;
  color:#e53935;
  display:none;
  margin-bottom:6px;
}

/* ===== SHAKE ===== */
@keyframes shake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}
  60%{transform:translateX(-8px)}
  80%{transform:translateX(8px)}
  100%{transform:translateX(0)}
}

.shake{
  animation:shake .45s;
  box-shadow:0 0 0 2px rgba(229,57,53,.25);
}

/* ===== SECTION ===== */
.section-title{
  margin-top:18px;
  margin-bottom:8px;
  font-size:12px;
  font-weight:bold;
  color:#1e88e5;
  text-transform:uppercase;
  letter-spacing:.5px;
  border-left:4px solid #1e88e5;
  padding-left:10px;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:8px;
  font-size:16px;
  color:#fff;
  background:#90caf9;
  cursor:not-allowed;
  opacity:.6;
}

button.enabled{
  background:linear-gradient(135deg,#1e88e5,#1976d2);
  cursor:pointer;
  opacity:1;
  box-shadow:0 4px 12px rgba(30,136,229,.25);
}

button.enabled:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(30,136,229,.35);
}

/* ===== SUCCESS ===== */
.successIcon{
  width:80px;
  margin:18px auto 8px;
  animation:bounceSuccess .7s ease;
}

@keyframes bounceSuccess{
  0%{transform:scale(.6)}
  60%{transform:scale(1.15)}
  100%{transform:scale(1)}
}

.ref{
  background:linear-gradient(135deg,#e3f2fd,#f1f8ff);
  border:1px solid #bbdefb;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  margin-bottom:14px;
}

.summary div{
  background:#fff;
  border:1px solid #eee;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
}

/* ===== CONFETTI ===== */
.confetti{
  position:fixed;
  width:8px;
  height:8px;
  top:-10px;
  z-index:9999;
  animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}

/* ===== ANIMATION ===== */
@keyframes successFade{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* ===== RESPONSIVE ===== */
@media (max-width:480px){
  body{ padding:14px; }
  .container{ padding:18px 16px 20px; }
}

@media (min-width:900px){
  .container{
    max-width:480px;
    padding:26px 28px 30px;
  }
}

</style>
</head>

<body>

<script>
var FORM_ENABLED = true;
const SCRIPT_URL="YOUR_SCRIPT_URL_HERE";
</script>

<div class="container" id="formBox">

<div class="form-header">
  <div class="logo">📨</div>
  <div>
    <div class="title">Agency Contact Submission</div>
    <div class="subtitle">Singer Malaysia Communication Portal</div>
  </div>
</div>

<h2>📄 AGENCY CONTACT INFO SUBMISSION</h2>

<form onsubmit="return submitForm();">

<div class="section-title">Agency Info</div>

<label>Agency Name *</label>
<div class="input-wrap">
<span>🏢</span>
<input type="text" id="agency">
</div>

<div class="section-title">Contact</div>

<label>Contact *</label>
<div class="input-wrap">
<span>📞</span>
<input type="tel" id="contact1">
</div>

<button type="submit" id="submitBtn">Submit</button>

</form>
</div>

<div class="container success-container" id="successBox" style="display:none;">
<h2>Submission Successful</h2>
<div class="ref" id="refDisplay"></div>
<div class="summary" id="summaryBox"></div>
</div>

<script>

function launchConfetti(){
  const colors=["#1e88e5","#42a5f5","#66bb6a","#ffca28","#ef5350"];
  for(let i=0;i<60;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

function submitForm(){
  formBox.style.display="none";
  successBox.style.display="block";
  refDisplay.innerText="REF-"+Date.now();
  summaryBox.innerHTML="<div>Demo Success</div>";
  launchConfetti();
  return false;
}

</script>

</body>
</html>
