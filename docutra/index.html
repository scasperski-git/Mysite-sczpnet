<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DocuTrack System | Professional</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-grad: linear-gradient(135deg, #6366f1, #4f46e5);
      --dark: #0f172a;
      --dark-sidebar: #1e293b;
      --bg: #f8fafc;
      --white: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .page-fade { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* ===== LAYOUT ===== */
    .app { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR (DESKTOP) ===== */
    .sidebar {
      width: 280px;
      background: var(--dark-sidebar);
      color: white;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      box-shadow: 4px 0 24px rgba(0,0,0,0.05);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .sidebar h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .sidebar .brand-sub {
      font-size: 12px;
      text-align: center;
      color: #94a3b8;
      margin-bottom: 40px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .sidebar button {
      width: 100%;
      padding: 14px 20px;
      margin-bottom: 8px;
      border: none;
      background: transparent;
      color: #cbd5e1;
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .sidebar button i { font-size: 20px; }

    .sidebar button.active {
      background: var(--primary-grad);
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
      font-weight: 600;
    }

    .sidebar button:not(.active):hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .box {
      background: var(--white);
      padding: 32px;
      margin-bottom: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }

    h3 {
      margin: 0 0 24px 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ===== INPUTS & BUTTONS ===== */
    .row { display: flex; gap: 16px; margin-bottom: 20px; }
    
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-color);
      font-size: 16px; 
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      background: var(--bg);
      color: var(--text-main);
    }

    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    button.action {
      background: var(--primary-grad);
      color: white;
      font-weight: 600;
      font-family: inherit;
      font-size: 15px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 16px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    button.action:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
    }

    button.action:active { transform: scale(0.98); }

    /* ===== UPLOAD DROPZONE ===== */
    .dropzone-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      gap: 12px;
      margin-bottom: 20px;
    }
    .dropzone-label:hover {
      background: #f1f5f9;
      border-color: var(--primary);
    }
    .dropzone-label i { font-size: 40px; color: var(--primary); }
    .dropzone-label span { font-weight: 500; color: var(--text-muted); font-size: 14px; }

    /* ===== KPI CARDS ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .kpi {
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }

    .kpi:hover { 
      transform: translateY(-4px); 
      box-shadow: var(--shadow-md);
    }

    .kpi-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .kpi-title { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .kpi-icon { font-size: 24px; padding: 10px; border-radius: 10px; }
    
    .kpi-value { font-size: 32px; font-weight: 800; color: var(--dark); line-height: 1; }

    /* ===== LIST ITEMS ===== */
    .file-item {
      background: var(--bg);
      padding: 18px;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
      word-break: break-word;
    }

    .file-item:hover {
      background: #fff;
      border-color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    /* ===== MOBILE NAV ===== */
    .bottom-nav { display: none; }

    .mobile-header {
      display: none;
      background: var(--white);
      color: var(--dark);
      padding: 16px 20px;
      font-weight: 700;
      font-size: 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      text-align: left;
      align-items: center;
      gap: 10px;
    }

    /* ===== RESPONSIVE MOBILE FIXES ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--border-color);
        justify-content: space-around;
        z-index: 1000;
      }

      .bottom-nav button {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 500;
        text-align: center;
        transition: all 0.2s;
        flex: 1;
        padding: 8px 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .bottom-nav button i { font-size: 24px; }

      .bottom-nav button.active {
        color: var(--primary);
        font-weight: 600;
      }

      .mobile-header { display: flex; }
      
      .main { padding: 20px 16px 100px 16px; }
      .box { padding: 24px 20px; margin-bottom: 16px; }
      .row { flex-direction: column; gap: 12px; }
      
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .kpi { padding: 16px; }
      .kpi-value { font-size: 24px; }
    }

    /* ===== OVERLAY & MODAL ===== */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal {
      background: white;
      padding: 40px 30px;
      border-radius: 24px;
      text-align: center;
      width: 85%;
      max-width: 360px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalPop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-icon.loading {
      width: 48px; height: 48px;
      border: 4px solid #f1f5f9;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* SVG Success Animation */
    .check-svg { width: 72px; height: 72px; margin: 0 auto 20px; }
    .check-circle { stroke: #10b981; stroke-width: 3; stroke-dasharray: 160; stroke-dashoffset: 160; animation: draw 0.5s forwards; }
    .check-mark { stroke: #10b981; stroke-width: 4; stroke-dasharray: 50; stroke-dashoffset: 50; animation: draw 0.3s 0.5s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <i class="ph-fill ph-folder-notch" style="color: #818cf8; font-size: 28px;"></i>
      <h2>DocuTrack</h2>
    </div>
    <div class="brand-sub">Management System</div>
    
    <button onclick="showPage('dashboard', this, true)" class="active"><i class="ph ph-squares-four"></i> Dashboard</button>
    <button onclick="showPage('upload', this)"><i class="ph ph-cloud-arrow-up"></i> Upload File</button>
    <button onclick="showPage('search', this)"><i class="ph ph-magnifying-glass"></i> Search Doc</button>
    
    <div style="flex: 1;"></div>
    
    <button onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; margin-bottom: 24px;">
      <i class="ph ph-sign-out"></i> Logout
    </button>
    
    <div style="font-size: 11px; text-align: center; opacity: 0.6; font-weight: 500;">
      Powered by <a href="https://sczpnet.org" style="color: #818cf8; text-decoration: none;">sczpnet.org</a>
    </div>
  </div>

  <div class="mobile-header">
    <i class="ph-fill ph-folder-notch" style="color: var(--primary); font-size: 24px;"></i> DocuTrack
  </div>

  <div class="main">
    <div id="login" class="box page-fade" style="display:none; max-width:400px; margin: 80px auto;">
      <div style="text-align: center; margin-bottom: 24px;">
        <i class="ph-fill ph-shield-check" style="font-size: 48px; color: var(--primary);"></i>
        <h3 style="justify-content: center; margin-top: 10px; margin-bottom: 5px;">Secure Login</h3>
        <p style="color: var(--text-muted); font-size: 14px; margin: 0;">Enter your credentials to access</p>
      </div>
      
      <div style="display:flex; flex-direction:column; gap:16px;">
        <input type="text" id="userId" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">
        <button class="action" onclick="login()">Sign In <i class="ph ph-arrow-right"></i></button>
        <p id="loginMsg" style="color:#ef4444; text-align:center; font-size:14px; margin: 0; font-weight: 500;"></p>
      </div>
    </div>

    <div id="dashboard" class="box page-fade">
      <h3><i class="ph-fill ph-chart-line-up" style="color: var(--primary)"></i> System Overview</h3>
      
      <div style="margin-bottom: 30px; padding: 20px; background: #e0e7ff; border-radius: var(--radius-sm); border: 1px solid #c7d2fe; display: flex; align-items: center; gap: 16px;">
        <div style="width: 48px; height: 48px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);">
          <i class="ph-fill ph-user" style="font-size: 24px; color: var(--primary);"></i>
        </div>
        <div>
          <div id="welcomeName" style="font-weight:700; color: #3730a3; font-size: 16px;"></div>
          <div id="userRole" style="font-size:13px; color:#4f46e5; font-weight:600;"></div>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-header">
            <div class="kpi-title">Total Docs</div>
            <div class="kpi-icon" style="background: #e0e7ff; color: #4f46e5;"><i class="ph-fill ph-files"></i></div>
          </div>
          <div class="kpi-value" id="kpiDocs">0</div>
        </div>
        <div class="kpi">
          <div class="kpi-header">
            <div class="kpi-title">Total ICs</div>
            <div class="kpi-icon" style="background: #fef3c7; color: #d97706;"><i class="ph-fill ph-identification-card"></i></div>
          </div>
          <div class="kpi-value" id="kpiIC">0</div>
        </div>
        <div class="kpi">
          <div class="kpi-header">
            <div class="kpi-title">Accounts</div>
            <div class="kpi-icon" style="background: #d1fae5; color: #059669;"><i class="ph-fill ph-users"></i></div>
          </div>
          <div class="kpi-value" id="kpiAcc">0</div>
        </div>
        <div class="kpi">
          <div class="kpi-header">
            <div class="kpi-title">Today</div>
            <div class="kpi-icon" style="background: #f3e8ff; color: #7e22ce;"><i class="ph-fill ph-calendar-plus"></i></div>
          </div>
          <div class="kpi-value" id="kpiToday">0</div>
        </div>
      </div>

      <div style="margin-top:40px;">
        <h3 style="font-size:18px;"><i class="ph-fill ph-clock-counter-clockwise" style="color: var(--text-muted)"></i> Recent Activity</h3>
        <div id="recentList"></div>
      </div>
    </div>

    <div id="upload" class="box page-fade" style="display:none;">
      <h3><i class="ph-fill ph-cloud-arrow-up" style="color: var(--primary)"></i> Upload Document</h3>
      <div class="row">
        <input type="text" id="ic" placeholder="IC Number (e.g. XXXXXX-XX-XXXX)">
        <input type="text" id="account" placeholder="Account Number" inputmode="numeric">
      </div>
      
      <div style="margin: 24px 0;">
        <label for="files" class="dropzone-label">
          <i class="ph ph-upload-simple"></i>
          <span>Click to select files (Max 4)</span>
        </label>
        <input type="file" id="files" multiple style="display: none;">
      </div>

      <div id="fileList" style="margin-bottom:24px;"></div>
      <button class="action" onclick="upload()"><i class="ph-fill ph-upload-simple"></i> Start Upload</button>
      <p id="msg" style="text-align:center; font-size:14px; margin-top:12px;"></p>
    </div>

    <div id="search" class="box page-fade" style="display:none;">
      <h3><i class="ph-fill ph-magnifying-glass" style="color: var(--primary)"></i> Search Documents</h3>
      <div style="display:flex; gap:12px; margin-bottom:32px;">
        <input type="text" id="searchIC" placeholder="Enter IC Number..." style="flex: 1;">
        <button class="action" style="width:140px; border-radius: var(--radius-sm);" onclick="search()">Search</button>
      </div>
      <div id="result"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="showPage('dashboard', this, true)" class="active"><i class="ph-fill ph-squares-four"></i>Home</button>
  <button onclick="showPage('upload', this)"><i class="ph-fill ph-cloud-arrow-up"></i>Upload</button>
  <button onclick="showPage('search', this)"><i class="ph-fill ph-magnifying-glass"></i>Search</button>
  <button onclick="logout()"><i class="ph-fill ph-sign-out"></i>Logout</button>
</div>

<div id="overlay">
  <div class="modal">
    <div id="modalIconContainer">
      <div class="modal-icon loading" id="modalIcon"></div>
      <svg class="check-svg" id="successSvg" viewBox="0 0 52 52" style="display:none;">
        <circle class="check-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="check-mark" fill="none" d="M14 27l7 7 16-16"/>
      </svg>
    </div>
    <div id="modalTitle" style="font-weight:700; font-size:20px; color: var(--dark); margin-bottom:8px;">Processing...</div>
    <div id="modalSub" style="font-size:15px; color:var(--text-muted); margin-bottom:24px;">Please wait a moment</div>
    <button id="okBtn" class="action" onclick="closeModal()" style="display:none;">Continue</button>
  </div>
</div>

<script>
// ALL ORIGINAL LOGIC MAINTAINED 100%
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

function showPage(page, el, isClick = false) {
  localStorage.setItem("activePage", page);
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("upload").style.display = "none";
  document.getElementById("search").style.display = "none";
  document.getElementById("login").style.display = "none";
  
  // Re-trigger animation
  const activeSection = document.getElementById(page);
  activeSection.style.display = "block";
  activeSection.classList.remove("page-fade");
  void activeSection.offsetWidth; // trigger reflow
  activeSection.classList.add("page-fade");

  document.querySelectorAll(".sidebar button, .bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if (el) el.classList.add("active");

  if (page === "search") {
    document.getElementById("result").innerHTML = "";
    document.getElementById("searchIC").value = "";
  }
  if (page === "upload") {
    document.getElementById("ic").value = "";
    document.getElementById("account").value = "";
    document.getElementById("files").value = "";
    selectedFiles = [];
    renderFileList();
  }
  if (page === "dashboard" && isClick) location.reload();

  const user = JSON.parse(localStorage.getItem("user"));
  if (!user && page !== "login") { showPage("login"); return; }

  // UI Control
  const sidebar = document.querySelector(".sidebar");
  const bnav = document.querySelector(".bottom-nav");
  if (page === "login") {
    sidebar.style.display = "none";
    bnav.style.display = "none";
  } else if (window.innerWidth <= 768) {
    sidebar.style.display = "none";
    bnav.style.display = "flex";
  } else {
    sidebar.style.display = "flex";
    bnav.style.display = "none";
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  let newFiles = Array.from(e.target.files);
  selectedFiles = selectedFiles.concat(newFiles);
  if (selectedFiles.length > 4) {
    alert("Maximum of 4 files only!");
    selectedFiles = selectedFiles.slice(0, 4);
  }
  renderFileList();
  this.value = "";
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  selectedFiles.forEach((file, index) => {
    let sizeKB = (file.size / 1024).toFixed(1);
    list.innerHTML += `
      <div style="background:#f8fafc; border: 1px solid #e2e8f0; padding:14px 16px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
        <div style="display: flex; gap: 12px; align-items: center; overflow: hidden;">
          <i class="ph-fill ph-file-text" style="font-size: 24px; color: #94a3b8;"></i>
          <div style="font-size:14px; word-break: break-all; padding-right: 10px; line-height: 1.3;">
            <strong style="color: #1e293b;">${file.name}</strong><br>
            <span style="color:#64748b; font-size: 12px;">${sizeKB} KB</span>
          </div>
        </div>
        <button onclick="removeFile(${index})" style="background:#fee2e2; border:none; color:#ef4444; width: 32px; height: 32px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: 0.2s;">
          <i class="ph ph-x" style="font-weight: bold;"></i>
        </button>
      </div>`;
  });
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderFileList();
}

async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  if(!userId || !password) return;

  const overlay = document.getElementById("overlay");
  const modalIcon = document.getElementById("modalIcon");
  const successSvg = document.getElementById("successSvg");
  
  overlay.style.display = "flex";
  modalIcon.style.display = "block";
  successSvg.style.display = "none";
  document.getElementById("modalTitle").innerText = "Authenticating...";
  document.getElementById("okBtn").style.display = "none";

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", userId, password })
    });
    const data = await res.json();
    if (data.status === "success") {
      modalIcon.style.display = "none";
      successSvg.style.display = "block";
      document.getElementById("modalTitle").innerText = "Success!";
      document.getElementById("modalSub").innerText = "Welcome back.";
      localStorage.setItem("user", JSON.stringify(data));
      setTimeout(() => { overlay.style.display = "none"; showPage("dashboard"); applyRole(data.role); loadDashboard(); }, 1200);
    } else {
      overlay.style.display = "none";
      document.getElementById("loginMsg").innerText = "Invalid ID or Password";
    }
  } catch (err) { alert("Login failed!"); location.reload(); }
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function applyRole(role) {
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeName").innerText = "Welcome, " + user.userId;
  document.getElementById("userRole").innerText = "Role: " + role;
}

async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();
    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;

    let html = "";
    (data.recent || []).forEach(r => {
      html += `
        <div class="file-item" onclick="goToSearch('${r.ic}')" style="cursor:pointer; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-weight:700; margin-bottom:4px; color: var(--dark);">IC No: ${r.ic}</div>
            <div style="font-size:13px; color:#64748b;">Account: ${r.account} • ${r.total} Files</div>
            <div style="font-size:12px; margin-top:6px; color:#94a3b8;"><i class="ph ph-user"></i> ${r.user} &nbsp; <i class="ph ph-clock"></i> ${r.time}</div>
          </div>
          <i class="ph ph-caret-right" style="color: #cbd5e1; font-size: 20px;"></i>
        </div>`;
    });
    document.getElementById("recentList").innerHTML = html || '<div style="padding: 20px; text-align: center; color: #94a3b8; background: #f8fafc; border-radius: 12px; border: 1px dashed #cbd5e1;">No activity today</div>';
  } catch (e) { console.error(e); }
}

async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  if (!ic || !account || selectedFiles.length === 0) { alert("Please complete all fields!"); return; }

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  document.getElementById("modalIcon").style.display = "block";
  document.getElementById("successSvg").style.display = "none";
  document.getElementById("modalTitle").innerText = "Uploading...";
  document.getElementById("okBtn").style.display = "none";

  try {
    let filesData = await Promise.all(selectedFiles.map(async (file) => {
      let processedFile = file;
      if (file.type.startsWith("image/")) { processedFile = await compressImage(file); }
      let base64 = await toBase64(processedFile);
      return { name: processedFile.name, type: processedFile.type, data: base64.split(",")[1] };
    }));

    const user = JSON.parse(localStorage.getItem("user"));
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ ic, account, userId: user.userId, files: filesData })
    });

    document.getElementById("modalIcon").style.display = "none";
    document.getElementById("successSvg").style.display = "block";
    document.getElementById("modalTitle").innerText = "Upload Successful!";
    document.getElementById("modalSub").innerText = "Your documents have been securely saved.";
    document.getElementById("okBtn").style.display = "block";
  } catch (err) { alert("Upload Failed!"); location.reload(); }
}

async function compressImage(file) {
  if (file.size <= 2 * 1024 * 1024) return file;
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let scale = Math.min(1280 / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: "image/jpeg" })), "image/jpeg", 0.7);
    };
    reader.readAsDataURL(file);
  });
}

async function search() {
  const ic = document.getElementById("searchIC").value.trim();
  if (!ic) return;
  document.getElementById("result").innerHTML = '<div style="text-align:center; padding:40px; color: var(--text-muted);"><div class="modal-icon loading"></div> Fetching data...</div>';
  
  const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}&_=${Date.now()}`);
  const data = await res.json();
  let html = data.length === 0 ? '<div style="text-align:center; padding: 30px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 12px; color:#ef4444;"><i class="ph ph-warning-circle" style="font-size: 32px; margin-bottom: 10px;"></i><br>No records found.</div>' : "";
  
  let grouped = {};
  data.forEach(d => { if(!grouped[d.account]) grouped[d.account] = []; grouped[d.account].push(d); });

  Object.keys(grouped).forEach(acc => {
    let files = grouped[acc];
    html += `<div class="file-item" style="border-top: 4px solid var(--primary); padding: 20px;">
      <div style="font-weight:700; color:var(--dark); font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
        <i class="ph-fill ph-folder-open" style="color: #6366f1; font-size: 22px;"></i> Account: ${acc} 
        <span style="font-weight:500; font-size:13px; color:#64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 20px;">${files.length} files</span>
      </div>
      <div style="display:grid; gap:10px;">`;
    files.forEach(f => {
      html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#f8fafc; padding:12px 16px; border-radius:10px; font-size:14px; border: 1px solid #e2e8f0; transition: 0.2s;">
        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:75%; display: flex; align-items: center; gap: 10px; color: #334155;">
          <i class="ph ph-file-text" style="color: #94a3b8; font-size: 18px;"></i> ${f.file}
        </span>
        <a href="${f.url}" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:600; display: flex; align-items: center; gap: 6px; background: #e0e7ff; padding: 6px 12px; border-radius: 8px; transition: 0.2s;">
          <i class="ph ph-eye"></i> View
        </a>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("result").innerHTML = html;
}

function closeModal() { location.reload(); }
function goToSearch(ic) { showPage("search"); document.getElementById("searchIC").value = ic; search(); }

// Formatting Functions
function formatIC(val) {
  val = val.replace(/[^0-9a-zA-Z]/g, "");
  if (/[a-zA-Z]/.test(val)) return val.toUpperCase();
  val = val.substring(0, 12);
  let p1 = val.substring(0,6), p2 = val.substring(6,8), p3 = val.substring(8,12);
  let res = p1;
  if(p2) res += "-" + p2;
  if(p3) res += "-" + p3;
  return res;
}

function handleICInput(e) {
  const input = e.target;
  let start = input.selectionStart, oldLen = input.value.length;
  let formatted = formatIC(input.value);
  input.value = formatted;
  let newPos = start + (formatted.length - oldLen);
  input.setSelectionRange(newPos, newPos);
}

document.getElementById("ic").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("keypress", (e) => { if(e.key === "Enter") search(); });
document.getElementById("account").addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, "").substring(0,12); });

window.addEventListener("load", () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) { showPage("login"); } else {
    const lastPage = localStorage.getItem("activePage") || "dashboard";
    showPage(lastPage); applyRole(user.role); loadDashboard();
  }
});
</script>
