<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>DocuTrack System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
:root {
  --primary: #4f46e5;
  --bg: #f8fafc;
  --white: #fff;
  --text: #1e293b;
  --muted: #64748b;
  --border: #e2e8f0;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LAYOUT */
.app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #1e293b;
  color: white;
  padding: 24px;
  display: flex;
  flex-direction: column;
}

.sidebar h2 { margin: 0 0 20px; }

.sidebar button {
  background: none;
  border: none;
  color: #cbd5e1;
  padding: 12px;
  text-align: left;
  border-radius: 10px;
  cursor: pointer;
}

.sidebar button.active {
  background: var(--primary);
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
  width: 100%;
}

/* BOX */
.box {
  background: white;
  padding: 24px;
  border-radius: 14px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 15px;
}

/* BUTTON */
button.action {
  background: var(--primary);
  color: white;
  padding: 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* KPI */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
}

.kpi {
  background: white;
  padding: 16px;
  border-radius: 10px;
}

/* MOBILE HEADER */
.mobile-header {
  display: none;
  position: sticky;
  top: 0;
  background: white;
  padding: 14px;
  font-weight: bold;
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

/* BOTTOM NAV */
.bottom-nav {
  display: none;
}

/* MOBILE FIX */
@media(max-width:768px){

  .app { flex-direction: column; }

  .sidebar { display: none; }

  .mobile-header { display: flex; }

  .main { padding: 16px 12px 90px; }

  .box { padding: 16px; }

  input { font-size: 14px; padding: 12px; }

  .kpi-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid var(--border);
  }

  .bottom-nav button {
    background: none;
    border: none;
    font-size: 12px;
  }

}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>DocuTrack</h2>
  <button onclick="showPage('dashboard')" class="active">Dashboard</button>
  <button onclick="showPage('upload')">Upload</button>
  <button onclick="showPage('search')">Search</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- MOBILE HEADER -->
<div class="mobile-header">DocuTrack</div>

<!-- MAIN -->
<div class="main">

<!-- LOGIN -->
<div id="login" class="box" style="display:none; max-width:400px; margin:auto;">
  <input type="text" id="userId" placeholder="User ID">
  <input type="password" id="password" placeholder="Password" style="margin-top:10px;">
  <button class="action" onclick="login()" style="margin-top:10px;">Login</button>
  <p id="loginMsg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">
  <h3>Dashboard</h3>
  <div class="kpi-grid">
    <div class="kpi"><b id="kpiDocs">0</b><br>Docs</div>
    <div class="kpi"><b id="kpiIC">0</b><br>IC</div>
    <div class="kpi"><b id="kpiAcc">0</b><br>Acc</div>
    <div class="kpi"><b id="kpiToday">0</b><br>Today</div>
  </div>
  <div id="recentList"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="box" style="display:none;">
  <input id="ic" placeholder="IC">
  <input id="account" placeholder="Account" style="margin-top:10px;">
  <input type="file" id="files" multiple style="margin-top:10px;">
  <button class="action" onclick="upload()" style="margin-top:10px;">Upload</button>
</div>

<!-- SEARCH -->
<div id="search" class="box" style="display:none;">
  <input id="searchIC" placeholder="Search IC">
  <button class="action" onclick="search()" style="margin-top:10px;">Search</button>
  <div id="result"></div>
</div>

</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="showPage('dashboard')">Home</button>
  <button onclick="showPage('upload')">Upload</button>
  <button onclick="showPage('search')">Search</button>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

/* =========================
   PAGE NAVIGATION (FIXED)
========================= */
function showPage(page) {
  localStorage.setItem("activePage", page);

  ["dashboard","upload","search","login"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });

  document.getElementById(page).style.display="block";

  // login check
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user && page !== "login") {
    showPage("login");
    return;
  }

  // sidebar active (desktop only)
  document.querySelectorAll(".sidebar button").forEach(btn=>{
    btn.classList.remove("active");
  });
}

/* =========================
   LOGIN (KEEP ORIGINAL FLOW)
========================= */
async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;

  if(!userId || !password) return;

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", userId, password })
    });

    const data = await res.json();

    if(data.status === "success"){
      localStorage.setItem("user", JSON.stringify(data));
      showPage("dashboard");
      loadDashboard();
    } else {
      document.getElementById("loginMsg").innerText="Invalid login";
    }

  } catch(e){
    alert("Login error");
  }
}

/* =========================
   LOGOUT
========================= */
function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* =========================
   DASHBOARD LOAD
========================= */
async function loadDashboard(){
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();

    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;

    let html="";
    (data.recent||[]).forEach(r=>{
      html += `
      <div style="padding:10px; border-bottom:1px solid #eee;">
        <b>${r.ic}</b><br>
        <span style="font-size:12px;color:#666;">
          Acc: ${r.account} • ${r.total} files
        </span>
      </div>`;
    });

    document.getElementById("recentList").innerHTML = html;

  } catch(e){
    console.log(e);
  }
}

/* =========================
   FILE BASE64
========================= */
function toBase64(file){
  return new Promise((res,rej)=>{
    let reader = new FileReader();
    reader.onload=()=>res(reader.result);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

/* =========================
   UPLOAD (FIX MESSAGE HERE)
========================= */
async function upload(){
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  const files = document.getElementById("files").files;

  if(!ic || !account || files.length===0){
    alert("Complete all fields");
    return;
  }

  try{
    let arr=[];

    for(let f of files){
      let b64 = await toBase64(f);
      arr.push({
        name:f.name,
        type:f.type,
        data:b64.split(",")[1]
      });
    }

    const user = JSON.parse(localStorage.getItem("user"));

    await fetch(WEB_APP_URL,{
      method:"POST",
      body:JSON.stringify({
        ic,
        account,
        userId:user.userId,
        files:arr
      })
    });

    /* 🔥 FIXED MESSAGE (IMPORTANT) */
    alert("Upload Success\nIC: "+ic+"\nAccount: "+account);

    document.getElementById("ic").value="";
    document.getElementById("account").value="";
    document.getElementById("files").value="";

  }catch(e){
    alert("Upload failed");
  }
}

/* =========================
   AUTO LOAD
========================= */
window.onload = ()=>{
  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    showPage("login");
  }else{
    showPage("dashboard");
    loadDashboard();
  }
};

</script>

<script>

/* =========================
   IC AUTO FORMAT (IMPORTANT)
========================= */
function formatIC(val){
  val = val.replace(/[^0-9]/g,"").substring(0,12);

  let p1 = val.substring(0,6);
  let p2 = val.substring(6,8);
  let p3 = val.substring(8,12);

  let res = p1;
  if(p2) res += "-" + p2;
  if(p3) res += "-" + p3;

  return res;
}

function handleICInput(e){
  e.target.value = formatIC(e.target.value);
}

document.getElementById("ic").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("input", handleICInput);


/* =========================
   SEARCH (FULL FIXED VERSION)
========================= */
async function search(){
  const ic = document.getElementById("searchIC").value.trim();

  if(!ic) return;

  document.getElementById("result").innerHTML = "Loading...";

  try{
    const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}`);
    const data = await res.json();

    if(data.length===0){
      document.getElementById("result").innerHTML = "No result";
      return;
    }

    /* GROUP BY ACCOUNT */
    let grouped = {};
    data.forEach(d=>{
      if(!grouped[d.account]) grouped[d.account]=[];
      grouped[d.account].push(d);
    });

    let html="";

    Object.keys(grouped).forEach(acc=>{
      let files = grouped[acc];

      html += `
      <div style="
        border:1px solid #ddd;
        border-radius:10px;
        margin-top:12px;
        padding:12px;
      ">

        <div style="font-weight:bold; margin-bottom:8px;">
          Account: ${acc} (${files.length})
        </div>
      `;

      files.forEach(f=>{
        html += `
        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:8px;
          border-top:1px solid #eee;
          font-size:13px;
          gap:10px;
        ">

          <!-- 🔥 FIX OVERFLOW HERE -->
          <span style="
            flex:1;
            word-break:break-word;
          ">
            ${f.file}
          </span>

          <a href="${f.url}" target="_blank" style="
            color:blue;
            font-size:12px;
            flex-shrink:0;
          ">View</a>

        </div>`;
      });

      html += `</div>`;
    });

    document.getElementById("result").innerHTML = html;

  }catch(e){
    alert("Search error");
  }
}


/* =========================
   CLICK RECENT → AUTO SEARCH
========================= */
function goToSearch(ic){
  showPage("search");
  document.getElementById("searchIC").value = ic;
  search();
}


/* =========================
   ENTER KEY SEARCH
========================= */
document.getElementById("searchIC").addEventListener("keypress",function(e){
  if(e.key==="Enter") search();
});

</script>
