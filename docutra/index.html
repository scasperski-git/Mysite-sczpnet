<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuTrack Pro | System</title>

<style>
:root {
  --primary: #007bff;
  --primary-dark: #0056b3;
  --accent: #00bfff;
  --bg-body: #f8fafc;
  --bg-sidebar: #1e293b;
  --white: #ffffff;
  --text-main: #334155;
  --text-muted: #64748b;
  --radius: 12px;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-body);
  color: var(--text-main);
  line-height: 1.5;
}

/* ===== LAYOUT ===== */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR (Desktop) ===== */
.sidebar {
  width: 260px;
  background: var(--bg-sidebar);
  color: white;
  padding: 24px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  z-index: 100;
}

.sidebar h2 {
  font-size: 1.25rem;
  margin: 0 0 4px 0;
  color: var(--accent);
}

.sidebar-nav {
  margin-top: 32px;
  flex-grow: 1;
}

.sidebar button {
  width: 100%;
  padding: 12px 16px;
  margin-bottom: 8px;
  border: none;
  background: transparent;
  color: #94a3b8;
  border-radius: var(--radius);
  cursor: pointer;
  text-align: left;
  font-weight: 500;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar button.active {
  background: rgba(255, 255, 255, 0.1);
  color: white;
  box-shadow: inset 4px 0 0 var(--accent);
}

.sidebar button:hover:not(.active) {
  background: rgba(255, 255, 255, 0.05);
  color: white;
}

.logout-btn {
  background: rgba(239, 68, 68, 0.1) !important;
  color: #ef4444 !important;
  margin-top: auto;
}

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  padding: 32px;
  max-width: 1000px;
  margin: 0 auto;
}

.box {
  background: var(--white);
  padding: 24px;
  border-radius: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}

h3 { margin-top: 0; font-size: 1.1rem; color: var(--text-main); }

/* ===== DASHBOARD KPI ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--white);
  padding: 20px;
  border-radius: var(--radius);
  border-left: 4px solid var(--primary);
  box-shadow: var(--shadow);
}

.kpi-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
.kpi-value { font-size: 1.75rem; font-weight: 800; display: block; margin-top: 4px; }

/* ===== INPUTS & BUTTONS ===== */
input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e2e8f0;
  border-radius: var(--radius);
  font-size: 1rem;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
}

.btn-action {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  background: var(--primary);
  color: white;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.btn-action:hover { background: var(--primary-dark); }
.btn-action:active { transform: scale(0.98); }

/* ===== FILE LIST UI ===== */
.file-item {
  background: #f1f5f9;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.9rem;
}

.btn-remove {
  background: #fee2e2;
  color: #ef4444;
  border: none;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== SEARCH RESULTS ===== */
.result-card {
  border: 1px solid #e2e8f0;
  padding: 16px;
  border-radius: var(--radius);
  margin-top: 12px;
  background: #f8fafc;
}

.search-loader {
  border: 3px solid #f3f3f3;
  border-top: 3px solid var(--primary);
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

/* ===== MOBILE ADAPTATION ===== */
.mobile-header { display: none; }
.bottom-nav { display: none; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { padding: 16px; padding-bottom: 100px; }
  .mobile-header {
    display: block;
    background: var(--bg-sidebar);
    color: white;
    padding: 16px;
    text-align: center;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .bottom-nav {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-top: 1px solid #e2e8f0;
    padding: 10px 0;
    justify-content: space-around;
    z-index: 1000;
  }
  .nav-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.7rem;
    text-align: center;
  }
  .nav-btn.active { color: var(--primary); font-weight: bold; }
}

/* ===== OVERLAY & MODAL ===== */
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
  display: none; justify-content: center; align-items: center; z-index: 9999;
}
.modal {
  background: white; padding: 24px; border-radius: 20px;
  width: 90%; max-width: 340px; text-align: center;
  box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
}

@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* SVG Progress */
.check-svg { width: 60px; height: 60px; margin: 0 auto 15px; }
.check-circle { stroke: #22c55e; stroke-width: 3; fill: none; }
.check-mark { stroke: #22c55e; stroke-width: 3; fill: none; stroke-linecap: round; }
</style>
</head>

<body>

<div class="app-container">

  <aside class="sidebar">
    <h2>📂 DocuTrack</h2>
    <p style="font-size: 0.7rem; opacity: 0.6;">Document Control v3.0</p>
    
    <nav class="sidebar-nav">
      <button onclick="showPage('dashboard', this)" id="side-dash" class="active">🏠 Dashboard</button>
      <button onclick="showPage('upload', this)" id="side-up">⬆️ Upload</button>
      <button onclick="showPage('search', this)" id="side-search">🔍 Search</button>
    </nav>

    <button onclick="logout()" class="logout-btn">🔓 Logout Session</button>
    
    <div style="margin-top: 20px; font-size: 10px; color: #64748b;">
      Powered by <a href="https://sczpnet.org" style="color:var(--accent); text-decoration:none;">sczpnet.org</a>
    </div>
  </aside>

  <div class="mobile-header">📂 DocuTrack System</div>

  <main class="main-content">

    <div id="login" class="box" style="display:none; max-width:400px; margin: 50px auto;">
      <h3 style="text-align:center;">🔐 Secure Access</h3>
      <input type="text" id="userId" placeholder="Username / ID">
      <input type="password" id="password" placeholder="Password">
      <button class="btn-action" onclick="login()">Sign In</button>
      <p id="loginMsg" style="color:red; text-align:center; font-size: 0.8rem; margin-top:10px;"></p>
    </div>

    <div id="dashboard">
      <div style="margin-bottom: 24px;">
        <h2 id="welcomeName" style="margin:0;">Welcome</h2>
        <span id="userRole" style="color:var(--text-muted); font-size: 0.8rem;">Role: Loading...</span>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card"><span class="kpi-label">Total Files</span><span class="kpi-value" id="kpiDocs">0</span></div>
        <div class="kpi-card" style="border-left-color: #10b981;"><span class="kpi-label">Unique IC</span><span class="kpi-value" id="kpiIC">0</span></div>
        <div class="kpi-card" style="border-left-color: #f59e0b;"><span class="kpi-label">Accounts</span><span class="kpi-value" id="kpiAcc">0</span></div>
        <div class="kpi-card" style="border-left-color: #8b5cf6;"><span class="kpi-label">Today</span><span class="kpi-value" id="kpiToday">0</span></div>
      </div>

      <div class="box">
        <h3>🕒 Recent Activity</h3>
        <div id="recentList" style="font-size: 0.85rem;">
          </div>
      </div>
    </div>

    <div id="upload" style="display:none;">
      <div class="box">
        <h3>⬆️ Upload Document</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <input type="text" id="ic" placeholder="IC (000000-00-0000)">
          <input type="text" id="account" placeholder="Account No" inputmode="numeric">
        </div>
        <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">Select Files (Max 4)</label>
        <input type="file" id="files" multiple style="margin-top: 8px;">
        <div id="fileList"></div>
        <button class="btn-action" onclick="upload()" style="margin-top: 10px;">Upload to Server</button>
        <p id="msg" style="text-align:center; font-size: 0.8rem;"></p>
      </div>
    </div>

    <div id="search" style="display:none;">
      <div class="box">
        <h3>🔍 Search Record</h3>
        <div style="display:flex; gap:8px;">
          <input type="text" id="searchIC" placeholder="Search by IC Number">
          <button class="btn-action" onclick="search()" style="width:100px;">Find</button>
        </div>
      </div>
      <div id="result"></div>
    </div>

  </main>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('dashboard', this)">🏠<br>Home</button>
  <button class="nav-btn" onclick="showPage('upload', this)">⬆️<br>Upload</button>
  <button class="nav-btn" onclick="showPage('search', this)">🔍<br>Search</button>
  <button class="nav-btn" onclick="logout()">🔓<br>Logout</button>
</nav>

<div id="overlay">
  <div class="modal">
    <div id="modalSpinner" class="search-loader"></div>
    <div id="modalSuccess" style="display:none;">
       <svg class="check-svg" viewBox="0 0 52 52">
         <circle class="check-circle" cx="26" cy="26" r="25" />
         <path class="check-mark" d="M14 27l7 7 16-16" />
       </svg>
    </div>
    <h3 id="modalTitle">Processing...</h3>
    <p id="modalSub" style="color:#64748b; font-size: 0.85rem;"></p>
    <button id="okBtn" class="btn-action" onclick="closeModal()" style="display:none;">OK</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

/* ===== NAVIGATION LOGIC ===== */
function showPage(page, el) {
  localStorage.setItem("activePage", page);
  const sections = ['dashboard', 'upload', 'search', 'login'];
  sections.forEach(s => document.getElementById(s).style.display = "none");
  document.getElementById(page).style.display = "block";

  document.querySelectorAll(".sidebar button, .nav-btn").forEach(btn => btn.classList.remove("active"));
  
  // Highlight correct buttons in both navs
  if(page === 'dashboard') {
    document.getElementById('side-dash')?.classList.add('active');
    loadDashboard();
  } else if(page === 'upload') {
    document.getElementById('side-up')?.classList.add('active');
  } else if(page === 'search') {
    document.getElementById('side-search')?.classList.add('active');
  }
  
  if (el) el.classList.add("active");
}

/* ===== AUTHENTICATION ===== */
async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  if(!userId || !password) return;

  showOverlay("Authenticating...", "Checking credentials");

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", userId, password })
    });
    const data = await res.json();

    if (data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));
      showSuccess("Welcome Back", "Login successful");
      setTimeout(() => {
        closeOverlay();
        showPage("dashboard");
        applyRole(data.role);
      }, 1000);
    } else {
      closeOverlay();
      document.getElementById("loginMsg").innerText = "Invalid User ID or Password";
    }
  } catch (err) {
    closeOverlay();
    alert("System Connection Error");
  }
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function applyRole(role) {
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeName").innerText = "👤 " + user.userId;
  document.getElementById("userRole").innerText = "Role: " + role;
}

/* ===== DASHBOARD DATA ===== */
async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();

    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;

    let html = "";
    (data.recent || []).forEach(r => {
      html += `
        <div class="result-card" onclick="goToSearch('${r.ic}')" style="cursor:pointer;">
          <strong>IC:</strong> ${r.ic} | <strong>Acc:</strong> ${r.account}<br>
          <span style="color:var(--text-muted); font-size: 0.75rem;">Uploaded by ${r.user} @ ${r.time}</span>
        </div>`;
    });
    document.getElementById("recentList").innerHTML = html || "No activity found.";
  } catch (e) { console.error("Dashboard error", e); }
}

/* ===== UPLOAD LOGIC ===== */
let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  let newFiles = Array.from(e.target.files);
  selectedFiles = selectedFiles.concat(newFiles).slice(0, 4);
  renderFileList();
  this.value = "";
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  selectedFiles.forEach((f, i) => {
    list.innerHTML += `<div class="file-item"><span>📄 ${f.name}</span><button class="btn-remove" onclick="removeFile(${i})">✕</button></div>`;
  });
}

function removeFile(i) { selectedFiles.splice(i, 1); renderFileList(); }

async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  if (!ic || !account || selectedFiles.length === 0) return alert("Fill all details");

  showOverlay("Uploading...", `Sending ${selectedFiles.length} file(s)`);

  try {
    const filesData = await Promise.all(selectedFiles.map(async (file) => {
      let processed = file;
      if (file.type.startsWith("image/")) processed = await compressImage(file);
      const base64 = await toBase64(processed);
      return { name: processed.name, type: processed.type, data: base64.split(",")[1] };
    }));

    const user = JSON.parse(localStorage.getItem("user"));
    const payload = { ic, account, userId: user.userId, files: filesData };

    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
    showSuccess("Upload Complete", "Documents saved successfully");
    selectedFiles = [];
    renderFileList();
    document.getElementById("ic").value = "";
    document.getElementById("account").value = "";
  } catch (err) {
    closeOverlay();
    alert("Upload failed. Check connection.");
  }
}

/* ===== SEARCH LOGIC ===== */
async function search() {
  const ic = document.getElementById("searchIC").value.trim();
  if (!ic) return;

  document.getElementById("result").innerHTML = `<div class="search-loader"></div>`;
  
  try {
    const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}&_=${Date.now()}`);
    const data = await res.json();

    if(data.length === 0) {
      document.getElementById("result").innerHTML = "No record found.";
      return;
    }

    let html = "";
    data.forEach(f => {
      html += `
        <div class="result-card">
          <div style="font-weight:bold; margin-bottom:5px;">📄 ${f.file}</div>
          <div style="font-size:0.8rem; color:var(--text-muted);">Acc: ${f.account} | By: ${f.user}</div>
          <a href="${f.url}" target="_blank" style="color:var(--primary); text-decoration:none; font-size:0.85rem; font-weight:bold;">👁️ View File</a>
        </div>`;
    });
    document.getElementById("result").innerHTML = html;
  } catch (e) { document.getElementById("result").innerHTML = "Search Error."; }
}

function goToSearch(ic) {
  document.getElementById("searchIC").value = ic;
  showPage('search');
  search();
}

/* ===== UTILS ===== */
function showOverlay(title, sub) {
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("modalSpinner").style.display = "block";
  document.getElementById("modalSuccess").style.display = "none";
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalSub").innerText = sub;
  document.getElementById("okBtn").style.display = "none";
}

function showSuccess(title, sub) {
  document.getElementById("modalSpinner").style.display = "none";
  document.getElementById("modalSuccess").style.display = "block";
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalSub").innerText = sub;
  document.getElementById("okBtn").style.display = "block";
}

function closeOverlay() { document.getElementById("overlay").style.display = "none"; }
function closeModal() { closeOverlay(); loadDashboard(); }

function toBase64(file) {
  return new Promise((r, j) => {
    const reader = new FileReader();
    reader.onload = () => r(reader.result);
    reader.onerror = j;
    reader.readAsDataURL(file);
  });
}

async function compressImage(file) {
  if (file.size <= 1024 * 1024) return file;
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(1280 / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => {
        resolve(new File([blob], file.name, { type: "image/jpeg" }));
      }, "image/jpeg", 0.7);
    };
    reader.readAsDataURL(file);
  });
}

// IC Formatting (000000-00-0000)
function handleIC(e) {
  let val = e.target.value.replace(/[^0-9]/g, "").substring(0, 12);
  if (val.length > 8) val = val.substring(0, 6) + "-" + val.substring(6, 8) + "-" + val.substring(8, 12);
  else if (val.length > 6) val = val.substring(0, 6) + "-" + val.substring(6, 8);
  e.target.value = val;
}
document.getElementById("ic").addEventListener("input", handleIC);
document.getElementById("searchIC").addEventListener("input", handleIC);

/* ===== INITIALIZATION ===== */
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) {
    showPage("login");
  } else {
    applyRole(user.role);
    showPage(localStorage.getItem("activePage") || "dashboard");
  }
};
</script>

</body>
</html>
