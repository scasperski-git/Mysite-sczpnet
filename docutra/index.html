<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DocuTrack System | Professional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #007bff;
      --primary-grad: linear-gradient(135deg, #00bfff, #007bff);
      --dark: #1e2a38;
      --bg: #f4f7fa;
      --white: #ffffff;
      --text-main: #2d3436;
      --text-muted: #636e72;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      touch-action: manipulation;
    }
    
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      overscroll-behavior-y: contain; /* Prevents pull-to-refresh on some browsers */
    }

    /* ===== LAYOUT ===== */
    .app { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR (DESKTOP) ===== */
    .sidebar {
      width: 260px;
      background: var(--dark);
      color: white;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 5px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .sidebar .brand-sub {
      font-size: 11px;
      text-align: center;
      color: #8899a6;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sidebar button {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 10px;
      border: none;
      background: transparent;
      color: #94a3b8;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar button.active {
      background: var(--primary-grad);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 40px;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .box {
      background: var(--white);
      padding: 25px;
      margin-bottom: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.03);
    }

    h3 { margin: 0 0 18px 0; font-size: 1.2rem; font-weight: 700; color: var(--dark); }

    /* ===== INPUTS & BUTTONS ===== */
    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    
    input {
      width: 100%;
      height: 50px; /* Better for mobile touch */
      padding: 0 16px;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      font-size: 16px; /* Prevents iOS auto-zoom */
      transition: all 0.2s;
      outline: none;
      background: #f8fafc;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
    }

    button.action {
      background: var(--primary-grad);
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      box-shadow: 0 8px 20px rgba(0, 123, 255, 0.2);
      transition: all 0.2s;
    }

    button.action:active { transform: scale(0.97); opacity: 0.9; }

    /* ===== KPI CARDS ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .kpi {
      background: var(--white);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: 2px 4px 12px rgba(0,0,0,0.03);
      border-left: 4px solid var(--primary);
    }

    .kpi-title { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
    .kpi-value { font-size: 24px; font-weight: 800; color: var(--dark); margin-top: 4px; }

    /* ===== FILE ITEMS ===== */
    .file-item {
      background: #f8fafc;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #edf2f7;
    }

    /* ===== MOBILE VIEW FIXES ===== */
    .mobile-header {
      display: none;
      background: var(--dark);
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(30, 42, 56, 0.98);
      backdrop-filter: blur(15px);
      padding: 10px 10px 25px; /* Added bottom padding for modern phone home bars */
      justify-content: space-around;
      z-index: 1000;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
    }

    .bottom-nav button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .bottom-nav button.active { color: #00bfff; }
    .bottom-nav button span { font-size: 18px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-header { display: block; }
      .bottom-nav { display: flex; }
      .main { padding: 20px 15px 120px; } /* More space at bottom for nav */
      .row { flex-direction: column; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .box { padding: 20px; }
    }

    /* ===== OVERLAY & MODAL ===== */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 24px;
      text-align: center;
      width: 100%;
      max-width: 340px;
    }

    .modal-icon.loading {
      width: 45px; height: 45px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      margin: 0 auto 15px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    .check-svg { width: 70px; height: 70px; margin: 0 auto 10px; }
    .check-circle { stroke: #10b981; stroke-width: 2; fill: none; stroke-dasharray: 160; stroke-dashoffset: 160; animation: draw 0.5s forwards; }
    .check-mark { stroke: #10b981; stroke-width: 3; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; animation: draw 0.3s 0.5s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <h2>📂 DocuTrack</h2>
    <div class="brand-sub">Management System</div>
    
    <button onclick="showPage('dashboard', this, true)" class="active"><span>🏠</span> Dashboard</button>
    <button onclick="showPage('upload', this)"><span>⬆️</span> Upload File</button>
    <button onclick="showPage('search', this)"><span>🔍</span> Search Records</button>
    
    <div style="flex: 1;"></div>
    
    <button onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; margin-bottom: 20px;">
      <span>🔓</span> Logout
    </button>
    
    <div style="font-size: 10px; text-align: center; opacity: 0.4;">
      Powered by <a href="https://sczpnet.org" style="color: inherit;">sczpnet.org</a>
    </div>
  </div>

  <div class="mobile-header">📂 DocuTrack System</div>

  <div class="main">
    <div id="login" class="box" style="display:none; max-width:400px; margin: 40px auto;">
      <h3 style="text-align:center;">🔐 Secure Login</h3>
      <div style="display:flex; flex-direction:column; gap:15px;">
        <input type="text" id="userId" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">
        <button class="action" onclick="login()">Login Now</button>
        <p id="loginMsg" style="color:red; text-align:center; font-size:13px;"></p>
      </div>
    </div>

    <div id="dashboard" class="box">
      <h3>📊 System Overview</h3>
      
      <div style="margin-bottom: 20px; padding: 15px; background: #f0f7ff; border-radius: 12px; border: 1px solid #dbeafe;">
        <div id="welcomeName" style="font-weight:700; color: var(--primary);"></div>
        <div id="userRole" style="font-size:11px; color:#64748b; font-weight:600; text-transform:uppercase;"></div>
      </div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-title">Documents</div>
          <div class="kpi-value" id="kpiDocs">0</div>
        </div>
        <div class="kpi" style="border-left-color: #f59e0b;">
          <div class="kpi-title">Total IC</div>
          <div class="kpi-value" id="kpiIC">0</div>
        </div>
        <div class="kpi" style="border-left-color: #10b981;">
          <div class="kpi-title">Accounts</div>
          <div class="kpi-value" id="kpiAcc">0</div>
        </div>
        <div class="kpi" style="border-left-color: #8b5cf6;">
          <div class="kpi-title">Today</div>
          <div class="kpi-value" id="kpiToday">0</div>
        </div>
      </div>

      <div style="margin-top:30px;">
        <h3 style="font-size:16px; color:#64748b;">🕒 Recent Activity</h3>
        <div id="recentList"></div>
      </div>
    </div>

    <div id="upload" class="box" style="display:none;">
      <h3>📤 Upload Document</h3>
      <div class="row">
        <input type="text" id="ic" placeholder="Identity Card No. (IC)">
        <input type="text" id="account" placeholder="Account No." inputmode="numeric">
      </div>
      
      <div style="margin: 15px 0;">
        <label style="display:block; margin-bottom:8px; font-weight:600; font-size:14px;">Select Files (Max 4):</label>
        <input type="file" id="files" multiple style="padding: 12px; background: #f8fafc; border: 1px dashed #cbd5e1; height: auto;">
      </div>

      <div id="fileList" style="margin-bottom:15px;"></div>
      <button class="action" onclick="upload()">Start Upload</button>
      <p id="msg" style="text-align:center; font-size:13px; margin-top:10px;"></p>
    </div>

    <div id="search" class="box" style="display:none;">
      <h3>🔍 Search Document</h3>
      <div class="row">
        <input type="text" id="searchIC" placeholder="Enter IC No. to search...">
        <button class="action" style="flex: 0 0 100px;" onclick="search()">Search</button>
      </div>
      <div id="result" style="margin-top:20px;"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="showPage('dashboard', this, true)" class="active"><span>🏠</span>Home</button>
  <button onclick="showPage('upload', this)"><span>⬆️</span>Upload</button>
  <button onclick="showPage('search', this)"><span>🔍</span>Search</button>
  <button onclick="logout()"><span>🔓</span>Logout</button>
</div>

<div id="overlay">
  <div class="modal">
    <div id="modalIconContainer">
      <div class="modal-icon loading" id="modalIcon"></div>
      <svg class="check-svg" id="successSvg" viewBox="0 0 52 52" style="display:none;">
        <circle class="check-circle" cx="26" cy="26" r="25" />
        <path class="check-mark" d="M14 27l7 7 16-16"/>
      </svg>
    </div>
    <div id="modalTitle" style="font-weight:700; font-size:18px; margin-bottom:5px;">Processing...</div>
    <div id="modalSub" style="font-size:14px; color:#64748b; margin-bottom:20px;">Please wait a moment</div>
    <button id="okBtn" class="action" onclick="closeModal()" style="display:none;">Close</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

function showPage(page, el, isClick = false) {
  localStorage.setItem("activePage", page);
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("upload").style.display = "none";
  document.getElementById("search").style.display = "none";
  document.getElementById("login").style.display = "none";
  document.getElementById(page).style.display = "block";

  document.querySelectorAll(".sidebar button, .bottom-nav button").forEach(btn => btn.classList.remove("active"));
  
  // Highlighting correct nav button based on page
  document.querySelectorAll("button").forEach(btn => {
    if(btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${page}'`)) {
      btn.classList.add("active");
    }
  });

  if (page === "search") {
    document.getElementById("result").innerHTML = "";
    document.getElementById("searchIC").value = "";
  }
  if (page === "upload") {
    document.getElementById("ic").value = "";
    document.getElementById("account").value = "";
    document.getElementById("files").value = "";
    selectedFiles = [];
    renderFileList();
  }
  if (page === "dashboard" && isClick) location.reload();

  const user = JSON.parse(localStorage.getItem("user"));
  if (!user && page !== "login") { showPage("login"); return; }

  // UI Responsive Handling
  if (page === "login") {
    document.querySelector(".sidebar").style.display = "none";
    document.querySelector(".bottom-nav").style.display = "none";
    document.querySelector(".mobile-header").style.display = "none";
  } else if (window.innerWidth <= 768) {
    document.querySelector(".sidebar").style.display = "none";
    document.querySelector(".bottom-nav").style.display = "flex";
    document.querySelector(".mobile-header").style.display = "block";
  } else {
    document.querySelector(".sidebar").style.display = "flex";
    document.querySelector(".bottom-nav").style.display = "none";
    document.querySelector(".mobile-header").style.display = "none";
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  let newFiles = Array.from(e.target.files);
  selectedFiles = selectedFiles.concat(newFiles);
  if (selectedFiles.length > 4) {
    alert("Maximum 4 files allowed!");
    selectedFiles = selectedFiles.slice(0, 4);
  }
  renderFileList();
  this.value = "";
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  selectedFiles.forEach((file, index) => {
    let sizeKB = (file.size / 1024).toFixed(1);
    list.innerHTML += `
      <div style="background:#f1f5f9; padding:10px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%;">
          <strong>📄 ${file.name}</strong><br><span style="color:#64748b;">${sizeKB} KB</span>
        </div>
        <button onclick="removeFile(${index})" style="background:#fee2e2; border:none; color:#ef4444; padding:5px 10px; border-radius:8px; cursor:pointer;">✕</button>
      </div>`;
  });
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderFileList();
}

async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  if(!userId || !password) return;

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  document.getElementById("modalIcon").style.display = "block";
  document.getElementById("successSvg").style.display = "none";
  document.getElementById("modalTitle").innerText = "Authenticating...";
  document.getElementById("okBtn").style.display = "none";

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", userId, password })
    });
    const data = await res.json();
    if (data.status === "success") {
      document.getElementById("modalIcon").style.display = "none";
      document.getElementById("successSvg").style.display = "block";
      document.getElementById("modalTitle").innerText = "Login Successful";
      document.getElementById("modalSub").innerText = "Welcome back to the system.";
      localStorage.setItem("user", JSON.stringify(data));
      setTimeout(() => { overlay.style.display = "none"; showPage("dashboard"); applyRole(data.role); loadDashboard(); }, 1200);
    } else {
      overlay.style.display = "none";
      document.getElementById("loginMsg").innerText = "Invalid ID or Password";
    }
  } catch (err) { alert("Login failed!"); location.reload(); }
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function applyRole(role) {
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeName").innerText = "User: " + user.userId;
  document.getElementById("userRole").innerText = "Access Level: " + role;
}

async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();
    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;

    let html = "";
    (data.recent || []).forEach(r => {
      html += `
        <div class="file-item" onclick="goToSearch('${r.ic}')" style="cursor:pointer; border-left: 4px solid #007bff;">
          <div style="font-weight:700; margin-bottom:2px; font-size:14px;">IC: ${r.ic}</div>
          <div style="font-size:11px; color:#64748b;">Acc: ${r.account} • ${r.total} Files • By: ${r.user}</div>
          <div style="font-size:10px; margin-top:4px; color:#94a3b8; text-align:right;">${r.time}</div>
        </div>`;
    });
    document.getElementById("recentList").innerHTML = html || '<p style="font-size:12px; color:#94a3b8;">No activity today</p>';
  } catch (e) { console.error(e); }
}

async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  if (!ic || !account || selectedFiles.length === 0) { alert("Please complete all fields!"); return; }

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  document.getElementById("modalIcon").style.display = "block";
  document.getElementById("successSvg").style.display = "none";
  document.getElementById("modalTitle").innerText = "Uploading Files...";
  document.getElementById("okBtn").style.display = "none";

  try {
    let filesData = await Promise.all(selectedFiles.map(async (file) => {
      let processedFile = file;
      if (file.type.startsWith("image/")) { processedFile = await compressImage(file); }
      let base64 = await toBase64(processedFile);
      return { name: processedFile.name, type: processedFile.type, data: base64.split(",")[1] };
    }));

    const user = JSON.parse(localStorage.getItem("user"));
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ ic, account, userId: user.userId, files: filesData })
    });

    document.getElementById("modalIcon").style.display = "none";
    document.getElementById("successSvg").style.display = "block";
    document.getElementById("modalTitle").innerText = "Upload Success";
    document.getElementById("modalSub").innerText = "Your documents have been saved.";
    document.getElementById("okBtn").style.display = "block";
  } catch (err) { alert("Upload Failed!"); location.reload(); }
}

async function compressImage(file) {
  if (file.size <= 1 * 1024 * 1024) return file;
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let scale = Math.min(1200 / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: "image/jpeg" })), "image/jpeg", 0.7);
    };
    reader.readAsDataURL(file);
  });
}

async function search() {
  const ic = document.getElementById("searchIC").value.trim();
  if (!ic) return;
  document.getElementById("result").innerHTML = '<div style="text-align:center; padding:20px;"><div class="modal-icon loading"></div> Searching...</div>';
  
  const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}&_=${Date.now()}`);
  const data = await res.json();
  let html = data.length === 0 ? '<div style="text-align:center; color:#ef4444; font-size:14px;">No records found.</div>' : "";
  
  let grouped = {};
  data.forEach(d => { if(!grouped[d.account]) grouped[d.account] = []; grouped[d.account].push(d); });

  Object.keys(grouped).forEach(acc => {
    let files = grouped[acc];
    html += `<div class="file-item" style="border-top: 3px solid #007bff; background: #fff;">
      <div style="font-weight:700; color:#1e2a38; font-size:14px;">📁 Account: ${acc} <span style="font-weight:400; font-size:11px; color:#64748b;">(${files.length} files)</span></div>
      <div style="margin-top:10px; display:grid; gap:8px;">`;
    files.forEach(f => {
      html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#f8fafc; padding:10px; border-radius:8px; font-size:12px; border: 1px solid #edf2f7;">
        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;">📄 ${f.file}</span>
        <a href="${f.url}" target="_blank" style="color:#007bff; text-decoration:none; font-weight:700;">View 👁️</a>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("result").innerHTML = html;
}

function closeModal() { location.reload(); }
function goToSearch(ic) { showPage("search"); document.getElementById("searchIC").value = ic; search(); }

function formatIC(val) {
  val = val.replace(/[^0-9a-zA-Z]/g, "");
  if (/[a-zA-Z]/.test(val)) return val.toUpperCase();
  val = val.substring(0, 12);
  let p1 = val.substring(0,6), p2 = val.substring(6,8), p3 = val.substring(8,12);
  let res = p1;
  if(p2) res += "-" + p2;
  if(p3) res += "-" + p3;
  return res;
}

function handleICInput(e) {
  const input = e.target;
  let start = input.selectionStart, oldLen = input.value.length;
  let formatted = formatIC(input.value);
  input.value = formatted;
  let newPos = start + (formatted.length - oldLen);
  input.setSelectionRange(newPos, newPos);
}

document.getElementById("ic").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("keypress", (e) => { if(e.key === "Enter") search(); });
document.getElementById("account").addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, "").substring(0,12); });

window.addEventListener("load", () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) { showPage("login"); } else {
    const lastPage = localStorage.getItem("activePage") || "dashboard";
    showPage(lastPage); applyRole(user.role); loadDashboard();
  }
});
</script>

</body>
</html>
