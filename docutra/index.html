<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuTrack System | Professional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #007bff;
      --primary-grad: linear-gradient(135deg, #00bfff, #007bff);
      --dark: #1e2a38;
      --bg: #f4f7fa;
      --white: #ffffff;
      --text-main: #2d3436;
      --text-muted: #636e72;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    /* ===== LAYOUT ===== */
    .app { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR (DESKTOP) ===== */
    .sidebar {
      width: 260px;
      background: var(--dark);
      color: white;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 5px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .sidebar .brand-sub {
      font-size: 11px;
      text-align: center;
      color: #8899a6;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sidebar button {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 10px;
      border: none;
      background: transparent;
      color: #94a3b8;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar button.active {
      background: var(--primary-grad);
      color: white;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
    }

    .sidebar button:not(.active):hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
      transform: translateX(5px);
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
      transition: all 0.3s;
    }

    .box {
      background: var(--white);
      padding: 30px;
      margin-bottom: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.03);
    }

    h3 {
      margin: 0 0 20px 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dark);
    }

    /* ===== INPUTS & BUTTONS ===== */
    .row { display: flex; gap: 15px; margin-bottom: 15px; }
    
    input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
      background: #f8fafc;
    }

    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
    }

    button.action {
      background: var(--primary-grad);
      color: white;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 8px 20px rgba(0, 123, 255, 0.2);
      transition: all 0.3s;
    }

    button.action:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0, 123, 255, 0.3);
    }

    button.action:active { transform: scale(0.98); }

    /* ===== KPI CARDS ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .kpi {
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      border-left: 5px solid var(--primary);
      transition: transform 0.3s;
    }

    .kpi:hover { transform: translateY(-5px); }

    .kpi-title { font-size: 13px; color: var(--text-muted); font-weight: 600; }
    .kpi-value { font-size: 28px; font-weight: 800; color: var(--dark); margin-top: 5px; }

    /* ===== FILE ITEMS ===== */
    .file-item {
      background: #f8fafc;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #edf2f7;
      transition: all 0.2s;
    }

    .file-item:hover {
      background: #fff;
      border-color: var(--primary);
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    /* ===== MOBILE NAV ===== */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      background: rgba(30, 42, 56, 0.95);
      backdrop-filter: blur(15px);
      padding: 12px;
      border-radius: 24px;
      justify-content: space-around;
      z-index: 1000;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .bottom-nav button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      transition: all 0.3s;
    }

    .bottom-nav button.active {
      color: #00bfff;
      transform: translateY(-5px);
    }

    .mobile-header {
      display: none;
      background: var(--dark);
      color: white;
      padding: 18px;
      text-align: center;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .bottom-nav { display: flex; }
      .mobile-header { display: block; }
      .main { padding: 20px 15px 100px; }
      .row { flex-direction: column; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ===== OVERLAY & MODAL ===== */
    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal {
      background: white;
      padding: 35px;
      border-radius: 24px;
      text-align: center;
      width: 85%;
      max-width: 350px;
      animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalPop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-icon.loading {
      width: 50px; height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* SVG Success Animation */
    .check-svg { width: 80px; height: 80px; margin: 0 auto 15px; }
    .check-circle { stroke: #10b981; stroke-width: 2; stroke-dasharray: 160; stroke-dashoffset: 160; animation: draw 0.5s forwards; }
    .check-mark { stroke: #10b981; stroke-width: 3; stroke-dasharray: 50; stroke-dashoffset: 50; animation: draw 0.3s 0.5s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

  </style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR (DESKTOP) -->
  <div class="sidebar">
    <h2>📂 DocuTrack</h2>
    <div class="brand-sub">Management System</div>
    
    <button onclick="showPage('dashboard', this, true)" class="active"><span>🏠</span> Dashboard</button>
    <button onclick="showPage('upload', this)"><span>⬆️</span> Upload File</button>
    <button onclick="showPage('search', this)"><span>🔍</span> Cari Dokumen</button>
    
    <div style="flex: 1;"></div>
    
    <button onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; margin-bottom: 20px;">
      <span>🔓</span> Logout
    </button>
    
    <div style="font-size: 10px; text-align: center; opacity: 0.5;">
      Powered by <a href="https://sczpnet.org" style="color: inherit;">sczpnet.org</a>
    </div>
  </div>

  <div class="mobile-header">📂 DocuTrack System</div>

  <div class="main">
    <!-- LOGIN BOX -->
    <div id="login" class="box" style="display:none; max-width:400px; margin: 60px auto;">
      <h3 style="text-align:center;">🔐 Log Masuk</h3>
      <div style="display:flex; flex-direction:column; gap:15px;">
        <input type="text" id="userId" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">
        <button class="action" onclick="login()">Masuk Sekarang</button>
        <p id="loginMsg" style="color:red; text-align:center; font-size:13px;"></p>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="box">
      <h3>📊 Statistik Sistem</h3>
      
      <div style="margin-bottom: 25px; padding: 15px; background: #f0f7ff; border-radius: 12px;">
        <div id="welcomeName" style="font-weight:700; color: var(--primary);"></div>
        <div id="userRole" style="font-size:12px; color:#64748b; font-weight:600;"></div>
      </div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-title">JUMLAH DOKUMEN</div>
          <div class="kpi-value" id="kpiDocs">0</div>
        </div>
        <div class="kpi" style="border-left-color: #f59e0b;">
          <div class="kpi-title">BILANGAN IC</div>
          <div class="kpi-value" id="kpiIC">0</div>
        </div>
        <div class="kpi" style="border-left-color: #10b981;">
          <div class="kpi-title">AKAUN AKTIF</div>
          <div class="kpi-value" id="kpiAcc">0</div>
        </div>
        <div class="kpi" style="border-left-color: #8b5cf6;">
          <div class="kpi-title">UPLOAD HARI INI</div>
          <div class="kpi-value" id="kpiToday">0</div>
        </div>
      </div>

      <div style="margin-top:40px;">
        <h3 style="font-size:16px;">🕒 Aktiviti Terkini</h3>
        <div id="recentList"></div>
      </div>
    </div>

    <!-- UPLOAD SECTION -->
    <div id="upload" class="box" style="display:none;">
      <h3>📤 Muat Naik Dokumen</h3>
      <div class="row">
        <input type="text" id="ic" placeholder="No. Kad Pengenalan">
        <input type="text" id="account" placeholder="No. Akaun" inputmode="numeric">
      </div>
      
      <div style="margin: 20px 0;">
        <label style="display:block; margin-bottom:10px; font-weight:600; font-size:14px;">Pilih Fail (Max 4):</label>
        <input type="file" id="files" multiple style="padding: 10px; background: none; border: 1px dashed #cbd5e1;">
      </div>

      <div id="fileList" style="margin-bottom:20px;"></div>
      <button class="action" onclick="upload()">Mula Muat Naik</button>
      <p id="msg" style="text-align:center; font-size:13px; margin-top:10px;"></p>
    </div>

    <!-- SEARCH SECTION -->
    <div id="search" class="box" style="display:none;">
      <h3>🔍 Carian Dokumen</h3>
      <div style="display:flex; gap:10px; margin-bottom:30px;">
        <input type="text" id="searchIC" placeholder="Masukkan No. IC untuk carian...">
        <button class="action" style="width:120px;" onclick="search()">Cari</button>
      </div>
      <div id="result"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV (MOBILE) -->
<div class="bottom-nav">
  <button onclick="showPage('dashboard', this, true)" class="active">🏠<br>Home</button>
  <button onclick="showPage('upload', this)">⬆️<br>Upload</button>
  <button onclick="showPage('search', this)">🔍<br>Search</button>
  <button onclick="logout()">🔓<br>Logout</button>
</div>

<!-- OVERLAY LOADING/SUCCESS -->
<div id="overlay">
  <div class="modal">
    <div id="modalIconContainer">
      <div class="modal-icon loading" id="modalIcon"></div>
      <svg class="check-svg" id="successSvg" viewBox="0 0 52 52" style="display:none;">
        <circle class="check-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="check-mark" fill="none" d="M14 27l7 7 16-16"/>
      </svg>
    </div>
    <div id="modalTitle" style="font-weight:700; font-size:18px; margin-bottom:8px;">Memproses...</div>
    <div id="modalSub" style="font-size:14px; color:#64748b; margin-bottom:20px;">Sila tunggu sebentar</div>
    <button id="okBtn" class="action" onclick="closeModal()" style="display:none;">Tutup</button>
  </div>
</div>

<script>
// SEMUA LOGIK ASAL DIKEKALKAN 100%
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

function showPage(page, el, isClick = false) {
  localStorage.setItem("activePage", page);
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("upload").style.display = "none";
  document.getElementById("search").style.display = "none";
  document.getElementById("login").style.display = "none";
  document.getElementById(page).style.display = "block";

  document.querySelectorAll(".sidebar button, .bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if (el) el.classList.add("active");

  if (page === "search") {
    document.getElementById("result").innerHTML = "";
    document.getElementById("searchIC").value = "";
  }
  if (page === "upload") {
    document.getElementById("ic").value = "";
    document.getElementById("account").value = "";
    document.getElementById("files").value = "";
    selectedFiles = [];
    renderFileList();
  }
  if (page === "dashboard" && isClick) location.reload();

  const user = JSON.parse(localStorage.getItem("user"));
  if (!user && page !== "login") { showPage("login"); return; }

  // UI Control
  const sidebar = document.querySelector(".sidebar");
  const bnav = document.querySelector(".bottom-nav");
  if (page === "login") {
    sidebar.style.display = "none";
    bnav.style.display = "none";
  } else if (window.innerWidth <= 768) {
    sidebar.style.display = "none";
    bnav.style.display = "flex";
  } else {
    sidebar.style.display = "flex";
    bnav.style.display = "none";
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  let newFiles = Array.from(e.target.files);
  selectedFiles = selectedFiles.concat(newFiles);
  if (selectedFiles.length > 4) {
    alert("Maksimum 4 fail sahaja!");
    selectedFiles = selectedFiles.slice(0, 4);
  }
  renderFileList();
  this.value = "";
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  selectedFiles.forEach((file, index) => {
    let sizeKB = (file.size / 1024).toFixed(1);
    list.innerHTML += `
      <div style="background:#f1f5f9; padding:12px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:13px;"><strong>📄 ${file.name}</strong><br><span style="color:#64748b;">${sizeKB} KB</span></div>
        <button onclick="removeFile(${index})" style="background:#fee2e2; border:none; color:#ef4444; padding:6px 10px; border-radius:8px; cursor:pointer; font-weight:bold;">✕</button>
      </div>`;
  });
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderFileList();
}

async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  if(!userId || !password) return;

  const overlay = document.getElementById("overlay");
  const modalIcon = document.getElementById("modalIcon");
  const successSvg = document.getElementById("successSvg");
  
  overlay.style.display = "flex";
  modalIcon.style.display = "block";
  successSvg.style.display = "none";
  document.getElementById("modalTitle").innerText = "Mengesahkan...";
  document.getElementById("okBtn").style.display = "none";

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", userId, password })
    });
    const data = await res.json();
    if (data.status === "success") {
      modalIcon.style.display = "none";
      successSvg.style.display = "block";
      document.getElementById("modalTitle").innerText = "Berhasil!";
      document.getElementById("modalSub").innerText = "Selamat datang kembali.";
      localStorage.setItem("user", JSON.stringify(data));
      setTimeout(() => { overlay.style.display = "none"; showPage("dashboard"); applyRole(data.role); loadDashboard(); }, 1200);
    } else {
      overlay.style.display = "none";
      document.getElementById("loginMsg").innerText = "ID atau Kata Laluan Salah";
    }
  } catch (err) { alert("Login failed!"); location.reload(); }
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function applyRole(role) {
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeName").innerText = "Nama Pengguna: " + user.userId;
  document.getElementById("userRole").innerText = "Akses Tahap: " + role;
}

async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();
    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;

    let html = "";
    (data.recent || []).forEach(r => {
      html += `
        <div class="file-item" onclick="goToSearch('${r.ic}')" style="cursor:pointer; border-left: 4px solid #007bff;">
          <div style="font-weight:700; margin-bottom:4px;">No. IC: ${r.ic}</div>
          <div style="font-size:12px; color:#64748b;">Akaun: ${r.account} • ${r.total} Fail • Oleh: ${r.user}</div>
          <div style="font-size:11px; margin-top:5px; color:#94a3b8;">${r.time}</div>
        </div>`;
    });
    document.getElementById("recentList").innerHTML = html || '<p style="font-size:12px; color:#94a3b8;">Tiada aktiviti hari ini</p>';
  } catch (e) { console.error(e); }
}

async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  if (!ic || !account || selectedFiles.length === 0) { alert("Lengkapkan maklumat fail!"); return; }

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  document.getElementById("modalIcon").style.display = "block";
  document.getElementById("successSvg").style.display = "none";
  document.getElementById("modalTitle").innerText = "Sedang Memuat Naik...";
  document.getElementById("okBtn").style.display = "none";

  try {
    let filesData = await Promise.all(selectedFiles.map(async (file) => {
      let processedFile = file;
      if (file.type.startsWith("image/")) { processedFile = await compressImage(file); }
      let base64 = await toBase64(processedFile);
      return { name: processedFile.name, type: processedFile.type, data: base64.split(",")[1] };
    }));

    const user = JSON.parse(localStorage.getItem("user"));
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ ic, account, userId: user.userId, files: filesData })
    });

    document.getElementById("modalIcon").style.display = "none";
    document.getElementById("successSvg").style.display = "block";
    document.getElementById("modalTitle").innerText = "Upload Berhasil!";
    document.getElementById("modalSub").innerText = "Dokumen anda telah selamat disimpan.";
    document.getElementById("okBtn").style.display = "block";
  } catch (err) { alert("Upload Gagal!"); location.reload(); }
}

async function compressImage(file) {
  if (file.size <= 2 * 1024 * 1024) return file;
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let scale = Math.min(1280 / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: "image/jpeg" })), "image/jpeg", 0.7);
    };
    reader.readAsDataURL(file);
  });
}

async function search() {
  const ic = document.getElementById("searchIC").value.trim();
  if (!ic) return;
  document.getElementById("result").innerHTML = '<div style="text-align:center; padding:20px;"><div class="modal-icon loading"></div> Mencari data...</div>';
  
  const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}&_=${Date.now()}`);
  const data = await res.json();
  let html = data.length === 0 ? '<div style="text-align:center; color:#ef4444;">Tiada rekod dijumpai.</div>' : "";
  
  let grouped = {};
  data.forEach(d => { if(!grouped[d.account]) grouped[d.account] = []; grouped[d.account].push(d); });

  Object.keys(grouped).forEach(acc => {
    let files = grouped[acc];
    html += `<div class="file-item" style="border-top: 3px solid #007bff;">
      <div style="font-weight:700; color:#1e2a38;">📁 Akaun: ${acc} <span style="font-weight:400; font-size:12px; color:#64748b;">(${files.length} fail)</span></div>
      <div style="margin-top:10px; display:grid; gap:8px;">`;
    files.forEach(f => {
      html += `<div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:8px 12px; border-radius:8px; font-size:13px; border: 1px solid #edf2f7;">
        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;">📄 ${f.file}</span>
        <a href="${f.url}" target="_blank" style="color:#007bff; text-decoration:none; font-weight:600;">Lihat 👁️</a>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("result").innerHTML = html;
}

function closeModal() { location.reload(); }
function goToSearch(ic) { showPage("search"); document.getElementById("searchIC").value = ic; search(); }

// Formatting Functions
function formatIC(val) {
  val = val.replace(/[^0-9a-zA-Z]/g, "");
  if (/[a-zA-Z]/.test(val)) return val.toUpperCase();
  val = val.substring(0, 12);
  let p1 = val.substring(0,6), p2 = val.substring(6,8), p3 = val.substring(8,12);
  let res = p1;
  if(p2) res += "-" + p2;
  if(p3) res += "-" + p3;
  return res;
}

function handleICInput(e) {
  const input = e.target;
  let start = input.selectionStart, oldLen = input.value.length;
  let formatted = formatIC(input.value);
  input.value = formatted;
  let newPos = start + (formatted.length - oldLen);
  input.setSelectionRange(newPos, newPos);
}

document.getElementById("ic").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("keypress", (e) => { if(e.key === "Enter") search(); });
document.getElementById("account").addEventListener("input", (e) => { e.target.value = e.target.value.replace(/\D/g, "").substring(0,12); });

window.addEventListener("load", () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) { showPage("login"); } else {
    const lastPage = localStorage.getItem("activePage") || "dashboard";
    showPage(lastPage); applyRole(user.role); loadDashboard();
  }
});
</script>
