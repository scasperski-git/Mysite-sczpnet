<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DocuTrack System</title>

<style>
:root {
  --primary: #007bff;
  --accent: #00bfff;
  --dark: #1e2a38;
  --bg: #eef2f7;
  --white: #ffffff;
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
  --radius: 16px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg);
  color: #333;
  overflow-x: hidden;
}

.app { display: flex; min-height: 100vh; width: 100%; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: var(--dark);
  color: white;
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}

.sidebar h2 { text-align: center; margin-bottom: 5px; font-size: 1.2rem; }
.sidebar p { text-align: center; color: #aaa; font-size: 11px; margin-bottom: 30px; }

.sidebar button {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: #cfd8e3;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}

.sidebar button.active {
  background: linear-gradient(135deg, #00bfff, #007bff);
  color: white;
}

/* ===== MAIN AREA ===== */
.main { 
  flex: 1; 
  padding: 30px; 
  width: 100%;
  transition: all 0.3s;
}

.box {
  background: var(--white);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

/* KPI CARDS */
.kpi-container {
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
  gap: 15px;
  margin-bottom: 20px;
}

.kpi {
  background: linear-gradient(135deg, #00bfff, #007bff);
  color: white;
  padding: 18px;
  border-radius: 14px;
}

.kpi-title { font-size: 10px; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
.kpi-value { font-size: 24px; font-weight: bold; }

/* INPUTS */
.row { display: flex; gap: 10px; margin-bottom: 15px; }
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
  outline: none;
}

button.action {
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 15px;
  width: 100%;
  cursor: pointer;
  font-weight: bold;
}

/* ===== MOBILE OVERRIDES - THE FIX ===== */
.mobile-header { display: none; }
.bottom-nav { display: none; }

@media (max-width: 768px) {
  /* Force hide sidebar */
  .sidebar { 
    display: none !important; 
  }
  
  .app { display: block; }

  .mobile-header {
    display: block; 
    background: var(--dark);
    color: white; 
    padding: 15px; 
    text-align: center; 
    font-weight: bold;
    font-size: 1.1rem;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .main { 
    padding: 15px; 
    padding-bottom: 100px; /* Space for bottom nav */
  }

  .row { flex-direction: column; }

  .bottom-nav {
    display: flex; 
    position: fixed; 
    bottom: 15px; 
    left: 15px; 
    right: 15px;
    background: var(--dark);
    padding: 10px; 
    justify-content: space-around; 
    z-index: 999; 
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .bottom-nav button {
    background: none; 
    border: none; 
    color: #999; 
    font-size: 10px;
    transition: 0.2s;
  }

  .bottom-nav button.active { 
    color: var(--accent); 
    transform: translateY(-2px);
  }
}

/* STATUS MODAL */
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  display: none; justify-content: center; align-items: center; z-index: 9999;
}
.modal {
  background: white; padding: 25px; border-radius: 20px; text-align: center;
  width: 85%; max-width: 300px;
}
.search-loader {
  width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary);
  border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="app">
  <div class="sidebar" id="sidebarContainer">
    <h2>📂 DocuTrack</h2>
    <p>v3.0 Master System</p>
    <button id="side-dash" onclick="showPage('dashboard', this, true)" class="active">🏠 Dashboard</button>
    <button id="side-up" onclick="showPage('upload', this)">⬆️ Upload</button>
    <button id="side-search" onclick="showPage('search', this)">🔍 Search</button>
    <div style="flex-grow: 1;"></div>
    <button onclick="logout()" style="background:#ff4d4f; color:white;">🔓 Logout</button>
  </div>

  <div class="mobile-header">📂 DocuTrack System</div>
  
  <div class="main">
    <div id="login" class="box" style="display:none; max-width:400px; margin:20px auto;">
      <h3 style="text-align:center;">🔐 Secure Login</h3>
      <input type="text" id="userId" placeholder="User ID">
      <input type="password" id="password" placeholder="Password">
      <button class="action" onclick="login()">Login</button>
      <p id="loginMsg" style="color:red; text-align:center; font-size:12px;"></p>
    </div>

    <div id="dashboard" class="box">
      <div style="margin-bottom:15px;">
        <div id="welcomeName" style="font-weight:bold; font-size:1.2rem;">Welcome</div>
        <div id="userRole" style="font-size:11px; color:#666;">Loading role...</div>
      </div>

      <div class="kpi-container">
        <div class="kpi"><div class="kpi-title">Documents</div><div class="kpi-value" id="kpiDocs">0</div></div>
        <div class="kpi"><div class="kpi-title">IC Records</div><div class="kpi-value" id="kpiIC">0</div></div>
        <div class="kpi"><div class="kpi-title">Accounts</div><div class="kpi-value" id="kpiAcc">0</div></div>
        <div class="kpi"><div class="kpi-title">Uploaded Today</div><div class="kpi-value" id="kpiToday">0</div></div>
      </div>

      <div style="font-weight:bold; margin-bottom:10px;">🕒 Recent Activity</div>
      <div id="recentList"></div>
    </div>

    <div id="upload" class="box" style="display:none;">
      <h3>📤 New Upload</h3>
      <div class="row">
        <input type="text" id="ic" placeholder="IC No">
        <input type="text" id="account" placeholder="Account No" inputmode="numeric">
      </div>
      <input type="file" id="files" multiple>
      <div id="fileList" style="margin-top:10px;"></div>
      <button class="action" onclick="upload()" style="margin-top:15px;">Start Upload</button>
    </div>

    <div id="search" class="box" style="display:none;">
      <h3>🔍 Search</h3>
      <div class="row">
        <input type="text" id="searchIC" placeholder="Search IC No">
        <button class="action" onclick="search()" style="flex:0 0 80px;">Go</button>
      </div>
      <div id="result"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button id="nav-dash" onclick="showPage('dashboard', this, true)" class="active">🏠<br>Home</button>
  <button id="nav-up" onclick="showPage('upload', this)">⬆️<br>Upload</button>
  <button id="nav-search" onclick="showPage('search', this)">🔍<br>Search</button>
  <button onclick="logout()">🔓<br>Logout</button>
</div>

<div id="overlay">
  <div class="modal">
    <div class="search-loader"></div>
    <div id="modalTitle" style="font-weight:bold;">Processing...</div>
    <div id="modalSub" style="font-size:12px; color:#666; margin-top:5px;">Please wait</div>
    <button id="okBtn" class="action" onclick="location.reload()" style="display:none; margin-top:15px; padding:10px;">OK</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

/* ===== LOGIC - UNCHANGED ===== */
function showPage(page, el, isClick = false) {
  localStorage.setItem("activePage", page);
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("upload").style.display = "none";
  document.getElementById("search").style.display = "none";
  document.getElementById("login").style.display = "none";
  document.getElementById(page).style.display = "block";

  document.querySelectorAll(".sidebar button, .bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if(el) el.classList.add("active");
  
  if (page === "dashboard" && isClick) { location.reload(); }
}

async function login() {
  const u = document.getElementById("userId").value;
  const p = document.getElementById("password").value;
  document.getElementById("overlay").style.display = "flex";
  try {
    const res = await fetch(WEB_APP_URL, {method:"POST", body:JSON.stringify({action:"login", userId:u, password:p})});
    const data = await res.json();
    if(data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));
      location.reload();
    } else {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("loginMsg").innerText = "Invalid Login";
    }
  } catch(e) { alert("Error"); location.reload(); }
}

function logout() { localStorage.removeItem("user"); location.reload(); }

async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();
    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;
    let h = "";
    (data.recent || []).forEach(r => {
      h += `<div class="box" onclick="goToSearch('${r.ic}')" style="font-size:11px; padding:10px; cursor:pointer;">
        <b>IC:</b> ${r.ic} | <b>Acc:</b> ${r.account}<br>
        <small>${r.time} by ${r.user}</small>
      </div>`;
    });
    document.getElementById("recentList").innerHTML = h;
  } catch(e) {}
}

let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  selectedFiles = Array.from(e.target.files).slice(0, 4);
  renderFileList();
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = selectedFiles.map(f => `<div style="font-size:11px;">📄 ${f.name}</div>`).join('');
}

async function upload() {
  const ic = document.getElementById("ic").value;
  const acc = document.getElementById("account").value;
  if(!ic || !acc || selectedFiles.length === 0) return alert("Fill all fields");
  
  document.getElementById("overlay").style.display = "flex";
  const user = JSON.parse(localStorage.getItem("user"));
  
  const filesData = await Promise.all(selectedFiles.map(async f => {
    const base64 = await toBase64(f);
    return { name: f.name, type: f.type, data: base64.split(",")[1] };
  }));

  await fetch(WEB_APP_URL, {method:"POST", body:JSON.stringify({ic, account:acc, userId:user.userId, files:filesData})});
  document.querySelector(".search-loader").style.display = "none";
  document.getElementById("modalTitle").innerText = "Success!";
  document.getElementById("okBtn").style.display = "block";
}

function toBase64(file) {
  return new Promise((r, j) => {
    const reader = new FileReader();
    reader.onload = () => r(reader.result);
    reader.readAsDataURL(file);
  });
}

async function search() {
  const ic = document.getElementById("searchIC").value;
  document.getElementById("result").innerHTML = "Searching...";
  const res = await fetch(`${WEB_APP_URL}?ic=${ic}`);
  const data = await res.json();
  let h = "";
  data.forEach(f => {
    h += `<div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
      <b>Acc: ${f.account}</b><br><small>${f.file}</small><br>
      <a href="${f.url}" target="_blank">View File</a>
    </div>`;
  });
  document.getElementById("result").innerHTML = h || "No results";
}

function goToSearch(ic) {
  document.getElementById("searchIC").value = ic;
  showPage('search', document.getElementById('nav-search'));
  search();
}

window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if(!user) { showPage("login"); }
  else {
    document.getElementById("welcomeName").innerText = "👤 Welcome, " + user.userId;
    document.getElementById("userRole").innerText = "Role: " + user.role;
    showPage(localStorage.getItem("activePage") || "dashboard");
    loadDashboard();
  }
};
</script>
</body>
</html>
