<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>DocuTrack System</title>

<style>
/* ===== GLOBAL VARIABLES & RESET ===== */
:root {
  --primary: #0088ff;
  --primary-hover: #0066cc;
  --bg-color: #f4f7fe;
  --sidebar-bg: #0b1437;
  --text-main: #2b3674;
  --text-muted: #a3aed1;
  --card-bg: #ffffff;
  --border-radius: 20px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
  
body {
  background: var(--bg-color);
  color: var(--text-main);
  overflow-x: hidden;
}

button {
  transition: var(--transition);
}

/* ===== LAYOUT ===== */
.app {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR (DESKTOP) ===== */
.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  color: white;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  z-index: 100;
}

.sidebar > div:first-child {
  flex: 1;
}

.menu {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sidebar h2 {
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 5px;
}

.sidebar p {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.sidebar button {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 18px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
}

.sidebar button.active {
  background: linear-gradient(135deg, var(--primary), #4318FF);
  color: white;
  box-shadow: 0 10px 20px rgba(67, 24, 255, 0.2);
}

.logout-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 14px;
  border: none;
  background: rgba(239, 68, 68, 0.1);
  color: #ef4444;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 16px;
}

.sidebar-footer {
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.4);
}

/* ===== MAIN AREA ===== */
.main {
  flex: 1;
  padding: 40px 30px;
  margin-left: 260px;
  max-width: 1200px;
}

.box {
  background: var(--card-bg);
  padding: 30px;
  margin-bottom: 24px;
  border-radius: var(--border-radius);
  box-shadow: 0 18px 40px rgba(112, 144, 176, 0.08);
  border: 1px solid rgba(226, 232, 240, 0.6);
  animation: fadeIn 0.4s ease;
}

.box h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ===== INPUTS ===== */
.row { display: flex; gap: 16px; margin-bottom: 16px; }
input {
  width: 100%; padding: 14px 18px; border-radius: 12px;
  border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 14px;
  outline: none; transition: var(--transition);
}
input:focus { border-color: var(--primary); background: #fff; }

button.action {
  background: linear-gradient(135deg, var(--primary), #4318FF);
  color: white; font-weight: 600; border: none; border-radius: 12px;
  padding: 14px; width: 100%; cursor: pointer;
}

/* ===== KPI CARDS (2x2 Grid optimized) ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.kpi {
  color: white; padding: 16px; border-radius: 16px;
  display: flex; flex-direction: column; gap: 4px; position: relative; overflow: hidden;
}

.kpi-title { font-size: 12px; font-weight: 600; opacity: 0.85; display: flex; align-items: center; gap: 4px; }
.kpi-value { font-size: 22px; font-weight: 700; }

.kpi-docs { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
.kpi-ic { background: linear-gradient(135deg, #10b981, #047857); }
.kpi-acc { background: linear-gradient(135deg, #f59e0b, #b45309); }
.kpi-today { background: linear-gradient(135deg, #0ea5e9, #0369a1); }

/* ===== FILE LISTINGS (SEARCH/RECENT) ===== */
.file-item {
  background: #ffffff; border: 1px solid #e2e8f0;
  padding: 14px; border-radius: 14px; margin-bottom: 12px;
}

/* Requested: Shrink font sizes in results */
.result-meta {
  font-size: 11px; /* Smaller font */
  color: #64748b;
  margin-top: 6px;
  background: #f8fafc;
  padding: 8px;
  border-radius: 8px;
  line-height: 1.4;
}

.file-name {
  font-size: 12px; /* Smaller font */
  font-weight: 500;
  color: var(--text-main);
  word-break: break-all;
}

.view-link {
  background: var(--bg-color); color: var(--primary);
  padding: 4px 10px; border-radius: 6px; text-decoration: none;
  font-size: 11px; font-weight: 700;
}

/* ===== MOBILE ADAPTATION ===== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px 16px 100px 16px; }
  .mobile-header {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px; background: #fff; position: sticky; top: 0; z-index: 100;
    font-weight: 700; border-bottom: 1px solid #e2e8f0;
  }
  
  /* Task: KPI grid 2x2 for mobile */
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .kpi { padding: 12px; }
  .kpi-value { font-size: 18px; }
  .kpi-title { font-size: 11px; }

  .bottom-nav {
    display: flex; position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid #e2e8f0; justify-content: space-around; z-index: 1000;
  }
  .bottom-nav button {
    background: none; border: none; color: #94a3b8; font-size: 11px;
    display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
  }
  .bottom-nav button.active { color: var(--primary); font-weight: 700; }
  .bottom-nav i { font-size: 22px; }
}

/* Modals & Overlays */
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(11, 20, 55, 0.6); backdrop-filter: blur(6px);
  display: none; justify-content: center; align-items: center; z-index: 9999;
}
.modal { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px; }
.modal-icon.loading { width: 40px; height: 40px; border: 3px solid #f1f5f9; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.dropzone {
  border: 2px dashed #cbd5e1; border-radius: 14px; padding: 30px;
  background: #f8fafc; text-align: center; cursor: pointer; margin-bottom: 16px;
}
.drop-title { font-weight: 700; font-size: 14px; }
.drop-sub { font-size: 12px; color: #64748b; }
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <div>
      <h2><i class="ph-fill ph-folder"></i> DocuTrack</h2>
      <p>INTERNAL SYSTEM</p>
      <div class="menu">
        <button onclick="showPage('dashboard', this, true)"><i class="ph-fill ph-squares-four"></i> Dashboard</button>
        <button onclick="showPage('upload', this)" class="active"><i class="ph-fill ph-cloud-arrow-up"></i> Upload File</button>
        <button onclick="showPage('search', this)"><i class="ph-fill ph-magnifying-glass"></i> Search Doc</button>
      </div>
    </div>
    <button onclick="logout()" class="logout-btn"><i class="ph-fill ph-sign-out"></i> Logout</button>
    <div class="sidebar-footer">© 2026 DocuTrack</div>
  </div>

  <div class="mobile-header"><i class="ph-fill ph-folder" style="color:var(--primary);"></i> DocuTrack</div>

  <div class="main">
    <div id="login" class="box" style="display:none; max-width:400px; margin: 10vh auto;">
      <h3 style="justify-content:center;"><i class="ph-fill ph-lock-key"></i> Login</h3>
      <div style="display:flex; flex-direction:column; gap:12px;">
        <input type="text" id="userId" placeholder="User ID">
        <input type="password" id="password" placeholder="Password">
        <button class="action" onclick="login()">Login</button>
      </div>
      <p id="loginMsg" style="color:red; text-align:center; font-size:13px; margin-top:10px;"></p>
    </div>

    <div id="dashboard" class="box">
      <h3><i class="ph-fill ph-chart-bar"></i> Overview</h3>
      <div id="welcomeName" style="font-weight:700; margin-bottom:4px;"></div>
      <div id="userRole" style="font-size:11px; color:#64748b; margin-bottom:20px; text-transform:uppercase;"></div>

      <div class="kpi-grid">
        <div class="kpi kpi-docs"><div class="kpi-title">Docs</div><div class="kpi-value" id="kpiDocs">0</div></div>
        <div class="kpi kpi-ic"><div class="kpi-title">IC</div><div class="kpi-value" id="kpiIC">0</div></div>
        <div class="kpi kpi-acc"><div class="kpi-title">Acc</div><div class="kpi-value" id="kpiAcc">0</div></div>
        <div class="kpi kpi-today"><div class="kpi-title">Today</div><div class="kpi-value" id="kpiToday">0</div></div>
      </div>

      <div style="margin-top:25px;">
        <div style="font-weight:700; font-size:14px; margin-bottom:12px;">Recent Activity</div>
        <div id="recentList"></div>
      </div>
    </div>

    <div id="upload" class="box" style="display:none;">
      <h3><i class="ph-fill ph-cloud-arrow-up"></i> Upload</h3>
      <div class="row">
        <input type="text" id="ic" placeholder="IC Number">
        <input type="text" id="account" placeholder="Acc No">
      </div>
      <label for="files" class="dropzone">
        <i class="ph-fill ph-file-arrow-up" style="font-size:30px; color:var(--primary);"></i>
        <div class="drop-title">Tap to select files</div>
        <div class="drop-sub">Max 4 files</div>
      </label>
      <input type="file" id="files" multiple style="display:none;">
      <div id="fileList"></div>
      <button class="action" onclick="upload()">Start Upload</button>
    </div>

    <div id="search" class="box" style="display:none;">
      <h3><i class="ph-fill ph-magnifying-glass"></i> Search</h3>
      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="searchIC" placeholder="Search by IC">
        <button class="action" onclick="search()" style="width:100px;">Go</button>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button onclick="showPage('dashboard', this, true)" class="active"><i class="ph-fill ph-squares-four"></i>Home</button>
    <button onclick="showPage('upload', this)"><i class="ph-fill ph-cloud-arrow-up"></i>Upload</button>
    <button onclick="showPage('search', this)"><i class="ph-fill ph-magnifying-glass"></i>Search</button>
    <button onclick="logout()"><i class="ph-fill ph-sign-out"></i>Exit</button>
  </div>
</div>

<div id="overlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcon"></div>
    <div style="font-weight:700; margin-bottom:5px;" id="modalTitle"></div>
    <div style="font-size:12px; color:#64748b; margin-bottom:15px;" id="modalSub"></div>
    <button id="okBtn" onclick="closeModal()" class="action" style="display:none; padding:10px;">Done</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

// Logic flow exactly same as original
function showPage(page, el, isClick = false) {
  localStorage.setItem("activePage", page);
  ["dashboard", "upload", "search", "login"].forEach(p => document.getElementById(p).style.display = "none");
  document.getElementById(page).style.display = "block";
  
  document.querySelectorAll(".sidebar button, .bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if (el) el.classList.add("active");

  if (page === "dashboard" && isClick) location.reload();
}

async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("modalIcon").className = "modal-icon loading";
  document.getElementById("modalTitle").innerText = "Checking...";

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", userId, password })
    });
    const data = await res.json();
    if (data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));
      location.reload();
    } else {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("loginMsg").innerText = "Access Denied";
    }
  } catch (err) { location.reload(); }
}

function logout() { localStorage.removeItem("user"); location.reload(); }

async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();
    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;
    
    let html = "";
    (data.recent || []).forEach(r => {
      html += `
        <div class="file-item" onclick="goToSearch('${r.ic}')">
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size:11px;">
            <div>IC: <b>${r.ic}</b></div>
            <div>Acc: <b>${r.account}</b></div>
          </div>
          <div class="result-meta">Uploaded by <b>${r.user}</b> at ${r.time}</div>
        </div>`;
    });
    document.getElementById("recentList").innerHTML = html || "<p style='font-size:12px; color:#999; text-align:center;'>No data</p>";
  } catch (e) {}
}

let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  selectedFiles = selectedFiles.concat(Array.from(e.target.files)).slice(0, 4);
  renderFileList();
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = selectedFiles.map((f, i) => `
    <div style="display:flex; justify-content:space-between; font-size:12px; background:#f1f5f9; padding:8px; border-radius:8px; margin-bottom:8px;">
      <span>${f.name}</span>
      <span style="color:red; cursor:pointer;" onclick="selectedFiles.splice(${i},1);renderFileList()">Remove</span>
    </div>
  `).join("");
}

async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const acc = document.getElementById("account").value.trim();
  if (!ic || !acc || selectedFiles.length === 0) return alert("Fill all fields");

  document.getElementById("overlay").style.display = "flex";
  document.getElementById("modalIcon").className = "modal-icon loading";
  document.getElementById("modalTitle").innerText = "Uploading...";

  const user = JSON.parse(localStorage.getItem("user"));
  let filesData = await Promise.all(selectedFiles.map(async f => {
    let reader = new FileReader();
    let base64 = await new Promise(res => {
      reader.onload = () => res(reader.result.split(",")[1]);
      reader.readAsDataURL(f);
    });
    return { name: f.name, type: f.type, data: base64 };
  }));

  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ ic, account: acc, userId: user.userId, files: filesData })
    });
    document.getElementById("modalIcon").className = "";
    document.getElementById("modalTitle").innerText = "Success!";
    document.getElementById("okBtn").style.display = "block";
  } catch (e) { location.reload(); }
}

async function search() {
  const ic = document.getElementById("searchIC").value.trim();
  if (!ic) return;
  document.getElementById("result").innerHTML = "<div class='modal-icon loading'></div>";
  
  const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}`);
  const data = await res.json();
  
  let html = data.length === 0 ? "<p style='font-size:12px; text-align:center;'>Not found</p>" : "";
  let grouped = {};
  data.forEach(d => { if(!grouped[d.account]) grouped[d.account]=[]; grouped[d.account].push(d); });

  Object.keys(grouped).forEach(acc => {
    let files = grouped[acc];
    let latest = files[0];
    html += `
      <div class="file-item">
        <div style="font-weight:700; font-size:13px; margin-bottom:4px;">Acc: ${acc}</div>
        <div class="result-meta">
          Latest Upload: <b>${latest.file.split('_')[1] || ''}</b><br>
          By: <b>${latest.user || 'System'}</b>
        </div>
        <div style="margin-top:10px;">
          ${files.map(f => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <div class="file-name">📄 ${f.file}</div>
              <a href="${f.url}" target="_blank" class="view-link">View</a>
            </div>
          `).join("")}
        </div>
      </div>`;
  });
  document.getElementById("result").innerHTML = html;
}

function goToSearch(ic) {
  showPage("search");
  document.getElementById("searchIC").value = ic;
  search();
}

window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return showPage("login");
  document.getElementById("welcomeName").innerText = "User: " + user.userId;
  document.getElementById("userRole").innerText = "Role: " + user.role;
  showPage(localStorage.getItem("activePage") || "dashboard");
  loadDashboard();
};

function closeModal() { location.reload(); }
</script>
</body>
</html>
