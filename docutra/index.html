<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DocuTrack System</title>

<style>
/* ===== UI ENHANCEMENTS ONLY - LOGIC PRESERVED ===== */
:root {
  --primary: #007bff;
  --accent: #00bfff;
  --dark: #1e2a38;
  --bg: #eef2f7;
  --white: #ffffff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg);
  color: #333;
}

.app { display: flex; min-height: 100vh; }

/* ===== SIDEBAR (DESKTOP) ===== */
.sidebar {
  width: 240px;
  background: var(--dark);
  color: white;
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
}

.sidebar h2 { text-align: center; margin-bottom: 5px; font-size: 1.2rem; }

.sidebar button {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: #cfd8e3;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
}

.sidebar button.active {
  background: linear-gradient(135deg, #00bfff, #007bff);
  color: white;
  box-shadow: 0 4px 15px rgba(0,191,255,0.4);
}

/* ===== MAIN CONTENT ===== */
.main { 
  flex: 1; 
  padding: 25px; 
  max-width: 1200px; 
  margin: 0 auto; 
  width: 100%; 
}

.box {
  background: var(--white);
  padding: 25px;
  margin-bottom: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

/* KPI CARDS */
.kpi-container {
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
  gap: 15px;
  margin-bottom: 25px;
}

.kpi {
  background: linear-gradient(135deg, #00bfff, #007bff);
  color: white;
  padding: 20px;
  border-radius: 14px;
}

.kpi-title { font-size: 11px; opacity: 0.9; text-transform: uppercase; font-weight: bold; }
.kpi-value { font-size: 24px; font-weight: bold; margin-top: 5px; }

/* FORMS */
.row { display: flex; gap: 15px; margin-bottom: 15px; }
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
  outline: none;
}

button.action {
  background: linear-gradient(135deg, #00bfff, #007bff);
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  padding: 16px;
  width: 100%;
  cursor: pointer;
}

/* ===== MOBILE FIXES ===== */
.mobile-header { display: none; }
.bottom-nav { display: none; }

@media (max-width: 768px) {
  .sidebar { display: none !important; }
  .mobile-header {
    display: block; position: sticky; top: 0; background: var(--dark);
    color: white; text-align: center; padding: 15px; font-weight: bold; z-index: 1000;
  }
  .main { padding: 15px; padding-bottom: 100px; }
  .row { flex-direction: column; gap: 10px; }
  
  .bottom-nav {
    display: flex; position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
    width: 92%; background: rgba(30, 42, 56, 0.95); backdrop-filter: blur(10px);
    padding: 12px; justify-content: space-around; z-index: 999; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .bottom-nav button {
    background: none; border: none; color: #aaa; font-size: 11px; flex: 1;
  }
  .bottom-nav button.active { color: var(--accent); font-weight: bold; }
}

/* OVERLAY & MODAL */
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
  display: none; justify-content: center; align-items: center; z-index: 9999;
}
.modal {
  background: white; padding: 30px; border-radius: 20px; text-align: center;
  width: 85%; max-width: 320px;
}
.modal-icon { width: 70px; height: 70px; margin: 0 auto 15px; }
.modal-icon.loading { border: 5px solid #eee; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.check-svg { width: 100%; height: 100%; }
.check-circle { stroke: #00d68f; stroke-width: 3; stroke-dasharray: 160; stroke-dashoffset: 160; fill: none; animation: drawCircle 0.4s ease forwards; }
.check-mark { stroke: #00d68f; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawTick 0.3s ease 0.4s forwards; }
@keyframes drawCircle { to { stroke-dashoffset: 0; } }
@keyframes drawTick { to { stroke-dashoffset: 0; } }
</style>
</head>

<body>

<div class="app">
  <div class="sidebar">
    <h2>📂 DocuTrack</h2>
    <p style="font-size:11px; text-align:center; color:#aaa; margin-bottom:25px;">Document System</p>
    <button onclick="showPage('dashboard', this, true)" class="active">🏠 Dashboard</button>
    <button onclick="showPage('upload', this)">⬆️ Upload</button>
    <button onclick="showPage('search', this)">🔍 Search</button>
    <div style="flex-grow: 1;"></div>
    <button onclick="logout()" style="background:#ff4d4f; color:white;">Logout 🔓</button>
    <div style="text-align: center; font-size: 10px; color: #666; margin-top: 15px;">
      Powered by <a href="https://sczpnet.org" target="_blank" style="color:var(--accent); text-decoration:none;">sczpnet.org</a>
    </div>
  </div>

  <div class="mobile-header">📂 DocuTrack System</div>
  
  <div class="main">
    <div id="login" class="box" style="display:none; max-width:400px; margin:40px auto;">
      <h3 style="text-align:center;">🔐 Login</h3>
      <input type="text" id="userId" placeholder="User ID">
      <input type="password" id="password" placeholder="Password">
      <button class="action" onclick="login()">Login</button>
      <p id="loginMsg" style="color:red; text-align:center; margin-top:10px;"></p>
    </div>

    <div id="dashboard" class="box">
      <h3>📊 DocuTrack Dashboard</h3>
      <div style="margin-bottom:20px;">
        <div id="welcomeName" style="font-weight:bold; font-size:1.1rem;"></div>
        <div id="userRole" style="font-size:12px; color:#777;"></div>
      </div>

      <div class="kpi-container">
        <div class="kpi"><div class="kpi-title">📁 Documents</div><div class="kpi-value" id="kpiDocs">0</div></div>
        <div class="kpi"><div class="kpi-title">👤 IC</div><div class="kpi-value" id="kpiIC">0</div></div>
        <div class="kpi"><div class="kpi-title">🗂 Account</div><div class="kpi-value" id="kpiAcc">0</div></div>
        <div class="kpi"><div class="kpi-title">⬆ Today</div><div class="kpi-value" id="kpiToday">0</div></div>
      </div>

      <div style="margin-top:25px;">
        <div style="font-weight:bold; margin-bottom:12px;">🕒 Recent Activity</div>
        <div id="recentList"></div>
      </div>
    </div>

    <div id="upload" class="box" style="display:none;">
      <h3>Upload Document</h3>
      <div class="row">
        <input type="text" id="ic" placeholder="Enter IC">
        <input type="text" id="account" placeholder="Enter Account No" inputmode="numeric">
      </div>
      <input type="file" id="files" multiple>
      <p style="font-size:12px; color:#666; margin:10px 0;">Maximum 4 files only</p>
      <div id="fileList"></div>
      <button class="action" onclick="upload()">Upload</button>
      <p id="msg"></p>
    </div>

    <div id="search" class="box" style="display:none;">
      <h3>Search by IC</h3>
      <div class="row">
        <input type="text" id="searchIC" placeholder="Enter IC No" maxlength="14">
        <button class="action" onclick="search()" style="flex:0 0 100px;">Search</button>
      </div>
      <div id="result"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button onclick="showPage('dashboard', this, true)" class="active">🏠<br>Home</button>
  <button onclick="showPage('upload', this)">⬆️<br>Upload</button>
  <button onclick="showPage('search', this)">🔍<br>Search</button>
  <button onclick="logout()">🔓<br>Logout</button>
</div>

<div id="overlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcon">
      <svg class="check-svg" viewBox="0 0 52 52" style="display:none;">
        <circle class="check-circle" cx="26" cy="26" r="25" />
        <path class="check-mark" d="M14 27l7 7 16-16" />
      </svg>
    </div>
    <div class="modal-title" id="modalTitle" style="font-weight:bold;">Processing...</div>
    <div class="modal-sub" id="modalSub" style="font-size:13px; color:#666; margin-top:5px;">Please wait</div>
    <button id="okBtn" class="action" onclick="location.reload()" style="display:none; margin-top:15px; padding:10px;">OK</button>
  </div>
</div>

<script>
/* ==========================================================
   YOUR ORIGINAL JAVASCRIPT LOGIC - 100% PRESERVED
   ========================================================== */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyd2deFraEXRG9d6fwghdfd6ZdGFg17-OKWoTHutEl8uHIhWSv33QzHwkgzqBUt6dIPjg/exec";

function showPage(page, el, isClick = false) {
  localStorage.setItem("activePage", page);
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("upload").style.display = "none";
  document.getElementById("search").style.display = "none";
  document.getElementById("login").style.display = "none";
  document.getElementById(page).style.display = "block";
  document.querySelectorAll(".sidebar button, .bottom-nav button").forEach(btn => btn.classList.remove("active"));
  if (el) el.classList.add("active");
  if (page === "search") { document.getElementById("result").innerHTML = ""; document.getElementById("searchIC").value = ""; }
  if (page === "upload") { document.getElementById("ic").value = ""; document.getElementById("account").value = ""; document.getElementById("files").value = ""; document.getElementById("msg").innerText = ""; selectedFiles = []; renderFileList(); }
  if (page === "dashboard" && isClick) { location.reload(); }
  
  if (page === "login") {
    document.querySelector(".sidebar").style.display = "none";
    document.querySelector(".bottom-nav").style.display = "none";
  } else {
    if (window.innerWidth <= 768) {
      document.querySelector(".sidebar").style.setProperty("display", "none", "important");
      document.querySelector(".bottom-nav").style.display = "flex";
    } else {
      document.querySelector(".sidebar").style.display = "block";
      document.querySelector(".bottom-nav").style.display = "none";
    }
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let selectedFiles = [];
document.getElementById("files").addEventListener("change", function(e) {
  let newFiles = Array.from(e.target.files);
  selectedFiles = selectedFiles.concat(newFiles);
  if (selectedFiles.length > 4) { alert("Maximum 4 files only!"); selectedFiles = selectedFiles.slice(0, 4); }
  renderFileList();
  this.value = "";
});

function renderFileList() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  selectedFiles.forEach((file, index) => {
    let sizeKB = (file.size / 1024).toFixed(1);
    list.innerHTML += `<div style="background:#f1f3f7; padding:10px; border-radius:10px; margin-bottom:6px; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
      <div>📄 ${file.name}<br><span style="color:#888; font-size:11px;">${sizeKB} KB</span></div>
      <button onclick="removeFile(${index})" style="background:#ff4d4f; border:none; color:white; padding:5px 8px; border-radius:6px; cursor:pointer;">✕</button>
    </div>`;
  });
}

function removeFile(index) { selectedFiles.splice(index, 1); renderFileList(); }

async function login() {
  const userId = document.getElementById("userId").value;
  const password = document.getElementById("password").value;
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("modalIcon").className = "modal-icon loading";
  document.querySelector(".check-svg").style.display = "none";
  try {
    const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "login", userId: userId, password: password }) });
    const data = await res.json();
    if (data.status === "success") {
      document.getElementById("modalIcon").className = "modal-icon";
      document.querySelector(".check-svg").style.display = "block";
      document.getElementById("modalTitle").innerText = "Access Granted";
      localStorage.setItem("user", JSON.stringify(data));
      setTimeout(() => { document.getElementById("overlay").style.display = "none"; showPage("dashboard"); applyRole(data.role); loadDashboard(); }, 1200);
    } else {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("loginMsg").innerText = "Invalid login";
    }
  } catch (err) { alert("Login failed!"); location.reload(); }
}

function logout() { localStorage.removeItem("user"); location.reload(); }

function applyRole(role) {
  const user = JSON.parse(localStorage.getItem("user"));
  document.getElementById("welcomeName").innerText = "👤 Welcome, " + user.userId;
  document.getElementById("userRole").innerText = "Role: " + role;
}

async function loadDashboard() {
  try {
    const res = await fetch(WEB_APP_URL + "?dashboard=1");
    const data = await res.json();
    document.getElementById("kpiDocs").innerText = data.docs || 0;
    document.getElementById("kpiIC").innerText = data.ic || 0;
    document.getElementById("kpiAcc").innerText = data.account || 0;
    document.getElementById("kpiToday").innerText = data.today || 0;
    let html = "";
    (data.recent || []).forEach(r => {
      html += `<div style="background:#f1f3f7; padding:10px; border-radius:10px; margin-bottom:6px; font-size:12px;">
        👤 <b>IC No :</b> ${r.ic}<br>💳 <b>Account No :</b> ${r.account}<br>📁 <b>Total :</b> ${r.total}<br>
        <span style="font-size:11px; color:#666;">By: ${r.user} | ${r.time}</span>
      </div>`;
    });
    document.getElementById("recentList").innerHTML = html || '<div style="color:#888; font-size:12px;">No activity today</div>';
  } catch (e) { console.error(e); }
}

window.addEventListener("load", function() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) { showPage("login"); return; }
  const savedPage = localStorage.getItem("activePage") || "dashboard";
  showPage(savedPage);
  applyRole(user.role);
  loadDashboard();
});

async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  if (!ic || !account || selectedFiles.length === 0) { alert("Fill all fields!"); return; }
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("modalIcon").className = "modal-icon loading";
  try {
    let filesData = await Promise.all(selectedFiles.map(async (file) => {
      let base64 = await toBase64(file);
      return { name: file.name, type: file.type, data: base64.split(",")[1] };
    }));
    const user = JSON.parse(localStorage.getItem("user"));
    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ ic, account, userId: user.userId, files: filesData }) });
    document.getElementById("modalIcon").className = "modal-icon";
    document.querySelector(".check-svg").style.display = "block";
    document.getElementById("modalTitle").innerText = "Upload Successful";
    document.getElementById("okBtn").style.display = "block";
  } catch (err) { alert("Upload failed!"); location.reload(); }
}

async function search() {
  const ic = document.getElementById("searchIC").value.trim();
  if (!ic) return alert("Enter IC!");
  document.getElementById("result").innerHTML = "Searching...";
  const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}&_=${Date.now()}`);
  const data = await res.json();
  let html = data.length === 0 ? "No record found." : "";
  data.forEach(f => {
    html += `<div style="background:#f8f9fb; padding:12px; border-radius:10px; margin-bottom:10px; border-left:4px solid #00bfff;">
      <b>Account: ${f.account}</b><br><span style="font-size:13px;">📄 ${f.file}</span><br>
      <a href="${f.url}" target="_blank" style="color:#007bff; text-decoration:none; font-size:12px;">👁 View File</a>
    </div>`;
  });
  document.getElementById("result").innerHTML = html;
}

function formatIC(value) {
  value = value.replace(/[^0-9a-zA-Z]/g, "");
  if (/[a-zA-Z]/.test(value)) return value.toUpperCase();
  value = value.substring(0, 12);
  let p1 = value.substring(0, 6), p2 = value.substring(6, 8), p3 = value.substring(8, 12);
  let res = p1;
  if (p2) res += "-" + p2;
  if (p3) res += "-" + p3;
  return res;
}

function handleICInput(e) {
  const input = e.target;
  let start = input.selectionStart, oldLen = input.value.length;
  let formatted = formatIC(input.value);
  input.value = formatted;
  let newPos = start + (formatted.length - oldLen);
  input.setSelectionRange(newPos, newPos);
}

document.getElementById("ic").addEventListener("input", handleICInput);
document.getElementById("searchIC").addEventListener("input", handleICInput);
document.getElementById("account").addEventListener("input", function(e){ e.target.value = e.target.value.replace(/\D/g, "").substring(0, 10); });
</script>
</body>
</html>
