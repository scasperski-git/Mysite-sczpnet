<!DOCTYPE html>
<html>

<head>

<title>Secure Login Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* PREMIUM ANIMATED BACKGROUND */
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #182848);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: #333;
}

@keyframes bgMove {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
}

/* PREMIUM GLASS LOGIN CARD */
.box {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    padding: 48px 40px;
    border-radius: 24px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    width: 100%;
    max-width: 380px;
    animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* HEADER */
.login-header {
    text-align: center;
    margin-bottom: 32px;
}

.login-header i {
    font-size: 42px;
    background: linear-gradient(135deg, #007bff, #00c6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    filter: drop-shadow(0px 4px 8px rgba(0, 123, 255, 0.2));
}

.login-title {
    font-size: 24px;
    font-weight: 700;
    color: #111827;
    letter-spacing: -0.5px;
}

.login-sub {
    font-size: 13px;
    font-weight: 400;
    color: #6b7280;
    margin-top: 4px;
}

/* ERROR */
#errorMsg {
    background: rgba(220, 53, 69, 0.1);
    color: #dc3545;
    border: 1px solid rgba(220, 53, 69, 0.2);
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
    text-align: center;
    display: none;
    animation: shake 0.4s ease;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
}

/* INPUT GROUP */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group i.left {
    position: absolute;
    top: 50%;
    left: 16px;
    transform: translateY(-50%);
    color: #9ca3af;
    font-size: 14px;
    transition: 0.3s;
}

/* INPUT */
.input-group input {
    width: 100%;
    padding: 16px 45px 16px 45px;
    border: 1.5px solid #e5e7eb;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    background: rgba(255, 255, 255, 0.9);
    color: #1f2937;
    transition: all 0.3s ease;
}

.input-group input::placeholder {
    color: #9ca3af;
    font-weight: 400;
}

.input-group input:focus {
    outline: none;
    background: #ffffff;
    border-color: #3b82f6;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

.input-group input:focus ~ i.left {
    color: #3b82f6;
}

/* PASSWORD EYE */
.toggle-pass {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #9ca3af;
    transition: 0.2s;
    font-size: 14px;
}

.toggle-pass:hover {
    color: #3b82f6;
}

/* LOGIN BUTTON */
button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    margin-top: 8px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
}

button:active {
    transform: translateY(0);
}

/* ATTEMPT INDICATOR & SECURITY NOTE */
.attempt, .login-note {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    font-weight: 500;
}

.attempt {
    margin-top: 24px;
}

.login-note {
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.login-note i {
    font-size: 10px;
    color: #9ca3af;
}

/* =========================
AUTH OVERLAY
========================= */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    background: rgba(15, 23, 42, 0.6);
}

.auth-card {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
    min-width: 280px;
    border: 1px solid rgba(255,255,255,0.5);
}

.auth-icon {
    font-size: 36px;
    color: #3b82f6;
    margin-bottom: 16px;
    animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.auth-title {
    font-size: 18px;
    font-weight: 600;
    color: #111827;
}

.auth-sub {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
}

.auth-dots {
    margin-top: 20px;
}

.auth-dots span {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #3b82f6;
    border-radius: 50%;
    margin: 0 4px;
    animation: dots 1.4s infinite ease-in-out both;
}

.auth-dots span:nth-child(1) { animation-delay: -0.32s; }
.auth-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .7; transform: scale(1.1); }
}

@keyframes dots {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
}

/* MOBILE */
@media (max-width: 600px) {
    .box {
        padding: 40px 24px;
        border-radius: 20px;
    }
    button {
        padding: 18px;
        font-size: 16px;
    }
}

</style>

</head>

<body>

<div class="box">

<div class="login-header">

<i class="fa fa-shield-halved"></i>

<div class="login-title">Lock Management</div>
<div class="login-sub">Secure Access Portal</div>

</div>

<div id="errorMsg"></div>

<div class="input-group">
<i class="fa fa-user left"></i>
<input id="user" placeholder="User ID">
</div>

<div class="input-group">
<i class="fa fa-lock left"></i>
<input type="password" id="pass" placeholder="Password">
<i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
</div>

<button onclick="login()">Login</button>

<div class="attempt">
Secure authentication system
</div>

<div class="login-note">
<i class="fa fa-lock"></i> Authorized personnel only
</div>

</div>

<div id="overlay">

<div class="auth-card">

<i class="fa-solid fa-shield-halved auth-icon"></i>

<div class="auth-title">Authenticating</div>
<div class="auth-sub">Verifying credentials</div>

<div class="auth-dots">
<span></span>
<span></span>
<span></span>
</div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const api = API_URL;

document.getElementById("user").focus();

/* PASSWORD TOGGLE */

function togglePass(){

const pass=document.getElementById("pass");
const icon=document.querySelector(".toggle-pass");

if(pass.type==="password"){
pass.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
pass.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}

}

/* LOGIN */

async function login(){

const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

const err=document.getElementById("errorMsg");

err.style.display="none";

if(!user || !pass){
err.innerText="Enter User ID and Password";
err.style.display="block";
return;
}

document.getElementById("overlay").style.display="flex";

try{

const res=await fetch(api,{
method:"POST",
body:new URLSearchParams({
action:"login",
user:user,
pass:pass
})
});

const data=await res.json();

if(data.status==="SUCCESS"){

localStorage.setItem("session_token",data.token);
localStorage.setItem("lock_user",data.user);
localStorage.setItem("lock_type",data.type);
localStorage.setItem("lock_role",data.role);
localStorage.setItem("lock_name",data.name);

if(data.type=="check"){
window.location="../check/";
}
else if(data.type=="lock"){
window.location="../lock/";
}
else if(data.type=="master"){
window.location="../menu/";
}

}
else if(data.status==="INACTIVE"){
err.innerText="User ID inactive";
err.style.display="block";
}
else{
err.innerText="Invalid login credentials";
err.style.display="block";
}

}catch(e){

err.innerText="System error. Please try again.";
err.style.display="block";

}

document.getElementById("overlay").style.display="none";

}

/* ENTER KEY */

document.getElementById("pass").addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
