<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Login Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f6df5;
            --primary-dark: #1f3c88;
            --accent: #6c63ff;
            --error: #dc3545;
            --bg-glass: rgba(255, 255, 255, 0.94);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #4f6df5, #6c63ff, #22e1ff, #3c8ce7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* LOGIN CARD */
        .box {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-circle {
            background: linear-gradient(135deg, #f0f4ff, #ffffff);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .login-header i {
            font-size: 32px;
            color: var(--primary);
        }

        .login-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 13px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ALERT MESSAGE */
        #errorMsg {
            background: #fff5f5;
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 4px solid var(--error);
            display: none;
            text-align: left;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* FORM STYLING */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i.left {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #a0aec0;
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 15px 45px 15px 45px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 16px;
            background: #f8fafc;
            transition: all 0.3s;
            color: #2d3748;
        }

        .input-group input:focus {
            outline: none;
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 109, 245, 0.1);
        }

        .input-group input:focus + i.left {
            color: var(--primary);
        }

        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #a0aec0;
            padding: 5px;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(79, 109, 245, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 109, 245, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-info {
            margin-top: 25px;
            text-align: center;
        }

        .login-note {
            font-size: 12px;
            color: #a0aec0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* OVERLAY */
        #overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.4);
        }

        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 250px;
        }

        .auth-icon {
            font-size: 40px;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .box {
                padding: 30px 20px;
            }
            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="box">
    <div class="login-header">
        <div class="logo-circle">
            <i class="fa fa-shield-halved"></i>
        </div>
        <div class="login-title">Lock Management</div>
        <div class="login-sub">Secure Access Portal</div>
    </div>

    <div id="errorMsg"></div>

    <div class="input-group">
        <i class="fa fa-user left"></i>
        <input type="text" id="user" placeholder="User ID" autocomplete="username">
    </div>

    <div class="input-group">
        <i class="fa fa-lock left"></i>
        <input type="password" id="pass" placeholder="Password" autocomplete="current-password">
        <i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
    </div>

    <button onclick="login()" id="loginBtn">Login Now</button>

    <div class="footer-info">
        <div class="login-note">
            <i class="fa fa-circle-check"></i> Encrypted Connection
        </div>
    </div>
</div>

<div id="overlay">
    <div class="auth-card">
        <i class="fa-solid fa-fingerprint auth-icon"></i>
        <div style="font-weight:700; color:#1a202c">Verifying</div>
        <div style="font-size:12px; color:#718096; margin-top:5px">Please wait...</div>
    </div>
</div>

<script src="../lockconfig.js"></script>

<script>
    const api = API_URL;
    const userField = document.getElementById("user");
    const passField = document.getElementById("pass");
    const errBox = document.getElementById("errorMsg");
    const overlay = document.getElementById("overlay");

    userField.focus();

    function togglePass() {
        const icon = document.querySelector(".toggle-pass");
        if (passField.type === "password") {
            passField.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            passField.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    async function login() {
        const user = userField.value.trim();
        const pass = passField.value.trim();

        errBox.style.display = "none";

        if (!user || !pass) {
            showError("Please enter both credentials");
            return;
        }

        overlay.style.display = "flex";

        try {
            const res = await fetch(api, {
                method: "POST",
                body: new URLSearchParams({
                    action: "login",
                    user: user,
                    pass: pass
                })
            });

            const data = await res.json();

            if (data.status === "SUCCESS") {
                localStorage.setItem("session_token", data.token);
                localStorage.setItem("lock_user", data.user);
                localStorage.setItem("lock_type", data.type);
                localStorage.setItem("lock_role", data.role);
                localStorage.setItem("lock_name", data.name);

                // Redirect logic
                const routes = {
                    'check': '../check/',
                    'lock': '../lock/',
                    'master': '../menu/'
                };
                window.location.href = routes[data.type] || '../menu/';
            } else {
                overlay.style.display = "none";
                showError(data.status === "INACTIVE" ? "Account is inactive" : "Invalid User ID or Password");
            }
        } catch (e) {
            overlay.style.display = "none";
            showError("Connection error. Check your internet.");
        }
    }

    function showError(msg) {
        errBox.innerText = msg;
        errBox.style.display = "block";
    }

    // Support Enter key for both fields
    [userField, passField].forEach(input => {
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") login();
        });
    });
</script>

</body>
</html>
