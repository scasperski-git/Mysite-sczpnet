<!DOCTYPE html>
<html>

<head>

<title>Secure Login Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

* {
    box-sizing: border-box;
}

/* HIGH-TECH CYBER BACKGROUND */
body {
    font-family: 'Courier New', Courier, monospace; /* Monospace for technical feel */
    background: #000; /* Deep black base */
    background-image:
        linear-gradient(rgba(0, 20, 30, 0.9), rgba(0, 5, 10, 0.95)),
        url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiMwMDM0NDkiIGZpbGwtb3BhY2l0eT0iMC4zIj48cGF0aCBkPSJNMCAwaDQwdjQwSDBWMHptMjAgMjBoMjB2MjBIMjBWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4='); /* Subtle abstract network pattern */
    background-size: cover, 80px 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    color: #0ff; /* Electric cyan text */
}

/* PREMIUM DARK CYBER GLASS CARD */
.box {
    background: rgba(0, 10, 15, 0.8);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 42px;
    border-radius: 12px; /* Slightly sharper edges for security */
    box-shadow:
        0 0 30px rgba(0, 255, 255, 0.1), /* Subtle cyan ambient glow */
        0 20px 50px rgba(0, 0, 0, 0.8),
        inset 0 0 10px rgba(0, 255, 255, 0.05); /* Internal glow */
    width: 100%;
    max-width: 370px;
    border: 1px solid rgba(0, 255, 255, 0.1); /* Thin cyber border */
    animation: fadeIn .6s ease-out;
    position: relative;
    overflow: hidden;
}

/* Subtle data stream animation on the card */
.box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 255, 0.02) 0px,
        rgba(0, 255, 255, 0.02) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
    animation: dataStream 10s linear infinite;
    opacity: 0.5;
}

@keyframes dataStream {
    0% { transform: translateY(0); }
    100% { transform: translateY(20px); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
.login-header {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
}

.login-header i {
    font-size: 42px;
    color: #0ff;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5)); /* Glowing icon */
}

.login-title {
    font-size: 22px;
    font-weight: 700;
    color: #0ff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
}

.login-sub {
    font-size: 11px;
    color: #0aa; /* Dimmer cyan */
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* ERROR - styled for critical fault */
#errorMsg {
    background: rgba(220, 53, 69, 0.15);
    color: #ff4d4d; /* Bright alert red */
    font-size: 13px;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 16px;
    text-align: center;
    border: 1px solid rgba(255, 77, 77, 0.3);
    box-shadow: 0 0 10px rgba(255, 77, 77, 0.1);
    display: none;
}

/* INPUT GROUP */
.input-group {
    position: relative;
    margin-bottom: 18px;
}

.input-group i.left {
    position: absolute;
    top: 50%;
    left: 14px;
    transform: translateY(-50%);
    color: #0aa; /* Darker cyan for icons */
    font-size: 14px;
}

/* INPUT - Styled for concave digital look */
.input-group input {
    width: 100%;
    padding: 14px 45px 14px 40px;
    border: 1px solid #033; /* Darker cyber border */
    border-radius: 8px;
    font-size: 14px;
    background: rgba(0, 20, 30, 0.6); /* Dark inset input */
    color: #0ff;
    transition: .3s;
    font-family: 'Courier New', Courier, monospace;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); /* Inset shadow */
}

.input-group input:focus {
    outline: none;
    border-color: #0ff;
    box-shadow:
        0 0 15px rgba(0, 255, 255, 0.2),
        inset 0 2px 4px rgba(0,0,0,0.5);
}

.input-group input::placeholder {
    color: #055; /* Dim placeholder */
}

/* PASSWORD EYE */
.toggle-pass {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #0aa;
    font-size: 14px;
}

.toggle-pass:hover {
    color: #0ff;
}

/* LOGIN BUTTON - Glowing Interactive Pane */
button {
    width: 100%;
    padding: 16px;
    background: rgba(0, 255, 255, 0.05); /* Dark background */
    color: #0ff;
    border: 1px solid #0ff;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Courier New', Courier, monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: .3s ease-in-out;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
}

button:hover {
    background: rgba(0, 255, 255, 0.1);
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
    transform: translateY(-1px);
}

button:active {
    transform: translateY(1px);
}

/* ATTEMPT INDICATOR */
.attempt {
    margin-top: 20px;
    font-size: 10px;
    color: #0aa;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* SECURITY NOTE */
.login-note {
    margin-top: 14px;
    font-size: 10px;
    color: #055;
    text-align: center;
}

.login-note i {
    font-size: 9px;
    color: #044;
}

/* =========================
AUTH OVERLAY
========================= */

#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(0, 5, 10, 0.9);
}

.auth-card {
    background: rgba(0, 15, 25, 0.8);
    padding: 38px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
    min-width: 280px;
    border: 1px solid rgba(0, 255, 255, 0.15);
}

.auth-icon {
    font-size: 36px;
    color: #0ff;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 10px #0ff);
    animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.auth-title {
    font-size: 16px;
    font-weight: 700;
    color: #0ff;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.auth-sub {
    font-size: 11px;
    color: #0aa;
    margin-top: 4px;
}

.auth-dots {
    margin-top: 20px;
}

.auth-dots span {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #0ff;
    border-radius: 50%;
    margin: 0 4px;
    animation: dots 1.4s infinite ease-in-out both;
    box-shadow: 0 0 5px #0ff;
}

.auth-dots span:nth-child(1) { animation-delay: -0.32s; }
.auth-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
}

@keyframes dots {
    0%, 80%, 100% { transform: scale(0); opacity: 0; }
    40% { transform: scale(1); opacity: 1; }
}

/* MOBILE */

@media (max-width:600px){

    .box{
        padding: 32px 24px;
    }

    button{
        padding: 16px;
        font-size: 15px;
    }

}

</style>

</head>

<body>

<div class="box">

<div class="login-header">

<i class="fa fa-shield-halved"></i>

<div class="login-title">Lock Management</div>
<div class="login-sub">Secure Access Portal</div>

</div>

<div id="errorMsg"></div>

<div class="input-group">
<i class="fa fa-user left"></i>
<input id="user" placeholder="User ID">
</div>

<div class="input-group">
<i class="fa fa-lock left"></i>
<input type="password" id="pass" placeholder="Password">
<i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
</div>

<button onclick="login()">Login</button>

<div class="attempt">
Secure authentication system
</div>

<div class="login-note">
<i class="fa fa-lock"></i> Authorized personnel only
</div>

</div>

<div id="overlay">

<div class="auth-card">

<i class="fa-solid fa-shield-halved auth-icon"></i>

<div class="auth-title">Authenticating</div>
<div class="auth-sub">Verifying credentials</div>

<div class="auth-dots">
<span></span>
<span></span>
<span></span>
</div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const api = API_URL;

document.getElementById("user").focus();

/* PASSWORD TOGGLE */

function togglePass(){

const pass=document.getElementById("pass");
const icon=document.querySelector(".toggle-pass");

if(pass.type==="password"){
pass.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
pass.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}

}

/* LOGIN */

async function login(){

const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

const err=document.getElementById("errorMsg");

err.style.display="none";

if(!user || !pass){
err.innerText="Enter User ID and Password";
err.style.display="block";
return;
}

document.getElementById("overlay").style.display="flex";

try{

const res=await fetch(api,{
method:"POST",
body:new URLSearchParams({
action:"login",
user:user,
pass:pass
})
});

const data=await res.json();

if(data.status==="SUCCESS"){

localStorage.setItem("session_token",data.token);
localStorage.setItem("lock_user",data.user);
localStorage.setItem("lock_type",data.type);
localStorage.setItem("lock_role",data.role);
localStorage.setItem("lock_name",data.name);

if(data.type=="check"){
window.location="../check/";
}
else if(data.type=="lock"){
window.location="../lock/";
}
else if(data.type=="master"){
window.location="../menu/";
}

}
else if(data.status==="INACTIVE"){
err.innerText="User ID inactive";
err.style.display="block";
}
else{
err.innerText="Invalid login credentials";
err.style.display="block";
}

}catch(e){

err.innerText="System error. Please try again.";
err.style.display="block";

}

document.getElementById("overlay").style.display="none";

}

/* ENTER KEY */

document.getElementById("pass").addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
