<!DOCTYPE html>
<html>

<head>

<title>Secure Login Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE & TYPOGRAPHY ===== */
*{
box-sizing:border-box;
font-family: 'Poppins', Arial, sans-serif;
}

/* ANIMATED PREMIUM BACKGROUND */
body{
background:linear-gradient(-45deg, #0f172a, #1e293b, #3730a3, #312e81);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* GLASS LOGIN CARD */
.box{
background:rgba(255,255,255,0.95);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
padding:48px 40px;
border-radius:24px;
box-shadow:0 25px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
width:100%;
max-width:390px;
animation:slideUpFade .6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes slideUpFade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

/* HEADER */
.login-header{
text-align:center;
margin-bottom:32px;
}

.login-header i{
font-size:42px;
background:linear-gradient(135deg, #4f46e5, #3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:12px;
filter:drop-shadow(0 4px 6px rgba(59, 130, 246, 0.3));
}

.login-title{
font-size:24px;
font-weight:700;
color:#0f172a;
letter-spacing:-0.5px;
}

.login-sub{
font-size:13px;
color:#64748b;
font-weight:500;
text-transform:uppercase;
letter-spacing:0.5px;
margin-top:4px;
}

/* ERROR */
#errorMsg{
background:#fef2f2;
border:1px solid #fecdd3;
color:#be123c;
font-size:13px;
font-weight:500;
padding:12px;
border-radius:12px;
margin-bottom:20px;
text-align:center;
display:none;
animation:shake 0.4s ease-in-out;
}

@keyframes shake {
0%, 100% { transform: translateX(0); }
25% { transform: translateX(-4px); }
75% { transform: translateX(4px); }
}

/* INPUT GROUP */
.input-group{
position:relative;
margin-bottom:20px;
}

.input-group i.left{
position:absolute;
top:50%;
left:18px;
transform:translateY(-50%);
color:#94a3b8;
font-size:16px;
pointer-events:none;
transition:all 0.3s ease;
}

/* INPUT */
.input-group input{
width:100%;
padding:16px 45px 16px 50px;
border:2px solid #e2e8f0;
border-radius:14px;
font-size:15px;
font-weight:500;
background:#f8fafc;
color:#1e293b;
transition:all 0.3s ease;
}

.input-group input::placeholder{
color:#cbd5e1;
font-weight:400;
}

.input-group input:focus{
outline:none;
background:#ffffff;
border-color:#4f46e5;
box-shadow:0 0 0 4px rgba(79, 70, 229, 0.15);
}

.input-group input:focus + i.left,
.input-group:focus-within i.left {
color:#4f46e5;
}

/* PASSWORD EYE */
.toggle-pass{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#94a3b8;
font-size:16px;
transition:color 0.2s ease;
}

.toggle-pass:hover{
color:#4f46e5;
}

/* LOGIN BUTTON */
button{
width:100%;
padding:16px;
background:linear-gradient(135deg, #4f46e5, #3b82f6);
color:white;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all 0.3s ease;
letter-spacing:0.5px;
box-shadow:0 4px 15px rgba(59, 130, 246, 0.3);
margin-top:8px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 25px rgba(59, 130, 246, 0.4);
}

button:active {
transform:translateY(0);
}

/* ATTEMPT INDICATOR */
.attempt{
margin-top:24px;
font-size:12px;
color:#64748b;
text-align:center;
font-weight:500;
}

/* SECURITY NOTE */
.login-note{
margin-top:8px;
font-size:11px;
color:#94a3b8;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.login-note i{
color:#10b981;
}

/* =========================
AUTH OVERLAY
========================= */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
background:rgba(15, 23, 42, 0.7);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
}

.auth-card{
background:#ffffff;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 25px 50px rgba(0,0,0,0.3);
min-width:280px;
animation:fadeIn .3s ease forwards;
}

.auth-icon{
font-size:42px;
background:linear-gradient(135deg, #4f46e5, #3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:16px;
animation:pulse 1.5s infinite ease-in-out;
}

.auth-title{
font-size:20px;
font-weight:700;
color:#0f172a;
margin-bottom:4px;
}

.auth-sub{
font-size:13px;
color:#64748b;
font-weight:500;
}

.auth-dots{
margin-top:20px;
display:flex;
justify-content:center;
gap:6px;
}

.auth-dots span{
display:block;
width:10px;
height:10px;
background:#3b82f6;
border-radius:50%;
animation:dots 1.4s infinite ease-in-out both;
}

.auth-dots span:nth-child(1){animation-delay:-0.32s;}
.auth-dots span:nth-child(2){animation-delay:-0.16s;}

@keyframes pulse{
0%{transform:scale(1); filter:drop-shadow(0 0 0 rgba(59, 130, 246, 0.4));}
50%{transform:scale(1.1); filter:drop-shadow(0 0 15px rgba(59, 130, 246, 0.6));}
100%{transform:scale(1); filter:drop-shadow(0 0 0 rgba(59, 130, 246, 0.4));}
}

@keyframes dots{
0%,80%,100%{transform:scale(0);}
40%{transform:scale(1);}
}

/* MOBILE */
@media (max-width:600px){

body{
padding:16px;
}

.box{
padding:40px 24px;
border-radius:20px;
}

.login-title{
font-size:22px;
}

.input-group input{
padding:15px 45px 15px 48px;
font-size:14px;
}

button{
padding:15px;
font-size:15px;
}

}

</style>

</head>

<body>

<div class="box">

<div class="login-header">

<i class="fa fa-shield-halved"></i>

<div class="login-title">Lock Management</div>
<div class="login-sub">Secure Access Portal</div>

</div>

<div id="errorMsg"></div>

<div class="input-group">
<i class="fa fa-user left"></i>
<input id="user" placeholder="User ID" autocomplete="username">
</div>

<div class="input-group">
<i class="fa fa-lock left"></i>
<input type="password" id="pass" placeholder="Password" autocomplete="current-password">
<i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
</div>

<button onclick="login()">Login</button>

<div class="attempt">
Secure authentication system
</div>

<div class="login-note">
<i class="fa fa-lock"></i> Authorized personnel only
</div>

</div>

<div id="overlay">

<div class="auth-card">

<i class="fa-solid fa-shield-halved auth-icon"></i>

<div class="auth-title">Authenticating</div>
<div class="auth-sub">Verifying credentials</div>

<div class="auth-dots">
<span></span>
<span></span>
<span></span>
</div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const api = API_URL;

document.getElementById("user").focus();

/* PASSWORD TOGGLE */

function togglePass(){

const pass=document.getElementById("pass");
const icon=document.querySelector(".toggle-pass");

if(pass.type==="password"){
pass.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
pass.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}

}

/* LOGIN */

async function login(){

const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

const err=document.getElementById("errorMsg");

err.style.display="none";

if(!user || !pass){
err.innerText="Enter User ID and Password";
err.style.display="block";
return;
}

document.getElementById("overlay").style.display="flex";

try{

const res=await fetch(api,{
method:"POST",
body:new URLSearchParams({
action:"login",
user:user,
pass:pass
})
});

const data=await res.json();

if(data.status==="SUCCESS"){

localStorage.setItem("session_token",data.token);
localStorage.setItem("lock_user",data.user);
localStorage.setItem("lock_type",data.type);
localStorage.setItem("lock_role",data.role);
localStorage.setItem("lock_name",data.name);

if(data.type=="check"){
window.location="../check/";
}
else if(data.type=="lock"){
window.location="../lock/";
}
else if(data.type=="master"){
window.location="../menu/";
}

}
else if(data.status==="INACTIVE"){
err.innerText="User ID inactive";
err.style.display="block";
}
else{
err.innerText="Invalid login credentials";
err.style.display="block";
}

}catch(e){

err.innerText="System error. Please try again.";
err.style.display="block";

}

document.getElementById("overlay").style.display="none";

}

/* ENTER KEY */

document.getElementById("pass").addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
