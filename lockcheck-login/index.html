<!DOCTYPE html>
<html>

<head>

<title>Login Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#e9eef6,#dce5f2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

/* LOGIN CARD */

.box{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
width:100%;
max-width:360px;
}

/* TITLE */

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

/* ERROR */

#errorMsg{
color:#dc3545;
font-size:14px;
margin-bottom:10px;
text-align:center;
display:none;
}

/* INPUT GROUP */

.input-group{
position:relative;
margin-bottom:15px;
}

/* LEFT ICON */

.input-group i.left{
position:absolute;
top:50%;
left:12px;
transform:translateY(-50%);
color:#777;
}

/* INPUT */

.input-group input{
width:100%;
padding:14px 45px 14px 38px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
transition:.2s;
}

.input-group input:focus{
outline:none;
border-color:#007bff;
box-shadow:0 0 0 3px rgba(0,123,255,0.15);
}

/* PASSWORD EYE */

.toggle-pass{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#777;
}

.toggle-pass:hover{
color:#007bff;
}

/* LOGIN BUTTON */

button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* =========================
BLUR OVERLAY
========================= */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:999;

/* blur background */

backdrop-filter:blur(8px);
background:rgba(0,0,0,0.35);
}

/* LOADER */

.loader{
text-align:center;
color:white;
font-size:22px;
font-weight:600;
}

/* SPINNER */

.spinner{
width:55px;
height:55px;
border:4px solid rgba(255,255,255,0.35);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto 0;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* MOBILE */

@media (max-width:600px){

.box{
padding:30px;
}

button{
padding:16px;
font-size:17px;
}

}

</style>

</head>

<body>

<div class="box">

<h2>Login Portal</h2>

<div id="errorMsg"></div>

<div class="input-group">
<i class="fa fa-user left"></i>
<input id="user" placeholder="User ID">
</div>

<div class="input-group">
<i class="fa fa-lock left"></i>
<input type="password" id="pass" placeholder="Password">
<i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
</div>

<button onclick="login()">Login</button>

</div>

<!-- BLUR LOADING OVERLAY -->

<div id="overlay">
<div class="loader">
Authenticating...
<div class="spinner"></div>
</div>
</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwPq44mgtXFY7I8l6iRXIvLqRjaIhSu1tjDQt9F_P3YCAaHWaPeTrDA8FWZ1aIxVIzE/exec";

/* AUTO FOCUS */
document.getElementById("user").focus();

/* PASSWORD TOGGLE */

function togglePass(){

const pass=document.getElementById("pass");
const icon=document.querySelector(".toggle-pass");

if(pass.type==="password"){
pass.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}
else{
pass.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}

}

/* LOGIN */

async function login(){

const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

const err=document.getElementById("errorMsg");

err.style.display="none";

if(!user || !pass){
err.innerText="Enter User ID and Password";
err.style.display="block";
return;
}

/* SHOW OVERLAY */

document.getElementById("overlay").style.display="flex";

try{

const res=await fetch(api,{
method:"POST",
body:new URLSearchParams({
action:"login",
user:user,
pass:pass
})
});

const data=await res.json();

if(data.status==="SUCCESS"){

localStorage.setItem("session_token",data.token);
localStorage.setItem("lock_user",data.user);
localStorage.setItem("lock_type",data.type);
localStorage.setItem("lock_role",data.role);
localStorage.setItem("lock_name",data.name);

if(data.type=="check"){
window.location="../check/";
}

else if(data.type=="lock"){
window.location="../lock/";
}

else if(data.type=="master"){
window.location="../menu/";
}

}

else if(data.status==="INACTIVE"){
err.innerText="User ID inactive";
err.style.display="block";
}

else{
err.innerText="Invalid login credentials";
err.style.display="block";
}

}catch(e){

err.innerText="System error. Please try again.";
err.style.display="block";

}

/* HIDE OVERLAY */

document.getElementById("overlay").style.display="none";

}

/* ENTER KEY LOGIN */

document.getElementById("pass").addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
