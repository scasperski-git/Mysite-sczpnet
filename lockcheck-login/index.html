<!DOCTYPE html>
<html>

<head>

<title>Secure Login Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:
linear-gradient(135deg,#eef3fb,#dfe7f5),
radial-gradient(circle at top right,#ffffff55,transparent 60%);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

/* LOGIN CARD */

.box{
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 18px 45px rgba(0,0,0,0.15);
width:100%;
max-width:360px;
}

/* HEADER */

.login-header{
text-align:center;
margin-bottom:24px;
}

.login-header i{
font-size:36px;
color:#007bff;
margin-bottom:6px;
}

.login-title{
font-size:20px;
font-weight:700;
color:#1f3c88;
}

.login-sub{
font-size:12px;
color:#777;
margin-top:2px;
}

/* ERROR */

#errorMsg{
color:#dc3545;
font-size:14px;
margin-bottom:10px;
text-align:center;
display:none;
}

/* INPUT GROUP */

.input-group{
position:relative;
margin-bottom:15px;
}

.input-group i.left{
position:absolute;
top:50%;
left:12px;
transform:translateY(-50%);
color:#777;
}

/* INPUT */

.input-group input{
width:100%;
padding:14px 45px 14px 38px;
border:1px solid #d9dee7;
border-radius:10px;
font-size:15px;
background:#f9fbff;
transition:.2s;
}

.input-group input:focus{
outline:none;
background:white;
border-color:#007bff;
box-shadow:0 0 0 3px rgba(0,123,255,0.12);
}

/* PASSWORD EYE */

.toggle-pass{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#777;
}

.toggle-pass:hover{
color:#007bff;
}

/* LOGIN BUTTON */

button{
width:100%;
padding:15px;
background:linear-gradient(135deg,#007bff,#0047ab);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
letter-spacing:.4px;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* SECURITY NOTE */

.login-note{
margin-top:14px;
font-size:11px;
color:#888;
text-align:center;
}

.login-note i{
margin-right:4px;
}

/* =========================
AUTHENTICATION OVERLAY
========================= */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:999;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.35);
}

.auth-card{
background:rgba(255,255,255,0.92);
padding:35px 40px;
border-radius:16px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
min-width:220px;
animation:fadeIn .25s ease;
}

.auth-icon{
font-size:30px;
color:#007bff;
margin-bottom:10px;
animation:pulse 1.4s infinite;
}

.auth-title{
font-size:18px;
font-weight:600;
color:#1f3c88;
}

.auth-sub{
font-size:12px;
color:#6c757d;
}

.auth-dots{
margin-top:14px;
}

.auth-dots span{
display:inline-block;
width:8px;
height:8px;
background:#007bff;
border-radius:50%;
margin:0 3px;
animation:dots 1.2s infinite;
}

.auth-dots span:nth-child(2){
animation-delay:0.2s;
}

.auth-dots span:nth-child(3){
animation-delay:0.4s;
}

@keyframes fadeIn{
from{transform:scale(.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

@keyframes dots{
0%,80%,100%{opacity:0}
40%{opacity:1}
}

/* MOBILE */

@media (max-width:600px){

.box{
padding:30px;
}

button{
padding:16px;
font-size:17px;
}

}

</style>

</head>

<body>

<div class="box">

<div class="login-header">

<i class="fa fa-shield-halved"></i>

<div class="login-title">Lock Management</div>
<div class="login-sub">Secure Access Portal</div>

</div>

<div id="errorMsg"></div>

<div class="input-group">
<i class="fa fa-user left"></i>
<input id="user" placeholder="User ID">
</div>

<div class="input-group">
<i class="fa fa-lock left"></i>
<input type="password" id="pass" placeholder="Password">
<i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
</div>

<button onclick="login()">Login</button>

<div class="login-note">
<i class="fa fa-lock"></i> Secure internal access
</div>

</div>

<!-- AUTH OVERLAY -->

<div id="overlay">

<div class="auth-card">

<i class="fa-solid fa-shield-halved auth-icon"></i>

<div class="auth-title">Authenticating</div>
<div class="auth-sub">Verifying credentials</div>

<div class="auth-dots">
<span></span>
<span></span>
<span></span>
</div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const api = API_URL;

/* AUTO FOCUS */

document.getElementById("user").focus();

/* PASSWORD TOGGLE */

function togglePass(){

const pass=document.getElementById("pass");
const icon=document.querySelector(".toggle-pass");

if(pass.type==="password"){
pass.type="text";
icon.classList.replace("fa-eye","fa-eye-slash");
}else{
pass.type="password";
icon.classList.replace("fa-eye-slash","fa-eye");
}

}

/* LOGIN */

async function login(){

const user=document.getElementById("user").value.trim();
const pass=document.getElementById("pass").value.trim();

const err=document.getElementById("errorMsg");

err.style.display="none";

if(!user || !pass){
err.innerText="Enter User ID and Password";
err.style.display="block";
return;
}

document.getElementById("overlay").style.display="flex";

try{

const res=await fetch(api,{
method:"POST",
body:new URLSearchParams({
action:"login",
user:user,
pass:pass
})
});

const data=await res.json();

if(data.status==="SUCCESS"){

localStorage.setItem("session_token",data.token);
localStorage.setItem("lock_user",data.user);
localStorage.setItem("lock_type",data.type);
localStorage.setItem("lock_role",data.role);
localStorage.setItem("lock_name",data.name);

if(data.type=="check"){
window.location="../check/";
}
else if(data.type=="lock"){
window.location="../lock/";
}
else if(data.type=="master"){
window.location="../menu/";
}

}
else if(data.status==="INACTIVE"){
err.innerText="User ID inactive";
err.style.display="block";
}
else{
err.innerText="Invalid login credentials";
err.style.display="block";
}

}catch(e){

err.innerText="System error. Please try again.";
err.style.display="block";

}

document.getElementById("overlay").style.display="none";

}

/* ENTER KEY LOGIN */

document.getElementById("pass").addEventListener("keypress",function(e){
if(e.key==="Enter"){
login();
}
});

</script>

</body>
</html>
