<!DOCTYPE html>
<html>

<head>

<title>Branch Lock Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
width:320px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="box">

<h2>Branch Lock Login</h2>

<input id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbx6eLQs1fTLHF2MwzaUBL7vRCuqNHYZ-JNJ9w-GZ6TNKvMiUm50ihSs8B5e52OzEwp3/exec";

async function login(){

const user=document.getElementById("user").value;
const pass=document.getElementById("pass").value;

const res=await fetch(api,{
method:"POST",
body:new URLSearchParams({
action:"login",
user:user,
pass:pass
})
});

const data=await res.json();

if(data.status==="SUCCESS"){

localStorage.setItem("lock_user",data.user);
localStorage.setItem("lock_type",data.type);
localStorage.setItem("lock_role",data.role);
localStorage.setItem("lock_name",data.name);

if(data.type=="check"){
window.location="../check/";
}

else if(data.type=="lock"){
window.location="../lock/";
}

else{
window.location="../check/";
}

}

else if(data.status==="INACTIVE"){
alert("User ID inactive");
}

else{
alert("Invalid login");
}

}
</script>

</body>
</html>
