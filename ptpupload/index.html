<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debt Collection System</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.box {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.file-item {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h2>📂 Debt Collection System</h2>

<div class="box">
<h3>Upload Document</h3>

<input type="text" id="ic" placeholder="IC Number">
<input type="text" id="account" placeholder="Account No">
<input type="text" id="ref" placeholder="Reference No">
<input type="file" id="files" multiple>

<button onclick="upload()">Upload</button>
<p id="msg"></p>

</div>

<div class="box">
<h3>Search by IC</h3>

<input type="text" id="searchIC" placeholder="Enter IC">
<button onclick="search()">Search</button>

<div id="result"></div>

</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkP_Zt33qOf-5urMjyrEXw1_ZVrsAL2Toc5RPkzs1bqQr1QZ2QFyG3z-HiyJDzLh3Q6A/exec";

// ===== FORMAT IC =====
function formatIC(value) {
  value = value.replace(/\D/g, '').slice(0,12);

  if (value.length > 6) {
    value = value.slice(0,6) + '-' + value.slice(6);
  }
  if (value.length > 9) {
    value = value.slice(0,9) + '-' + value.slice(9);
  }

  return value;
}

document.getElementById("ic").addEventListener("input", function() {
  this.value = formatIC(this.value);
});

// ===== BASE64 =====
function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== UPLOAD =====
async function upload() {
  const files = document.getElementById("files").files;

  if (files.length === 0) {
    alert("Please select file!");
    return;
  }

  if (files.length > 4) {
    alert("Max 4 files only!");
    return;
  }

  document.getElementById("msg").innerText = "Uploading...";

  let fileData = [];

  for (let file of files) {
    let base64 = await toBase64(file);
    fileData.push({
      name: file.name,
      type: file.type,
      data: base64.split(",")[1]
    });
  }

  const res = await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({
      ic: document.getElementById("ic").value,
      account: document.getElementById("account").value,
      ref: document.getElementById("ref").value,
      files: fileData
    })
  });

  const data = await res.json();

  document.getElementById("msg").innerText = "✅ Upload Success!";
}

// ===== SEARCH =====
async function search() {
  const ic = document.getElementById("searchIC").value;

  const res = await fetch(`${WEB_APP_URL}?ic=${ic}`);
  const data = await res.json();

  let html = "";

  if (data.length === 0) {
    html = "No record found.";
  }

  data.forEach(d => {
    html += `
      <div class="file-item">
        <b>Account:</b> ${d.account} | <b>Ref:</b> ${d.ref}<br>
        📄 ${d.file}<br>
        <a href="${d.url}" target="_blank">🔍 View</a> |
        <a href="${d.url}" download>⬇ Download</a>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
