<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Collection System</title>

<style>

/* ===== GLOBAL FIX ===== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #eef2f7;
}

/* ===== LAYOUT ===== */
.app {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  background: #1e2a38;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  background: #2f3e4e;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.sidebar button:hover {
  transform: translateY(-2px);
}

.sidebar button.active {
  background: #007bff;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  padding: 20px;
  padding-bottom: 80px;
  max-width: 900px;
  margin: auto;
}

.box {
  background: white;
  padding: 18px;
  margin-bottom: 18px;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  transition: 0.2s;
}

.box:hover {
  transform: translateY(-2px);
}

/* ===== INPUT ===== */
.input-group {
  position: relative;
  margin-bottom: 10px;
}

.input-group input {
  width: 100%;
  padding: 16px 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  background: #f9fbff;
  font-size: 14px;
  transition: 0.2s;
}

.input-group input:focus {
  border-color: #007bff;
  background: white;
  box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
  outline: none;
}

.input-group label {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  color: #888;
  font-size: 14px;
  transition: 0.2s;
  background: white;
  padding: 0 4px;
}

.input-group input:focus + label,
.input-group input:valid + label {
  top: -6px;
  font-size: 11px;
  color: #007bff;
}

/* ===== BUTTON ===== */
button.action {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #007bff, #0056b3);
  color: white;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button.action:hover {
  transform: translateY(-2px);
}

/* ===== ROW ===== */
.row {
  display: flex;
  gap: 10px;
}

.row .input-group {
  flex: 1;
  min-width: 0;
}

/* ===== FILE BOX ===== */
.upload-box {
  border: 2px dashed #ccc;
  padding: 20px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
  background: #fafafa;
  margin-top: 10px;
}

.upload-box:hover {
  background: #f1f3f7;
}

/* ===== FILE ITEM ===== */
.file-item {
  background: #f8f9fb;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== RESULT CARD ===== */
.result-card {
  border-left: 4px solid #007bff;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1e2a38;
  padding: 8px 0;
  justify-content: space-around;
}

.bottom-nav button {
  background: none;
  border: none;
  color: white;
  font-size: 13px;
  flex: 1;
}

.bottom-nav button.active {
  color: #00bfff;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .app {
    flex-direction: column;
  }

  .sidebar {
    display: none;
  }

  .bottom-nav {
    display: flex;
  }

  .main {
    padding: 12px;
  }

  .row {
    flex-direction: column;
  }

  input {
    font-size: 16px;
  }
}

/* ===== OVERLAY ===== */
#overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.loader {
  border:6px solid #eee;
  border-top:6px solid #00bfff;
  border-radius:50%;
  width:50px;
  height:50px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg);}
}

.checkmark {
  font-size:60px;
  color:#00ff9f;
  display:none;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <h2>📂 DCS</h2>
  <button onclick="showPage('dashboard', this)" class="active">Dashboard</button>
  <button onclick="showPage('upload', this)">Upload</button>
  <button onclick="showPage('search', this)">Search</button>
</div>

<div class="main">

<div id="dashboard" class="box">
  <h3>📊 Dashboard</h3>
  <p>Welcome to Debt Collection System</p>
</div>

<div id="upload" class="box" style="display:none;">
  <h3>Upload Document</h3>

  <div class="row">
    <div class="input-group">
      <input id="ic" required>
      <label>IC Number</label>
    </div>

    <div class="input-group">
      <input id="account" required inputmode="numeric">
      <label>Account No</label>
    </div>
  </div>

  <div class="upload-box" onclick="document.getElementById('files').click()">
    📂 Tap to upload (max 4 files)
  </div>
  <input type="file" id="files" multiple hidden>

  <div id="fileList"></div>

  <button class="action" onclick="upload()">Upload</button>
</div>

<div id="search" class="box" style="display:none;">
  <h3>Search</h3>

  <div class="input-group">
    <input id="searchIC" required>
    <label>Enter IC</label>
  </div>

  <button class="action" onclick="search()">Search</button>

  <div id="result"></div>
</div>

</div>
</div>

<div class="bottom-nav">
  <button onclick="showPage('dashboard', this)" class="active">🏠</button>
  <button onclick="showPage('upload', this)">⬆</button>
  <button onclick="showPage('search', this)">🔍</button>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz90tkyY8NFADJAWBj2qgn_Vrwz3ZnGBDSCVDDuPVK-H_EITyH9PUI1Ja39yA_r4WxdeA/exec";

/* NAV */
function showPage(page, el) {
  ["dashboard","upload","search"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(page).style.display="block";

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  if(el) el.classList.add("active");
}

/* FILE */
let selectedFiles = [];

files.onchange = e=>{
  let newFiles = [...e.target.files];
  selectedFiles = selectedFiles.concat(newFiles).slice(0,4);
  renderFileList();
};

function renderFileList(){
  fileList.innerHTML="";
  selectedFiles.forEach((f,i)=>{
    fileList.innerHTML+=`
    <div class="file-item">
      ${f.name}
      <button onclick="removeFile(${i})">✕</button>
    </div>`;
  });
}

function removeFile(i){
  selectedFiles.splice(i,1);
  renderFileList();
}

/* UPLOAD */
async function upload(){
  if(!confirm("Confirm upload?")) return;

  overlay.style.display="flex";

  for(let f of selectedFiles){
    let b = await toBase64(f);

    await fetch(WEB_APP_URL,{
      method:"POST",
      body: JSON.stringify({
        ic: ic.value,
        account: account.value,
        files:[{
          name:f.name,
          type:f.type,
          data:b.split(",")[1]
        }]
      })
    });
  }

  loader.style.display="none";
  checkmark.style.display="block";
}

/* BASE64 */
function toBase64(file){
  return new Promise(r=>{
    let fr=new FileReader();
    fr.onload=()=>r(fr.result);
    fr.readAsDataURL(file);
  });
}

/* SEARCH */
async function search(){
  result.innerHTML="Searching...";

  let res=await fetch(`${WEB_APP_URL}?ic=${searchIC.value}`);
  let data=await res.json();

  result.innerHTML = data.map(d=>`
    <div class="file-item result-card">
      <b>${d.account}</b><br>
      ${d.file}<br>
      <a href="${d.url}" target="_blank">View</a>
    </div>
  `).join("");
}

</script>

<div id="overlay">
  <div class="loader" id="loader"></div>
  <div class="checkmark" id="checkmark">✔</div>
</div>

</body>
</html>
