<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Debt Collection System</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.box {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.file-item {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h2>📂 Debt Collection System</h2>

<div class="box">
<h3>Upload Document</h3>

<div style="display:flex; gap:10px;">
  <input type="text" id="ic" placeholder="IC (New / Old)" style="flex:1;">
  <input type="text" id="account" placeholder="Account No" style="flex:1;">
</div>
<input type="file" id="files" multiple>

<button onclick="upload()">Upload</button>
<p id="msg"></p>

</div>

<div class="box">
<h3>Search by IC</h3>

<input type="text" id="searchIC" placeholder="Enter IC (New / Old)">
<button onclick="search()">Search</button>

<div id="result"></div>

</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz90tkyY8NFADJAWBj2qgn_Vrwz3ZnGBDSCVDDuPVK-H_EITyH9PUI1Ja39yA_r4WxdeA/exec";

// ===== FORMAT IC =====
function formatIC(value) {
  // kalau ada huruf → OLD IC → uppercase sahaja
  if (/[a-zA-Z]/.test(value)) {
    return value.toUpperCase();
  }

  // buang semua selain digit
  let clean = value.replace(/\D/g, '');

  // kalau kurang dari 8 digit → jangan kacau
  if (clean.length < 8) {
    return clean;
  }

  // kalau user dah letak dash → jangan kacau
  if (value.includes('-')) {
    return value;
  }

  // auto format bila cukup digit
  if (clean.length >= 8) {
    let part1 = clean.slice(0, 6);
    let part2 = clean.slice(6, 8);
    let part3 = clean.slice(8);

    return part3 ? `${part1}-${part2}-${part3}` : `${part1}-${part2}`;
  }

  return value;
}

document.getElementById("ic").addEventListener("input", function(e) {
  const cursorPos = this.selectionStart;
  this.value = formatIC(this.value);
  this.setSelectionRange(cursorPos, cursorPos);
});

document.getElementById("searchIC").addEventListener("input", function(e) {
  const cursorPos = this.selectionStart;
  this.value = formatIC(this.value);
  this.setSelectionRange(cursorPos, cursorPos);
});

// ===== BASE64 =====
function toBase64(file) {
  return new Promise((resolve, reject) => {
    let reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== UPLOAD =====
async function upload() {
  const ic = document.getElementById("ic").value.trim();
  const account = document.getElementById("account").value.trim();
  const files = document.getElementById("files").files;

  if (!ic || !account) {
    alert("Please enter IC and Account!");
    return;
  }

  if (files.length === 0) {
    alert("Please select file!");
    return;
  }

  if (files.length > 4) {
    alert("Max 4 files only!");
    return;
  }

  document.getElementById("msg").innerText = "Uploading...";

  let fileData = [];

  for (let file of files) {
    let base64 = await toBase64(file);
    fileData.push({
      name: file.name,
      type: file.type,
      data: base64.split(",")[1]
    });
  }

  await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({
      ic: ic,
      account: account,
      files: fileData
    })
  });

  document.getElementById("msg").innerText = "✅ Upload Success!";
}

// ===== SEARCH =====
async function search() {
  const ic = document.getElementById("searchIC").value.trim();

  if (!ic) {
    alert("Please enter IC!");
    return;
  }

  const res = await fetch(`${WEB_APP_URL}?ic=${encodeURIComponent(ic)}`);
  const data = await res.json();

  let html = "";

  if (data.length === 0) {
    html = "No record found.";
  }

  data.forEach(d => {
    html += `
      <div class="file-item">
        <b>Account:</b> ${d.account}<br>
        📄 ${d.file}<br>
        <a href="${d.url}" target="_blank">🔍 View</a> |
        <a href="${d.url}" download>⬇ Download</a>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
