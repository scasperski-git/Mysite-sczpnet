<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Collection System</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #eef2f7;
}

.app {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 220px;
  background: #1e2a38;
  color: white;
  padding: 20px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  background: #2f3e4e;
  color: white;
  border-radius: 8px;
}

.sidebar button.active {
  background: #007bff;
}

.main {
  flex: 1;
  padding: 20px;
  padding-bottom: 80px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 16px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button.action {
  background: linear-gradient(135deg, #007bff, #0056b3);
  color: white;
  padding: 12px;
  border: none;
  border-radius: 10px;
}

.row {
  display: flex;
  gap: 10px;
}

.bottom-nav {
  display: none;
}

@media (max-width:768px){
  .sidebar { display:none; }
  .bottom-nav {
    display:flex;
    position:fixed;
    bottom:0;
    width:100%;
    background:#1e2a38;
    justify-content:space-around;
  }
  .bottom-nav button { color:white; background:none; border:none; }
  .row { flex-direction:column; }
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <button onclick="showPage('dashboard',this)" class="active">Dashboard</button>
  <button onclick="showPage('upload',this)">Upload</button>
  <button onclick="showPage('search',this)">Search</button>
</div>

<div class="main">

<div id="dashboard" class="box">
  <h3>Dashboard</h3>
</div>

<div id="upload" class="box" style="display:none;">
  <h3>Upload Document</h3>

  <div class="row">
    <input id="ic" placeholder="IC (e.g. 900101-01-1234)">
    <input id="account" placeholder="Account">
  </div>

  <input type="file" id="files" multiple>
  <p style="font-size:12px;">Maximum 4 files only</p>

  <div id="fileList"></div>

  <button class="action" onclick="upload()">Upload</button>
  <p id="msg"></p>
</div>

<div id="search" class="box" style="display:none;">
  <input id="searchIC" placeholder="Search IC">
  <button onclick="search()">Search</button>
  <div id="result"></div>
</div>

</div>
</div>

<div class="bottom-nav">
  <button onclick="showPage('dashboard',this)">Home</button>
  <button onclick="showPage('upload',this)">Upload</button>
  <button onclick="showPage('search',this)">Search</button>
</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz90tkyY8NFADJAWBj2qgn_Vrwz3ZnGBDSCVDDuPVK-H_EITyH9PUI1Ja39yA_r4WxdeA/exec";

function showPage(p,el){
  ["dashboard","upload","search"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(p).style.display="block";

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  if(el) el.classList.add("active");
}

function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

let selectedFiles=[];

document.getElementById("files").addEventListener("change",e=>{
  selectedFiles=[...selectedFiles,...Array.from(e.target.files)].slice(0,4);
  renderFileList();
  e.target.value="";
});

function renderFileList(){
  let list=document.getElementById("fileList");
  list.innerHTML="";

  selectedFiles.forEach((file,i)=>{
    let size=(file.size/1024).toFixed(1);

    list.innerHTML+=`
    <div style="background:#eee;padding:10px;margin-bottom:5px;border-radius:10px">
      📄 ${file.name} (${size}KB)

      <button id="remove-${i}" onclick="removeFile(${i})">X</button>

      <div style="background:#ccc;height:6px;border-radius:6px;margin-top:5px">
        <div id="progress-${i}" style="width:0%;height:6px;background:#007bff"></div>
      </div>

      <div id="percent-${i}">0%</div>
    </div>`;
  });
}

function removeFile(i){
  selectedFiles.splice(i,1);
  renderFileList();
}

async function upload(){

  let btn=document.querySelector(".action");
  btn.disabled=true;

  document.querySelectorAll("[id^='remove-']").forEach(b=>b.disabled=true);

  let ic=document.getElementById("ic").value;
  let acc=document.getElementById("account").value;

  if(!ic||!acc||selectedFiles.length==0){
    alert("Fill all");
    btn.disabled=false;
    return;
  }

  let fileData=[];

  for(let i=0;i<selectedFiles.length;i++){
    let f=selectedFiles[i];
    let b64=await toBase64(f);

    fileData.push({
      name:f.name,
      data:b64.split(",")[1]
    });

    document.getElementById(`progress-${i}`).style.width="30%";
    document.getElementById(`percent-${i}`).innerText="30%";
  }

  let progress=30;

  let interval=setInterval(()=>{
    if(progress<90){
      progress+=3;
      selectedFiles.forEach((_,i)=>{
        document.getElementById(`progress-${i}`).style.width=progress+"%";
        document.getElementById(`percent-${i}`).innerText=progress+"%";
      });
    }
  },300);

  let xhr=new XMLHttpRequest();

  xhr.onload=function(){
    clearInterval(interval);

    selectedFiles.forEach((_,i)=>{
      document.getElementById(`progress-${i}`).style.width="100%";
      document.getElementById(`progress-${i}`).style.background="#28a745";
      document.getElementById(`percent-${i}`).innerHTML="✅ Uploaded";
    });

    document.getElementById("msg").innerText="Upload Success!";
    selectedFiles=[];
    renderFileList();
    btn.disabled=false;
  };

  xhr.open("POST",WEB_APP_URL);
  xhr.send(JSON.stringify({ic,acc,files:fileData}));
}

async function search(){
  let ic=document.getElementById("searchIC").value;
  let res=await fetch(WEB_APP_URL+"?ic="+ic);
  let data=await res.json();

  document.getElementById("result").innerHTML=
    data.map(d=>`📄 ${d.file}`).join("<br>");
}

</script>

</body>
</html>
