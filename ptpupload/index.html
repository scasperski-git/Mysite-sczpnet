<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCS Fintech UI</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
}

.app {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: #ccc;
  cursor: pointer;
  transition: 0.2s;
}

.sidebar button:hover {
  background: rgba(255,255,255,0.1);
}

.sidebar button.active {
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  color: white;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  padding: 20px;
  padding-bottom: 90px;
}

/* ===== CARD ===== */
.box {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* ===== INPUT ===== */
.input-group {
  position: relative;
  margin-bottom: 15px;
}

.input-group input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

.input-group label {
  position: absolute;
  top: 14px;
  left: 12px;
  color: #aaa;
  font-size: 12px;
  transition: 0.2s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 10px;
  color: #60a5fa;
}

/* ===== BUTTON ===== */
button.action {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button.action:hover {
  transform: translateY(-2px);
}

/* ===== DASHBOARD CARDS ===== */
.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stat {
  flex: 1;
  padding: 15px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
}

/* ===== FILE DROP ===== */
#files {
  border: 2px dashed rgba(255,255,255,0.3);
  padding: 20px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
}

/* ===== FILE LIST ===== */
.file-item {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

/* ===== RESULT ===== */
.result-card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  border-left: 4px solid #3b82f6;
}

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  padding: 10px 16px;
  border-radius: 8px;
  display: none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .sidebar { display:none; }
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <h2>💳 DCS</h2>
  <button onclick="showPage('dashboard', this)" class="active">Dashboard</button>
  <button onclick="showPage('upload', this)">Upload</button>
  <button onclick="showPage('search', this)">Search</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="box">
  <h3>Dashboard</h3>

  <div class="stats">
    <div class="stat">
      <small>Total Records</small>
      <h2>--</h2>
    </div>

    <div class="stat">
      <small>Total Accounts</small>
      <h2>--</h2>
    </div>
  </div>

</div>

<!-- UPLOAD -->
<div id="upload" class="box" style="display:none;">
  <h3>Upload Document</h3>

  <div class="input-group">
    <input id="ic" placeholder=" ">
    <label>IC Number</label>
  </div>

  <div class="input-group">
    <input id="account" placeholder=" ">
    <label>Account No</label>
  </div>

  <input type="file" id="files" multiple>

  <div id="fileList"></div>

  <button class="action" onclick="upload()">Upload</button>
</div>

<!-- SEARCH -->
<div id="search" class="box" style="display:none;">
  <h3>Search</h3>

  <div class="input-group">
    <input id="searchIC" placeholder=" ">
    <label>Enter IC</label>
  </div>

  <button class="action" onclick="search()">Search</button>

  <div id="result"></div>
</div>

</div>
</div>

<div id="toast"></div>

<script>

/* ===== KEEP ORIGINAL LOGIC ===== */

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz90tkyY8NFADJAWBj2qgn_Vrwz3ZnGBDSCVDDuPVK-H_EITyH9PUI1Ja39yA_r4WxdeA/exec";

/* NAV */
function showPage(page, el) {
  ["dashboard","upload","search"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(page).style.display="block";

  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  if(el) el.classList.add("active");
}

/* TOAST */
function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* FILE SYSTEM */
let selectedFiles=[];

document.getElementById("files").addEventListener("change",function(e){
  let newFiles=Array.from(e.target.files);
  selectedFiles=selectedFiles.concat(newFiles);

  if(selectedFiles.length>4){
    toast("Max 4 files");
    selectedFiles=selectedFiles.slice(0,4);
  }

  renderFileList();
});

function renderFileList(){
  let list=document.getElementById("fileList");
  list.innerHTML="";

  selectedFiles.forEach((f,i)=>{
    list.innerHTML+=`
    <div class="file-item">
      ${f.name}
      <button onclick="removeFile(${i})">✕</button>
    </div>`;
  });
}

function removeFile(i){
  selectedFiles.splice(i,1);
  renderFileList();
}

/* BASE64 */
function toBase64(file){
  return new Promise((res,rej)=>{
    let r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

/* UPLOAD */
async function upload(){

  const ic=document.getElementById("ic").value.trim();
  const account=document.getElementById("account").value.trim();

  if(!ic||!account||selectedFiles.length===0){
    toast("Complete all fields");
    return;
  }

  toast("Uploading...");

  for(let file of selectedFiles){

    let base64=await toBase64(file);

    let payload={
      ic,account,
      files:[{
        name:file.name,
        type:file.type,
        data:base64.split(",")[1]
      }]
    };

    await fetch(WEB_APP_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });
  }

  toast("Upload success");
  location.reload();
}

/* SEARCH */
async function search(){

  const ic=document.getElementById("searchIC").value.trim();

  if(!ic){
    toast("Enter IC");
    return;
  }

  document.getElementById("result").innerHTML="Searching...";

  const res=await fetch(`${WEB_APP_URL}?ic=${ic}`);
  const data=await res.json();

  let html=data.length===0?"No record":"";

  data.forEach(d=>{
    html+=`
    <div class="result-card">
      <b>${d.account}</b><br>
      ${d.file}<br><br>
      <a href="${d.url}" target="_blank">View</a>
    </div>`;
  });

  document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
