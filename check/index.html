<!DOCTYPE html>
<html>

<head>

<title>Branch Lock Check</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:500px;
width:100%;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.12);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.check-btn{
background:#007bff;
color:white;
}

.check-btn:hover{
background:#0056b3;
}

.reset-btn{
background:#6c757d;
color:white;
}

.reset-btn:hover{
background:#545b62;
}

.result-card{
margin-top:20px;
padding:20px;
border-radius:8px;
background:#f8f9fa;
border-left:6px solid #28a745;
}

.status{
font-size:22px;
font-weight:bold;
color:#28a745;
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
gap:15px;
margin-bottom:15px;
}

.col{
flex:1;
}

.label{
font-weight:bold;
color:#555;
margin-bottom:3px;
}

.value{
font-size:18px;
font-weight:bold;
}

.amount{
font-size:22px;
font-weight:bold;
}

.remark{
margin-top:5px;
line-height:1.5;
}

.no-lock{
margin-top:20px;
padding:15px;
background:#ffe5e5;
border-left:6px solid red;
border-radius:6px;
font-weight:bold;
}

.loading{
margin-top:20px;
text-align:center;
font-weight:bold;
}

.spinner{
margin:auto;
margin-top:10px;
width:30px;
height:30px;
border:4px solid #ccc;
border-top:4px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@media (max-width:500px){

.row{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Branch Lock Check</h2>

<input type="text" id="acc" placeholder="Enter Account No">

<button class="check-btn" id="checkBtn" onclick="checkLock()">Check Lock</button>

<button class="reset-btn" onclick="newSearch()">New Search</button>

<div id="result"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwohadA8Tj4uVTBQO1d_j6lHhmGT2oQIBka7MY0I53WNDPSpC3SwKPivZ6F5VJpDxDu/exec";

function formatDate(dateStr){

var d=new Date(dateStr);

var day=("0"+d.getDate()).slice(-2);

var monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

var month=monthNames[d.getMonth()];

var year=d.getFullYear();

return day+"-"+month+"-"+year;

}

function checkLock(){

var acc=document.getElementById("acc").value;

if(!acc){
alert("Enter Account No");
return;
}

document.getElementById("checkBtn").disabled=true;

document.getElementById("result").innerHTML=
"<div class='loading'>Processing...<div class='spinner'></div></div>";

fetch(api+"?acc_no="+encodeURIComponent(acc))

.then(res=>res.text())

.then(text=>{

document.getElementById("checkBtn").disabled=false;

var data=JSON.parse(text);

if(data.status=="LOCKED"){

var formattedDate=formatDate(data.valid);

var amount="RM "+Number(data.amount).toLocaleString();

document.getElementById("result").innerHTML=

"<div class='result-card'>"+

"<div class='status'>STATUS : LOCKED</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>ACCOUNT NO :</div>"+
"<div class='value'>"+data.acc_no+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>BRANCH :</div>"+
"<div class='value'>"+data.branch+"</div>"+
"</div>"+

"</div>"+

"<div class='label'>LOCK AMOUNT :</div>"+
"<div class='amount'>"+amount+"</div><br>"+

"<div class='label'>PAYMENT CATEGORY :</div>"+
"<div class='value'>"+(data.category || "-")+"</div><br>"+

"<div class='label'>PROMISE DATE :</div>"+
"<div class='value'>"+formattedDate+"</div><br>"+

"<div class='label'>REMARKS :</div>"+
"<div class='remark'>"+(data.remarks || "-")+"</div>"+

"</div>";

}

else{

document.getElementById("result").innerHTML=
"<div class='no-lock'>NO LOCK FOUND</div>";

}

});

}

function newSearch(){

location.reload();

}

document.getElementById("acc").addEventListener("keypress",function(e){

if(e.key==="Enter"){

checkLock();

}

});

</script>

</body>

</html>
