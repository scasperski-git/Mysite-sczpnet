<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Lock Portal | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --success: #28a745;
            --danger: #dc3545;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #6c757d;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: var(--text-main);
        }

        /* CONTAINER */
        .container {
            max-width: 550px;
            width: 100%;
            margin: 20px auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 25px 20px;
            text-align: center;
            position: relative;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        #userInfo {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.85;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .header-buttons button {
            flex: 1;
            max-width: 130px;
            padding: 10px;
            font-size: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .logout-btn { background: rgba(220, 53, 69, 0.9); }
        .master-btn { background: rgba(108, 99, 255, 0.9); }

        .header-buttons button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* CONTENT */
        .content { padding: 25px; }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 45px;
            font-size: 17px;
            border: 2px solid #e1e5eb;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0,123,255,0.1);
        }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button.main-btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .check-btn {
            flex: 2;
            background: var(--primary);
            color: white;
        }

        .reset-btn {
            flex: 1;
            background: #f8f9fa;
            color: var(--text-muted);
            border: 1px solid #ddd;
        }

        .check-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        /* RESULT CARD */
        .result-card {
            margin-top: 25px;
            padding: 0;
            border-radius: 12px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease-out;
            overflow: hidden;
        }

        .status-banner {
            padding: 12px;
            text-align: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .res-body { padding: 20px; }

        .created-meta {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 6px;
            border-radius: 6px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .label {
            font-size: 11px;
            font-weight: bold;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value {
            font-size: 16px;
            font-weight: 600;
            color: #222;
        }

        .amount-highlight {
            grid-column: span 2;
            background: #fff5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px dashed var(--danger);
        }

        .amount-val {
            font-size: 28px;
            font-weight: 800;
            color: var(--danger);
        }

        .remark-box {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-left: 4px solid #ddd;
            font-size: 14px;
            line-height: 1.5;
        }

        /* NO LOCK / ERROR */
        .no-lock {
            margin-top: 20px;
            padding: 20px;
            background: #fff5f5;
            border: 1px solid #feb2b2;
            border-radius: 12px;
            text-align: center;
            color: #c53030;
            font-weight: 600;
        }

        /* LOADING SPINNER */
        .loading-wrap {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0,123,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 10px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        /* SESSION POPUP */
        #sessionPopup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .session-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            .header h2 { font-size: 18px; }
            .action-btns { flex-direction: column; }
            .info-grid { grid-template-columns: 1fr; }
            .amount-highlight { grid-column: span 1; }
            .container { margin: 0; border-radius: 0; min-height: 100vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fa fa-shield-halved"></i> Lock Portal</h2>
        <div id="userInfo">Loading user...</div>
        
        <div class="header-buttons">
            <button class="logout-btn" onclick="logout()">
                <i class="fa fa-power-off"></i> Logout
            </button>
            <button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">
                <i class="fa fa-th-large"></i> Menu
            </button>
        </div>
    </div>

    <div class="content">
        <div class="input-group">
            <i class="fa fa-hashtag input-icon"></i>
            <input type="text" id="acc_no" autocomplete="off" inputmode="numeric" maxlength="10" placeholder="Enter Account Number">
        </div>

        <div class="action-btns">
            <button class="main-btn check-btn" id="checkBtn">
                <i class="fa fa-search"></i> Check Status
            </button>
            <button class="main-btn reset-btn" id="resetBtn">
                <i class="fa fa-eraser"></i> Clear
            </button>
        </div>

        <div id="result"></div>
    </div>
</div>

<div id="sessionPopup">
    <div class="session-box">
        <i class="fa fa-circle-exclamation" style="font-size:48px; color:var(--danger); margin-bottom:15px;"></i>
        <h3 id="sessionTitle">Session Expired</h3>
        <p id="sessionMsg" style="color:#666;">Redirecting to login page...</p>
    </div>
</div>

<script src="../lockconfig.js"></script>
<script>
    const api = API_URL;
    const user = localStorage.getItem("lock_user");
    const role = localStorage.getItem("lock_role");
    const token = localStorage.getItem("session_token");
    const type = localStorage.getItem("lock_type");

    // Security Checks
    if(!type) window.location="../lockcheck-login/";
    if(type=="lock"){
        alert("Access denied");
        window.location="../lock/";
    }
    if(type === "master") document.getElementById("masterBtn").style.display = "flex";

    document.getElementById("userInfo").innerHTML = `<i class="fa fa-user"></i> ${user || '-'} • <i class="fa fa-id-badge"></i> ${role || '-'}`;

    const input = document.getElementById("acc_no");
    const result = document.getElementById("result");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");

    let isLoading = false;

    // Helper: Formatter
    function formatDate(dateStr) {
        if(!dateStr) return "-";
        const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        let d = new Date(dateStr);
        if (isNaN(d)) {
            // Handle dd/mm/yyyy format
            if(dateStr.includes("/")){
                let p = dateStr.split("/");
                return `${p[0]} ${m[parseInt(p[1])-1]} ${p[2]}`;
            }
            return dateStr;
        }
        return `${("0"+d.getDate()).slice(-2)} ${m[d.getMonth()]} ${d.getFullYear()}`;
    }

    async function checkLock() {
        const acc = input.value.trim();
        if(!acc) {
            input.focus();
            return;
        }
        if(isLoading) return;

        isLoading = true;
        checkBtn.disabled = true;
        result.innerHTML = `
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p>Verifying Account...</p>
            </div>`;

        try {
            const res = await fetch(`${api}?acc_no=${encodeURIComponent(acc)}&token=${token}`);
            const data = await res.json();

            if(data.status == "UNAUTHORIZED") {
                showSessionPopup(data.reason == "SESSION_REPLACED" ? "DEVICE" : "EXPIRED");
                return;
            }

            if(data.status === "LOCKED") {
                const today = new Date();
                today.setHours(0,0,0,0);
                const promiseDate = new Date(data.valid);
                promiseDate.setHours(0,0,0,0);

                const isExpired = today > promiseDate;
                const statusText = isExpired ? "EXPIRED" : "LOCKED";
                const themeColor = isExpired ? "var(--danger)" : "var(--success)";

                result.innerHTML = `
                    <div class="result-card">
                        <div class="status-banner" style="background:${themeColor}">
                            <i class="fa ${isExpired ? 'fa-clock' : 'fa-lock'}"></i> ${statusText}
                        </div>
                        <div class="res-body">
                            <div class="created-meta">
                                <strong>Created by:</strong> ${data.dca_id} <br>
                                <i class="fa fa-calendar-check"></i> ${data.created || '-'}
                            </div>

                            <div class="info-grid">
                                <div>
                                    <div class="label">Account No</div>
                                    <div class="value">${data.acc_no}</div>
                                </div>
                                <div>
                                    <div class="label">Branch</div>
                                    <div class="value">${data.branch}</div>
                                </div>
                                <div class="amount-highlight">
                                    <div class="label">Lock Amount</div>
                                    <div class="amount-val">RM ${(Number(data.amount)).toLocaleString('en-MY', {minimumFractionDigits:2})}</div>
                                </div>
                                <div>
                                    <div class="label">Promise Date</div>
                                    <div class="value">${formatDate(data.valid)}</div>
                                </div>
                                <div>
                                    <div class="label">Category</div>
                                    <div class="value">${data.category || '-'}</div>
                                </div>
                            </div>

                            <div class="label">Remarks</div>
                            <div class="remark-box">${data.remarks || 'No remarks provided.'}</div>
                        </div>
                    </div>`;
            } else {
                result.innerHTML = `<div class="no-lock"><i class="fa fa-circle-info"></i><br>NO ACTIVE LOCK FOUND</div>`;
            }
        } catch(err) {
            result.innerHTML = `<div class="no-lock" style="background:#fffaf0; color:#9b2c2c;">CONNECTION ERROR. TRY AGAIN.</div>`;
        } finally {
            isLoading = false;
            checkBtn.disabled = false;
        }
    }

    // Standard Functions
    function logout() { localStorage.clear(); window.location="../lockcheck-login/"; }
    function goMaster() { window.location="../menu/"; }
    function showSessionPopup(type) {
        if(type === "DEVICE") {
            document.getElementById("sessionTitle").innerText = "Multiple Login";
            document.getElementById("sessionMsg").innerText = "Account detected on another device.";
        }
        document.getElementById("sessionPopup").style.display = "flex";
        setTimeout(logout, 3000);
    }

    // Event Listeners
    checkBtn.onclick = checkLock;
    resetBtn.onclick = () => { input.value=""; result.innerHTML=""; input.focus(); };
    input.onkeypress = (e) => { if(e.key === "Enter") checkLock(); };
    input.oninput = function() { this.value = this.value.replace(/[^0-9]/g,''); };

    // Session & Activity
    let lastActivity = Date.now();
    const updateActivity = () => lastActivity = Date.now();
    ["click", "touchstart", "keydown"].forEach(ev => document.addEventListener(ev, updateActivity));
    
    setInterval(() => {
        if(Date.now() - lastActivity > 1200000) showSessionPopup("EXPIRED");
    }, 10000);
</script>
</body>
</html>
