<!DOCTYPE html>
<html>

<head>

<title>Branch Lock Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.12);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.check-btn{
background:#007bff;
color:white;
}

.reset-btn{
background:#6c757d;
color:white;
}

.result-card{
margin-top:20px;
padding:20px;
border-radius:6px;
background:#f8f9fa;
border-left:6px solid #28a745;
}

.expired-card{
margin-top:20px;
padding:20px;
border-radius:6px;
background:#fff3cd;
border-left:6px solid #ff9800;
}

.status{
font-size:20px;
font-weight:bold;
color:#28a745;
margin-bottom:15px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.field{
background:white;
padding:10px;
border-radius:6px;
border:1px solid #eee;
}

.label{
font-size:12px;
color:#666;
margin-bottom:4px;
}

.value{
font-size:16px;
font-weight:bold;
}

.amount{
font-size:22px;
color:#000;
}

.no-lock{
margin-top:20px;
padding:15px;
background:#ffe5e5;
border-left:6px solid red;
border-radius:6px;
font-weight:bold;
}

/* OVERLAY LOADING */

.loading-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}

.spinner{
width:40px;
height:40px;
border:5px solid #ccc;
border-top:5px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="container">

<h2>Branch Lock Check</h2>

<input type="text" id="acc" placeholder="Enter Account No">

<button class="check-btn" id="checkBtn" onclick="checkLock()">Check Lock</button>

<button class="reset-btn" onclick="newSearch()">New Search</button>

<div id="result"></div>

</div>

<div id="loading" style="display:none" class="loading-overlay">
<div class="spinner"></div>
<div style="margin-top:10px;font-weight:bold">Processing...</div>
</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwUPcWT10WoDDYE5z2Dcfv4bDtXY2nNF1tL2OL8TMKaYAwxPwHeFxQZtZJI3xgAi-lT/exec";

function formatDate(dateStr){

var d=new Date(dateStr);

var day=("0"+d.getDate()).slice(-2);

var monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

var month=monthNames[d.getMonth()];

var year=d.getFullYear();

return day+"-"+month+"-"+year;

}

function isExpired(dateStr){

var today=new Date();
var promise=new Date(dateStr);

today.setHours(0,0,0,0);
promise.setHours(0,0,0,0);

return today>promise;

}

function showLoading(){
document.getElementById("loading").style.display="flex";
}

function hideLoading(){
document.getElementById("loading").style.display="none";
}

function checkLock(){

var acc=document.getElementById("acc").value;

if(!acc){
alert("Enter Account No");
return;
}

document.getElementById("checkBtn").disabled=true;

showLoading();

fetch(api+"?acc_no="+encodeURIComponent(acc))
.then(res=>res.text())
.then(text=>{

hideLoading();

document.getElementById("checkBtn").disabled=false;

var data=JSON.parse(text);

if(data.status=="LOCKED"){

var formattedDate=formatDate(data.valid);
var amount="RM "+Number(data.amount).toLocaleString();

document.getElementById("result").innerHTML=

"<div class='result-card'>"+

"<div class='status'>STATUS : LOCKED</div>"+

"<div class='info-grid'>"+

"<div class='field'><div class='label'>Branch</div><div class='value'>"+data.branch+"</div></div>"+

"<div class='field'><div class='label'>Promise Date</div><div class='value'>"+formattedDate+"</div></div>"+

"<div class='field'><div class='label'>Lock Amount</div><div class='value amount'>"+amount+"</div></div>"+

"<div class='field'><div class='label'>Payment Category</div><div class='value'>"+(data.category || "-")+"</div></div>"+

"<div class='field'><div class='label'>DCA ID</div><div class='value'>"+(data.dca_id || "-")+"</div></div>"+

"<div class='field'><div class='label'>DCA Remark</div><div class='value'>"+(data.dca_remark || "-")+"</div></div>"+

"</div>"+

"</div>";

}

else{

document.getElementById("result").innerHTML=
"<div class='no-lock'>NO LOCK FOUND</div>";

}

});

}

function newSearch(){
location.reload();
}

document.getElementById("acc").addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkLock();
}
});

</script>

</body>
</html>
