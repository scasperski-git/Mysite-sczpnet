<!DOCTYPE html>
<html>

<head>
    <title>Check Lock Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .header i.main-icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
            color: #38bdf8;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        #userInfo {
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .header-buttons button {
            all: unset;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .logout-btn { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.25); }

        .master-btn { background: rgba(255, 255, 255, 0.1); color: white; }
        .master-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* CONTENT */
        .content { padding: 30px; }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 16px 16px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            color: var(--text-main);
            background: #fcfcfd;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .check-btn {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .check-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .check-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .reset-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #e2e8f0;
        }

        .reset-btn:hover {
            background: #f1f5f9;
        }

        /* RESULT CARD */
        .result-card {
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .status-box {
            position: absolute;
            top: -15px;
            right: 20px;
        }

        .status-box span {
            padding: 6px 18px;
            color: white;
            font-weight: 800;
            font-size: 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .created-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
        }

        .col { flex: 1; }

        .label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .amount {
            font-size: 24px;
            font-weight: 800;
            color: var(--danger);
            letter-spacing: -0.5px;
        }

        .remark {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            border-left: 3px solid #cbd5e1;
            margin-top: 8px;
        }

        .no-lock {
            margin-top: 25px;
            padding: 20px;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            color: #be123c;
            animation: fadeIn 0.3s ease;
        }

        /* SESSION POPUP */
        #sessionPopup {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .session-box {
            background: white;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .session-box i {
            font-size: 50px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .session-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .session-msg {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .session-count {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
        }

        /* LOADING */
        .loading {
            margin-top: 30px;
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
        }

        .spinner {
            margin: 15px auto;
            width: 40px;
            height: 40px;
            border: 3px solid #f1f5f9;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* DESKTOP OPTIMIZATION */
        @media (max-width: 500px) {
            .row { flex-direction: column; gap: 15px; }
            .container { border-radius: 0; min-height: 100vh; }
            body { padding: 0; }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <i class="fa fa-shield-halved main-icon"></i>
            <h1>Check Lock Portal</h1>
            <div id="userInfo">Loading User...</div>

            <div class="header-buttons">
                <button class="logout-btn" onclick="logout()">
                    <i class="fa fa-power-off"></i> Logout
                </button>
                <button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">
                    <i class="fa fa-grid-2"></i> Master Menu
                </button>
            </div>
        </div>

        <div class="content">
            <div class="input-group">
                <input type="text" id="acc_no" autocomplete="off" inputmode="numeric" maxlength="10" placeholder="Enter Account Number">
            </div>

            <button class="check-btn" id="checkBtn">
                <i class="fa fa-magnifying-glass"></i> Check Status
            </button>

            <button class="reset-btn" id="resetBtn">
                <i class="fa fa-arrow-rotate-left"></i> New Search
            </button>

            <div id="result"></div>
        </div>
    </div>

    <script src="../lockconfig.js"></script>
    <script>
        const api = API_URL;
        const user = localStorage.getItem("lock_user");
        const role = localStorage.getItem("lock_role");
        const token = localStorage.getItem("session_token");
        const type = localStorage.getItem("lock_type");

        if (!type) { window.location = "../lockcheck-login/"; }
        if (type == "lock") { alert("Access denied"); window.location = "../lock/"; }
        if (type === "master") { document.getElementById("masterBtn").style.display = "flex"; }

        async function checkSession() {
            try {
                const res = await fetch(api + "?action=session&token=" + token);
                const data = await res.json();
                if (data.status !== "ACTIVE") { showSessionPopup("DEVICE"); return; }
            } catch (e) { console.log("session check error"); }
        }

        function goMaster() { window.location = "../menu/"; }
        if (!token) { logout(); }

        document.getElementById("userInfo").innerHTML = "User: " + (user || "-") + " • Role: " + (role || "-");

        const input = document.getElementById("acc_no");
        const result = document.getElementById("result");
        const checkBtn = document.getElementById("checkBtn");
        const resetBtn = document.getElementById("resetBtn");
        let isLoading = false;

        window.onload = () => { input.focus(); };

        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            if (dateStr.includes("-") && dateStr.split("-")[0].length == 4) {
                var p = dateStr.split("-");
                return p[2] + " " + m[parseInt(p[1]) - 1] + " " + p[0];
            }
            if (dateStr.includes("/")) {
                var p = dateStr.split("/");
                return ("0" + p[0]).slice(-2) + " " + m[parseInt(p[1]) - 1] + " " + p[2];
            }
            if (dateStr.includes("T")) {
                var d = new Date(dateStr);
                return ("0" + d.getDate()).slice(-2) + " " + m[d.getMonth()] + " " + d.getFullYear();
            }
            return dateStr;
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return "-";
            const parts = dateStr.split(" ");
            const datePart = parts[0].split("/");
            const timePart = parts[1].split(":");
            const m = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return datePart[0] + " " + m[parseInt(datePart[1]) - 1] + " " + datePart[2] + " " + timePart[0] + ":" + timePart[1];
        }

        async function checkLock() {
            const acc = input.value.trim();
            if (!acc) { alert("Enter Account No"); input.focus(); return; }
            if (isLoading) return;

            isLoading = true;
            checkBtn.disabled = true;
            result.innerHTML = "<div class='loading'>Verifying account details...<div class='spinner'></div></div>";

            try {
                const res = await fetch(api + "?acc_no=" + encodeURIComponent(acc) + "&token=" + token);
                const data = await res.json();

                if (data.status == "UNAUTHORIZED") {
                    if (data.reason == "SESSION_REPLACED") alert("Your account has been logged in from another device.");
                    else showSessionPopup("EXPIRED");
                    localStorage.clear(); window.location = "../lockcheck-login/"; return;
                }

                if (data.status === "LOCKED") {
                    const formattedDate = formatDate(data.valid);
                    const created = formatDateTime(data.created);
                    const amount = "RM " + Number(data.amount || 0).toLocaleString("en-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                    const promiseDate = new Date(data.valid);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    promiseDate.setHours(0, 0, 0, 0);

                    let statusText = "LOCKED";
                    let statusColor = "#10b981"; // Success Green
                    if (today > promiseDate) { statusText = "EXPIRED"; statusColor = "#ef4444"; }

                    result.innerHTML = `
                        <div class='result-card' style='border-left: 5px solid ${statusColor}'>
                            <div class='status-box'><span style='background:${statusColor}'>${statusText}</span></div>
                            <div class='created-meta'>Created by <b>${data.dca_id}</b> • ${created}</div>
                            <div class='row'>
                                <div class='col'><div class='label'>Account No</div><div class='value'>${data.acc_no}</div></div>
                                <div class='col'><div class='label'>Branch</div><div class='value'>${data.branch}</div></div>
                            </div>
                            <div class='row'>
                                <div class='col'><div class='label'>Lock Amount</div><div class='amount'>${amount}</div></div>
                                <div class='col'><div class='label'>Promise Date</div><div class='value'>${formattedDate}</div></div>
                            </div>
                            <div class='label'>Payment Category</div>
                            <div class='value'>${data.category || "-"}</div><br>
                            <div class='label'>Remarks</div>
                            <div class='remark'>${data.remarks || "-"}</div>
                        </div>`;
                } else {
                    result.innerHTML = "<div class='no-lock'><i class='fa-regular fa-circle-xmark'></i> NO LOCK FOUND</div>";
                }
            } catch (err) {
                result.innerHTML = "<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>";
            }
            checkBtn.disabled = false;
            isLoading = false;
        }

        function newSearch() {
            input.value = ""; result.innerHTML = ""; checkBtn.disabled = false; input.focus();
        }

        function showSessionPopup(type) {
            let title = "Session Expired";
            let msg = "Your session has expired. Please login again.";
            if (type === "DEVICE") { title = "New Login Detected"; msg = "Your account has been logged in from another device."; }
            document.getElementById("sessionTitle").innerText = title;
            document.getElementById("sessionMsg").innerText = msg;
            document.getElementById("sessionPopup").style.display = "flex";
            setTimeout(() => { localStorage.clear(); window.location = "../lockcheck-login/"; }, 3000);
        }

        function logout() { localStorage.clear(); window.location = "../lockcheck-login/"; }

        checkBtn.addEventListener("click", checkLock);
        resetBtn.addEventListener("click", newSearch);
        input.addEventListener("keypress", (e) => { if (e.key === "Enter") checkLock(); });
        input.addEventListener("input", function() { this.value = this.value.replace(/[^0-9]/g, ''); });

        let lastActivity = Date.now();
        const IDLE_LIMIT = 1200000;
        let idleTriggered = false;
        function updateActivity() { lastActivity = Date.now(); }
        function checkIdle() { if (!idleTriggered && Date.now() - lastActivity > IDLE_LIMIT) { idleTriggered = true; showSessionPopup("EXPIRED"); } }
        setInterval(checkIdle, 5000);
        ["touchstart", "touchmove", "click", "scroll", "keydown", "mousemove"].forEach(event => { document.addEventListener(event, updateActivity, { passive: true }); });
        document.addEventListener("visibilitychange", () => { if (!document.hidden && (Date.now() - lastActivity > IDLE_LIMIT)) showSessionPopup("EXPIRED"); });
        setInterval(checkSession, 30000);
    </script>

    <div id="sessionPopup">
        <div class="session-box">
            <i class="fa fa-circle-exclamation"></i>
            <div class="session-title" id="sessionTitle">Session Expired</div>
            <div class="session-msg" id="sessionMsg">Please login again.</div>
            <div class="session-count">Redirecting to login portal...</div>
        </div>
    </div>
</body>
</html>
