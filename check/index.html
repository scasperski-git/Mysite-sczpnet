<!DOCTYPE html>
<html>

<head>

<title>Check Lock Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================================
   PREMIUM UI ENHANCEMENTS
   ========================================= */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f4f8; /* Soft premium corporate gray/blue */
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}

/* CONTAINER */
.container {
    max-width: 600px; /* Slightly wider for better desktop view */
    width: 100%;
    margin: 20px auto;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.05);
    overflow: hidden;
    transition: all 0.3s ease;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); /* Deep premium slate */
    color: white;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.header i.fa-search {
    font-size: 22px;
    color: #38bdf8;
    margin-right: 8px;
}

.header {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

#userInfo {
    font-size: 13px;
    font-weight: 500;
    margin-top: 8px;
    color: #94a3b8;
    background: rgba(255,255,255,0.05);
    display: inline-block;
    padding: 6px 16px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.1);
}

.header-buttons {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    justify-content: center;
}

.header-buttons button {
    width: auto;
    min-width: 130px;
    padding: 10px 16px;
    font-size: 13px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.logout-btn {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171 !important;
    border: 1px solid rgba(239, 68, 68, 0.3) !important;
}

.master-btn {
    background: rgba(139, 92, 246, 0.15);
    color: #a78bfa !important;
    border: 1px solid rgba(139, 92, 246, 0.3) !important;
}

.header-buttons button:hover {
    transform: translateY(-2px);
    filter: brightness(1.2);
}

/* CONTENT AREA */
.content {
    padding: 30px 25px;
}

/* INPUT */
input {
    width: 100%;
    padding: 16px 20px;
    font-size: 16px;
    font-weight: 500;
    color: #1e293b;
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

input:focus {
    border-color: #3b82f6;
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

input::placeholder {
    color: #94a3b8;
    font-weight: 400;
}

/* MAIN BUTTONS */
button {
    width: 100%;
    padding: 16px;
    margin-top: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.2s ease;
}

.check-btn {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
}

.check-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
}

.reset-btn {
    background: #f1f5f9;
    color: #475569;
    margin-top: 12px;
}

.reset-btn:hover {
    background: #e2e8f0;
    color: #1e293b;
}

/* =========================================
   RESULT CARD (Generated by JS)
   ========================================= */
.result-card {
    margin-top: 25px;
    padding: 25px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    animation: fadeIn .4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
}

/* Decor line at top of card */
.result-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #38bdf8, #2563eb);
}

.status-box {
    text-align: center;
    margin-bottom: 16px;
}

.status-box span {
    display: inline-block;
    padding: 6px 20px;
    color: white;
    font-weight: 700;
    font-size: 14px;
    border-radius: 30px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.created-meta {
    font-size: 12px;
    color: #64748b;
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px dashed #e2e8f0;
}

.row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
}

.col {
    flex: 1;
}

.label {
    font-weight: 700;
    color: #94a3b8;
    font-size: 11px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.value {
    font-size: 16px;
    font-weight: 700;
    color: #1e293b;
    word-break: break-all;
}

.amount {
    font-size: 24px;
    font-weight: 800;
    color: #ef4444; /* Premium Red */
    letter-spacing: 0.5px;
}

.remark {
    margin-top: 8px;
    line-height: 1.6;
    background: #f8fafc;
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    color: #334155;
    font-size: 14px;
}

/* NO LOCK / ERROR MSG */
.no-lock {
    margin-top: 25px;
    padding: 20px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 12px;
    text-align: center;
    font-weight: 700;
    color: #dc2626;
    font-size: 15px;
    animation: fadeIn .3s ease;
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.05);
}

/* SESSION POPUP */
#sessionPopup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.session-box {
    background: white;
    padding: 40px 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    max-width: 340px;
    width: 90%;
    animation: scaleIn .3s cubic-bezier(0.16, 1, 0.3, 1);
}

.session-box i {
    font-size: 48px;
    color: #ef4444;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 6px rgba(239, 68, 68, 0.2));
}

.session-title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 10px;
    color: #1e293b;
}

.session-msg {
    font-size: 15px;
    color: #64748b;
    margin-bottom: 20px;
    line-height: 1.5;
}

.session-count {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    background: #f1f5f9;
    padding: 8px;
    border-radius: 8px;
}

/* LOADING */
.loading {
    margin-top: 30px;
    text-align: center;
    font-weight: 600;
    color: #64748b;
    font-size: 15px;
}

.spinner {
    margin: 16px auto 0;
    width: 40px;
    height: 40px;
    border: 3px solid #e2e8f0;
    border-top: 3px solid #3b82f6;
    border-radius: 50%;
    animation: spin .8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
}

/* ANIMATIONS */
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

/* RESPONSIVE DESIGN */
@media (max-width: 500px) {
    body {
        padding: 15px 10px;
    }
    .container {
        margin: 0 auto;
        border-radius: 16px;
    }
    .row {
        flex-direction: column;
        gap: 15px;
    }
    .col {
        background: #f8fafc;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #f1f5f9;
    }
    /* Disable grey background for amount/date row to make amount pop */
    .row:nth-child(4) .col {
        background: transparent;
        padding: 0;
        border: none;
    }
    .header-buttons button {
        min-width: 110px;
        font-size: 12px;
    }
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<i class="fa fa-search"></i> Check Lock Portal
<div id="userInfo"></div>

<div class="header-buttons">

<button class="logout-btn" onclick="logout()">
<i class="fa fa-right-from-bracket"></i> Logout
</button>

<button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">
<i class="fa fa-arrow-left"></i> Master Menu
</button>

</div>
</div>

<div class="content">

<input
type="text"
id="acc_no"
autocomplete="off"
inputmode="numeric"
maxlength="10"
placeholder="Enter Account Number">

<button class="check-btn" id="checkBtn">
<i class="fa fa-search"></i> Check Lock
</button>

<button class="reset-btn" id="resetBtn">
<i class="fa fa-rotate-left"></i> New Search
</button>

<div id="result"></div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const api = API_URL;

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");
const token = localStorage.getItem("session_token");

const type = localStorage.getItem("lock_type");

if(!type){
window.location="../lockcheck-login/";
}

if(type=="lock"){
alert("Access denied");
window.location="../lock/";
}

if(type === "master"){
document.getElementById("masterBtn").style.display = "inline-block";
}

async function checkSession(){

try{

const res = await fetch(api+"?action=session&token="+token);
const data = await res.json();

if(data.status !== "ACTIVE"){

showSessionPopup("DEVICE");
return;

localStorage.clear();
window.location="../lockcheck-login/";

}

}catch(e){
console.log("session check error");
}

}

function goMaster(){
window.location="../menu/";
}

if(!token){
logout();
}

document.getElementById("userInfo").innerHTML =
"User: "+(user || "-")+" | Role: "+(role || "-");

const input=document.getElementById("acc_no");
const result=document.getElementById("result");
const checkBtn=document.getElementById("checkBtn");
const resetBtn=document.getElementById("resetBtn");

let isLoading=false;

window.onload=()=>{
input.focus();
};

function formatDate(dateStr){

if(!dateStr) return "-";

if(dateStr.includes("-") && dateStr.split("-")[0].length==4){

var p=dateStr.split("-");
var year=p[0];
var month=parseInt(p[1])-1;
var day=p[2];

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year;

}

if(dateStr.includes("/")){

var p=dateStr.split("/");

var day=parseInt(p[0]);
var month=parseInt(p[1])-1;
var year=p[2];

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return ("0"+day).slice(-2)+" "+m[month]+" "+year;

}

if(dateStr.includes("T")){

var d=new Date(dateStr);

var day=("0"+d.getDate()).slice(-2);
var month=d.getMonth();
var year=d.getFullYear();

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year;

}

return dateStr;

}

function formatDateTime(dateStr){

if(!dateStr) return "-";

/* format expected: dd/MM/yyyy HH:mm:ss */

const parts = dateStr.split(" ");

const datePart = parts[0].split("/");
const timePart = parts[1].split(":");

const day = datePart[0];
const monthIndex = parseInt(datePart[1]) - 1;
const year = datePart[2];

const hour = timePart[0];
const minute = timePart[1];

const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[monthIndex]+" "+year+" "+hour+":"+minute;

}

async function checkLock(){

const acc=input.value.trim();

if(!acc){
alert("Enter Account No");
input.focus();
return;
}

if(isLoading) return;

isLoading=true;
checkBtn.disabled=true;

result.innerHTML=
"<div class='loading'>Checking Lock Status<div class='spinner'></div></div>";

try{

const res = await fetch(api+"?acc_no="+encodeURIComponent(acc)+"&token="+token);

const data=await res.json();

if(data.status=="UNAUTHORIZED"){

if(data.reason=="SESSION_REPLACED"){
alert("Your account has been logged in from another device.");
}
else{
showSessionPopup("EXPIRED");
return;
}

localStorage.clear();
window.location="../lockcheck-login/";
return;

}

if(data.status==="LOCKED"){

const formattedDate=formatDate(data.valid);
const created=formatDateTime(data.created);
const amount = "RM " + Number(data.amount || 0).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

const promiseDate=new Date(data.valid);

const today=new Date();
today.setHours(0,0,0,0);

promiseDate.setHours(0,0,0,0);

let statusText="LOCKED";
let statusColor="#10b981"; // Updated to softer premium green

if(today>promiseDate){
statusText="EXPIRED";
statusColor="#ef4444"; // Updated to premium red
}

result.innerHTML=

"<div class='result-card'>"+

"<div class='status-box'><span style='background:"+statusColor+"'>"+statusText+"</span></div>"+

"<div class='created-meta'>Created by "+data.dca_id+
" • "+created+"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>ACCOUNT NO</div>"+
"<div class='value'>"+data.acc_no+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>BRANCH</div>"+
"<div class='value'>"+data.branch+"</div>"+
"</div>"+

"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>LOCK AMOUNT</div>"+
"<div class='amount'>"+amount+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>PROMISE DATE</div>"+
"<div class='value'>"+formattedDate+"</div>"+
"</div>"+

"</div>"+

"<div class='label'>PAYMENT CATEGORY</div>"+
"<div class='value'>"+(data.category || "-")+"</div><br>"+

"<div class='label'>REMARKS</div>"+
"<div class='remark'>"+(data.remarks || "-")+"</div>"+

"</div>";

}
else{

result.innerHTML=
"<div class='no-lock'>NO LOCK FOUND</div>";

}

}catch(err){

result.innerHTML=
"<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>";

}

checkBtn.disabled=false;
isLoading=false;

}

function newSearch(){

input.value="";
result.innerHTML="";
checkBtn.disabled=false;
input.focus();

}

function showSessionPopup(type){

let title="Session Expired";
let msg="Your session has expired. Please login again.";

if(type==="DEVICE"){
title="Logged In From Another Device";
msg="Your account has been logged in from another device.";
}

document.getElementById("sessionTitle").innerText=title;
document.getElementById("sessionMsg").innerText=msg;

document.getElementById("sessionPopup").style.display="flex";

setTimeout(()=>{
localStorage.clear();
window.location="../lockcheck-login/";
},3000);

}

function logout(){
localStorage.clear();
window.location="../lockcheck-login/";
}

checkBtn.addEventListener("click",checkLock);
resetBtn.addEventListener("click",newSearch);

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkLock();
}
});

input.addEventListener("input",function(){
this.value=this.value.replace(/[^0-9]/g,'');
});
  
let lastActivity = Date.now();
const IDLE_LIMIT = 1200000; // 20 min
let idleTriggered = false;

function updateActivity(){
lastActivity = Date.now();
}

function checkIdle(){

if(!idleTriggered && Date.now() - lastActivity > IDLE_LIMIT){
idleTriggered = true;
showSessionPopup("EXPIRED");
}

}

setInterval(checkIdle, 5000);

[
"touchstart",
"touchmove",
"click",
"scroll",
"keydown",
"mousemove"
].forEach(event=>{
document.addEventListener(event, updateActivity, {passive:true});
});

document.addEventListener("visibilitychange",()=>{

if(!document.hidden){
if(Date.now() - lastActivity > IDLE_LIMIT){
showSessionPopup("EXPIRED");
}
}

});
/* SESSION MONITOR */

setInterval(checkSession,30000);
  
</script>

<div id="sessionPopup">
<div class="session-box">

<i class="fa fa-shield-halved"></i>

<div class="session-title" id="sessionTitle">
Session Expired
</div>

<div class="session-msg" id="sessionMsg">
Please login again.
</div>

<div class="session-count">
Redirecting to login...
</div>

</div>
</div>

</body>
</html>
