<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check Lock Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --dark: #0047ab;
            --success: #28a745;
            --danger: #dc3545;
            --gray: #f4f7f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #dee2e6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Rapat atas sikit untuk mobile */
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            min-height: 100vh; /* Full height on mobile */
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* COMPACT HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white;
            padding: 12px 15px;
            text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
        }

        #userInfo {
            font-size: 11px;
            opacity: 0.9;
            background: rgba(0,0,0,0.2);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .header-buttons button {
            flex: 1;
            padding: 6px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn { background: var(--danger); }
        .master-btn { background: #6c63ff; }

        /* MAIN CONTENT */
        .content {
            padding: 15px;
            flex: 1;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .check-btn {
            width: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* RESULT AREA - COMPACT */
        .result-card {
            border: 1.5px solid #eee;
            border-radius: 12px;
            padding: 12px;
            animation: fadeIn 0.3s ease;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #eee;
        }

        .status-badge {
            padding: 4px 12px;
            color: white;
            font-weight: 800;
            font-size: 13px;
            border-radius: 6px;
        }

        .created-at {
            font-size: 10px;
            color: #888;
            text-align: right;
        }

        /* GRID SYSTEM (FORCED 2 COLUMNS ON MOBILE) */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-item { margin-bottom: 8px; }

        .label {
            font-size: 10px;
            color: #999;
            font-weight: 700;
            text-transform: uppercase;
        }

        .value {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            word-break: break-all;
        }

        .amount-value {
            font-size: 18px;
            color: var(--danger);
            font-weight: 800;
        }

        .remark-box {
            background: #f9f9f9;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            color: #555;
            margin-top: 5px;
            border-left: 3px solid #ddd;
        }

        /* UTILS */
        .no-lock {
            text-align: center;
            padding: 20px;
            background: #fff5f5;
            color: var(--danger);
            border-radius: 10px;
            font-weight: 600;
        }

        .loading-spinner {
            text-align: center;
            padding: 20px;
        }

        @keyframes fadeIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: 0; } }

        /* DESKTOP ADJUSTMENT */
        @media (min-width: 500px) {
            body { padding: 20px; }
            .container { min-height: auto; border-radius: 15px; }
        }

        /* OVERLAY SESSION */
        #sessionPopup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .session-box { background: white; padding: 20px; border-radius: 12px; text-align: center; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <p class="header-title"><i class="fa fa-shield-halved"></i> Lock Check</p>
            <div id="userInfo"></div>
        </div>
        <div class="header-buttons">
            <button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">
                <i class="fa fa-arrow-left"></i> Menu
            </button>
            <button class="logout-btn" onclick="logout()">
                <i class="fa fa-power-off"></i> Logout
            </button>
        </div>
    </div>

    <div class="content">
        <div class="search-box">
            <input type="text" id="acc_no" inputmode="numeric" placeholder="Account No" maxlength="12">
            <button class="check-btn" onclick="checkLock()"><i class="fa fa-search"></i></button>
        </div>

        <div id="result">
            <div style="text-align: center; color: #ccc; margin-top: 40px;">
                <i class="fa fa-search" style="font-size: 40px; margin-bottom: 10px;"></i>
                <p>Enter Account Number</p>
            </div>
        </div>
    </div>
</div>

<div id="sessionPopup">
    <div class="session-box">
        <i class="fa fa-triangle-exclamation" style="font-size: 30px; color: var(--danger);"></i>
        <h3 id="sessionTitle">Expired</h3>
        <p id="sessionMsg" style="font-size: 13px; color: #666;">Redirecting...</p>
    </div>
</div>

<script src="../lockconfig.js"></script>
<script>
    const api = API_URL;
    const user = localStorage.getItem("lock_user");
    const role = localStorage.getItem("lock_role");
    const token = localStorage.getItem("session_token");
    const type = localStorage.getItem("lock_type");

    // Auth Guard
    if(!type || !token) logout();
    if(type === "master") document.getElementById("masterBtn").style.display = "block";
    document.getElementById("userInfo").innerHTML = `<i class="fa fa-user"></i> ${user}`;

    const input = document.getElementById("acc_no");
    const resultDiv = document.getElementById("result");

    function goMaster() { window.location.href = "../menu/"; }
    function logout() { localStorage.clear(); window.location.href = "../lockcheck-login/"; }

    function formatDate(d) {
        if(!d) return "-";
        const date = new Date(d);
        return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    async function checkLock() {
        const acc = input.value.trim();
        if(!acc) return;

        resultDiv.innerHTML = `<div class="loading-spinner"><i class="fa fa-spinner fa-spin" style="font-size:30px; color:var(--primary)"></i></div>`;

        try {
            const res = await fetch(`${api}?acc_no=${acc}&token=${token}`);
            const data = await res.json();

            if(data.status === "UNAUTHORIZED") {
                showSessionPopup("DEVICE");
                return;
            }

            if(data.status === "LOCKED") {
                const isExpired = new Date() > new Date(data.valid);
                const statusColor = isExpired ? 'var(--danger)' : 'var(--success)';
                const statusText = isExpired ? 'EXPIRED' : 'LOCKED';

                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="status-header">
                            <span class="status-badge" style="background:${statusColor}">${statusText}</span>
                            <div class="created-at">Created by: ${data.dca_id}<br>${data.created || ''}</div>
                        </div>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">Account No</div>
                                <div class="value">${data.acc_no}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Branch</div>
                                <div class="value">${data.branch || '-'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Amount</div>
                                <div class="value amount-value">RM ${Number(data.amount).toLocaleString('en-MY', {minimumFractionDigits:2})}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Promise Date</div>
                                <div class="value">${formatDate(data.valid)}</div>
                            </div>
                        </div>

                        <div class="info-item" style="margin-top:5px">
                            <div class="label">Category</div>
                            <div class="value" style="font-size:12px">${data.category || '-'}</div>
                        </div>

                        <div class="label" style="margin-top:10px">Remarks</div>
                        <div class="remark-box">${data.remarks || 'No remarks provided.'}</div>

                        <button onclick="resetSearch()" style="width:100%; margin-top:15px; padding:10px; border:none; border-radius:8px; background:#eee; font-weight:700; cursor:pointer">New Search</button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="no-lock">RECORD NOT FOUND</div>`;
            }
        } catch (e) {
            resultDiv.innerHTML = `<div class="no-lock">SERVER ERROR</div>`;
        }
    }

    function resetSearch() {
        input.value = "";
        resultDiv.innerHTML = `<div style="text-align: center; color: #ccc; margin-top: 40px;"><i class="fa fa-search" style="font-size: 40px; margin-bottom: 10px;"></i><p>Enter Account Number</p></div>`;
        input.focus();
    }

    function showSessionPopup(type) {
        document.getElementById("sessionPopup").style.display = "flex";
        setTimeout(logout, 2500);
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") checkLock(); });
    input.addEventListener("input", function() { this.value = this.value.replace(/[^0-9]/g,''); });
</script>
</body>
</html>
