<!DOCTYPE html>
<html>

<head>

<title>Check Lock Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Segoe UI, Arial, sans-serif;
background:linear-gradient(135deg,#eef2f7,#dfe7f2);
margin:0;
padding:20px;
}

/* CONTAINER */

.container{
max-width:520px;
margin:auto;
background:white;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
overflow:hidden;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#0066ff,#003cb3);
color:white;
padding:16px 20px;
display:flex;
align-items:center;
justify-content:space-between;
font-size:20px;
font-weight:700;
}

.header-title{
display:flex;
align-items:center;
gap:8px;
}

.header-right{
display:flex;
align-items:center;
gap:12px;
}

.user-badge{
background:rgba(255,255,255,0.18);
padding:6px 12px;
border-radius:20px;
font-size:13px;
display:flex;
align-items:center;
gap:6px;
}

/* CONTENT */

.content{
padding:28px;
}

/* INPUT */

.input-group{
position:relative;
}

.input-group i{
position:absolute;
top:50%;
left:14px;
transform:translateY(-50%);
color:#777;
}

input{
width:100%;
padding:14px 14px 14px 40px;
font-size:16px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
transition:0.25s;
}

input:focus{
border-color:#0066ff;
box-shadow:0 0 0 3px rgba(0,102,255,0.15);
}

/* BUTTON GROUP */

.btn-group{
display:flex;
gap:10px;
margin-top:14px;
}

button{
flex:1;
padding:13px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

/* CHECK BUTTON */

.check-btn{
background:linear-gradient(135deg,#0066ff,#003cb3);
color:white;
}

.check-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

/* RESET */

.reset-btn{
flex:0 0 50px;
background:#f1f3f5;
color:#333;
}

.reset-btn:hover{
background:#e5e7ea;
}

/* RESULT CARD */

.result-card{
margin-top:22px;
padding:22px;
border-radius:12px;
background:white;
border:1px solid #e6e6e6;
box-shadow:0 8px 22px rgba(0,0,0,0.08);
animation:fadeIn .3s ease;
}

/* STATUS */

.status-box{
text-align:center;
margin-bottom:12px;
}

.status-box span{
display:inline-block;
padding:7px 24px;
color:white;
font-weight:700;
font-size:17px;
border-radius:30px;
letter-spacing:1px;
}

/* META */

.created-meta{
font-size:12px;
color:#777;
text-align:center;
margin-bottom:16px;
}

/* GRID */

.row{
display:flex;
gap:15px;
margin-bottom:15px;
}

.col{
flex:1;
}

.label{
font-weight:600;
color:#777;
font-size:12px;
margin-bottom:4px;
}

.value{
font-size:18px;
font-weight:700;
}

.amount{
font-size:28px;
font-weight:800;
color:#dc3545;
}

/* REMARK */

.remark{
margin-top:6px;
line-height:1.5;
color:#444;
}

/* NO LOCK */

.no-lock{
margin-top:20px;
padding:18px;
background:#fff5f5;
border:1px solid #ffc9c9;
border-radius:10px;
text-align:center;
font-weight:600;
color:#c92a2a;
}

/* LOADING */

.loading{
margin-top:25px;
text-align:center;
font-weight:600;
color:#444;
}

.spinner{
margin:auto;
margin-top:12px;
width:35px;
height:35px;
border:4px solid #e5e5e5;
border-top:4px solid #0066ff;
border-radius:50%;
animation:spin .9s linear infinite;
}

/* ANIMATION */

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

/* MOBILE */

@media(max-width:500px){

.row{
flex-direction:column;
}

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="header-title">
<i class="fa fa-search"></i> Check Lock System
</div>

<div class="header-right">

<div class="user-badge">
<i class="fa fa-user"></i>
<span id="userName"></span>
</div>

<button class="logout-btn" onclick="logout()">
<i class="fa fa-sign-out-alt"></i> Logout
</button>

</div>

</div>

<div class="content">

<div class="input-group">
<i class="fa fa-hashtag"></i>
<input
type="text"
id="acc_no"
autocomplete="off"
inputmode="numeric"
maxlength="10"
placeholder="Enter Account Number">
</div>

<div class="btn-group">
<button class="check-btn" id="checkBtn">
<i class="fa fa-search"></i> Check Lock
</button>

<button class="reset-btn" id="resetBtn">
<i class="fa fa-rotate-left"></i>
</button>
</div>

<div id="result"></div>

</div>

</div>

<script>

/* CHECK LOGIN */

if(!localStorage.getItem("user")){
window.location="../logincheck/";
}

/* AUTO LOGOUT SYSTEM */

const TIMEOUT_MINUTES = Number(localStorage.getItem("timeout")) || 1;

function resetTimer(){

localStorage.setItem("lastActivity",Date.now());

}

function checkSession(){

const last = localStorage.getItem("lastActivity");

if(!last){
logout();
return;
}

const diff = (Date.now() - last) / 60000;

if(diff > TIMEOUT_MINUTES){
logout();
}

}

function logout(){

localStorage.clear();

alert("Logged out successfully");

window.location="../logincheck/";

}

/* CHECK EVERY 30 SEC */

setInterval(checkSession,30000);

/* TRACK USER ACTIVITY */

document.addEventListener("click",resetTimer);
document.addEventListener("keypress",resetTimer);
document.addEventListener("mousemove",resetTimer);

resetTimer();

const api="https://script.google.com/macros/s/AKfycbymhAGb9ijuqzrxNvxl69mTJM9KALsytHAtJIcwrNcbiHWBy8Zo3IRu_LsvqRRbjIUs/exec";

const loggedUser = localStorage.getItem("user");
const role = localStorage.getItem("role");

if(loggedUser){
document.getElementById("userName").innerText =
loggedUser + " (" + role + ")";
}

const input=document.getElementById("acc_no");
const result=document.getElementById("result");
const checkBtn=document.getElementById("checkBtn");
const resetBtn=document.getElementById("resetBtn");

let isLoading=false;

window.onload=()=>{
input.focus();
};

function formatDate(dateStr){

if(!dateStr) return "-";

/* yyyy-MM-dd */

if(dateStr.includes("-") && dateStr.split("-")[0].length==4){

var p=dateStr.split("-");
var year=p[0];
var month=parseInt(p[1])-1;
var day=p[2];

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year;

}

/* dd/MM/yyyy */

if(dateStr.includes("/")){

var p=dateStr.split("/");

var day=parseInt(p[0]);
var month=parseInt(p[1])-1;
var year=p[2];

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return ("0"+day).slice(-2)+" "+m[month]+" "+year;

}

/* ISO */

if(dateStr.includes("T")){

var d=new Date(dateStr);

var day=("0"+d.getDate()).slice(-2);
var month=d.getMonth();
var year=d.getFullYear();

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year;

}

return dateStr;

}
  
function formatDateTime(dateStr){

if(!dateStr) return "-";

const d=new Date(dateStr);

const day=("0"+d.getDate()).slice(-2);
const month=d.getMonth();
const year=d.getFullYear();

const hour=("0"+d.getHours()).slice(-2);
const min=("0"+d.getMinutes()).slice(-2);

const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year+" "+hour+":"+min;

}

  
async function checkLock(){

const acc=input.value.trim();

if(!acc){
alert("Enter Account No");
input.focus();
return;
}

if(isLoading) return;

isLoading=true;
checkBtn.disabled=true;

result.innerHTML=
"<div class='loading'>Checking Lock Status<div class='spinner'></div></div>";

try{

const res=await fetch(api+"?acc_no="+encodeURIComponent(acc));
const data=await res.json();

if(data.status==="LOCKED"){

const formattedDate=formatDate(data.valid);
const created=formatDateTime(data.created);
const amount="RM "+Number(data.amount).toLocaleString();

const promiseDate=new Date(data.valid);

const today=new Date();
today.setHours(0,0,0,0);

promiseDate.setHours(0,0,0,0);

let statusText="LOCKED";
let statusColor="#28a745";

if(today>promiseDate){
statusText="EXPIRED";
statusColor="#dc3545";
}

result.innerHTML=

"<div class='result-card'>"+

"<div class='status-box'><span style='background:"+statusColor+"'>"+statusText+"</span></div>"+

"<div class='created-meta'>Created by "+data.dca_id+
" • "+created+"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>ACCOUNT NO</div>"+
"<div class='value'>"+data.acc_no+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>BRANCH</div>"+
"<div class='value'>"+data.branch+"</div>"+
"</div>"+

"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>LOCK AMOUNT</div>"+
"<div class='amount'>"+amount+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>PROMISE DATE</div>"+
"<div class='value'>"+formattedDate+"</div>"+
"</div>"+

"</div>"+

"<div class='label'>PAYMENT CATEGORY</div>"+
"<div class='value'>"+(data.category || "-")+"</div><br>"+

"<div class='label'>REMARKS</div>"+
"<div class='remark'>"+(data.remarks || "-")+"</div>"+

"</div>";

}

else{

result.innerHTML=
"<div class='no-lock'>NO LOCK FOUND</div>";

}

}catch(err){

result.innerHTML=
"<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>";

}

checkBtn.disabled=false;
isLoading=false;

}

function newSearch(){

input.value="";
result.innerHTML="";
checkBtn.disabled=false;
input.focus();

}

checkBtn.addEventListener("click",checkLock);
resetBtn.addEventListener("click",newSearch);

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkLock();
}
});

input.addEventListener("input",function(){
this.value=this.value.replace(/[^0-9]/g,'');
});

</script>

</body>
</html>
