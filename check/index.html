<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check Lock Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --dark: #0047ab;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f0f2f5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px; /* Lebar sikit untuk desktop */
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        /* RESPONSIVE HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white;
            padding: 15px 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #userInfo {
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 6px;
            margin-right: 10px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-buttons button {
            padding: 8px 15px;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .logout-btn { background: var(--danger); }
        .master-btn { background: #6c63ff; }
        .logout-btn:hover { background: #b91c1c; }

        /* SEARCH SECTION */
        .content {
            padding: 20px;
            flex: 1;
        }

        .search-area {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-area input {
            flex: 1;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
        }

        .search-area input:focus { border-color: var(--primary); background: #fdfdfd; }

        .btn-search {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* RESULT CARD - DESKTOP OPTIMIZED */
        .result-card {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            background: #fff;
            animation: fadeIn 0.3s ease;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .status-badge {
            padding: 6px 18px;
            color: white;
            font-weight: 800;
            font-size: 14px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }

        .created-info {
            font-size: 12px;
            color: #718096;
            text-align: right;
            line-height: 1.4;
        }

        /* GRID: 2 Column Mobile, 4 Column Desktop */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .label {
            font-size: 11px;
            color: #a0aec0;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .value {
            font-size: 15px;
            font-weight: 700;
            color: #2d3748;
        }

        .amount-highlight {
            font-size: 24px;
            color: var(--danger);
            font-weight: 800;
        }

        .remark-section {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #cbd5e0;
        }

        /* UTILS */
        .no-lock {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            border: 2px dashed #e2e8f0;
            border-radius: 15px;
        }

        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        /* --- DESKTOP ADJUSTMENTS --- */
        @media (min-width: 768px) {
            body { padding: 40px 20px; }
            .container { min-height: auto; border-radius: 20px; overflow: hidden; }
            
            /* Change grid to 4 columns on desktop */
            .info-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .search-area { padding: 20px; }
            
            .header-title { font-size: 22px; }
        }

        /* --- MOBILE ADJUSTMENTS --- */
        @media (max-width: 480px) {
            .header-content { flex-direction: column; gap: 10px; }
            .header-buttons { width: 100%; }
            .header-buttons button { flex: 1; }
            #userInfo { margin-right: 0; margin-bottom: 5px; }
            .search-area { flex-direction: row; }
            .btn-search span { display: none; } /* Show icon only on small mobile */
            .btn-search { padding: 12px 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-content">
            <div class="header-left">
                <p class="header-title"><i class="fa fa-shield-check"></i> LockPortal</p>
            </div>
            <div class="header-right">
                <span id="userInfo"></span>
                <div class="header-buttons" style="display: inline-flex;">
                    <button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">Menu</button>
                    <button class="logout-btn" onclick="logout()"><i class="fa fa-power-off"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="search-area">
            <input type="text" id="acc_no" inputmode="numeric" placeholder="Account Number" maxlength="12">
            <button class="btn-search" onclick="checkLock()">
                <i class="fa fa-search"></i> <span>Check Now</span>
            </button>
        </div>

        <div id="result">
            <div class="no-lock">
                <i class="fa fa-magnifying-glass" style="font-size: 40px; margin-bottom: 15px;"></i>
                <p>Enter an account number to verify status</p>
            </div>
        </div>
    </div>
</div>

<script src="../lockconfig.js"></script>
<script>
    const api = API_URL;
    const user = localStorage.getItem("lock_user");
    const token = localStorage.getItem("session_token");
    const type = localStorage.getItem("lock_type");

    if(!type || !token) logout();
    if(type === "master") document.getElementById("masterBtn").style.display = "inline-block";
    document.getElementById("userInfo").innerHTML = `<i class="fa fa-user-circle"></i> ${user}`;

    const input = document.getElementById("acc_no");
    const resultDiv = document.getElementById("result");

    function goMaster() { window.location.href = "../menu/"; }
    function logout() { localStorage.clear(); window.location.href = "../lockcheck-login/"; }

    async function checkLock() {
        const acc = input.value.trim();
        if(!acc) return;

        resultDiv.innerHTML = `<div style="text-align:center; padding:50px;"><i class="fa fa-spinner fa-spin" style="font-size:30px; color:var(--primary)"></i></div>`;

        try {
            const res = await fetch(`${api}?acc_no=${acc}&token=${token}`);
            const data = await res.json();

            if(data.status === "LOCKED") {
                const isExpired = new Date() > new Date(data.valid);
                const statusColor = isExpired ? 'var(--danger)' : 'var(--success)';
                
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="card-top">
                            <span class="status-badge" style="background:${statusColor}">${isExpired ? 'EXPIRED' : 'ACTIVE LOCK'}</span>
                            <div class="created-info">
                                <strong>Agent ID:</strong> ${data.dca_id}<br>
                                <strong>Date:</strong> ${data.created || '-'}
                            </div>
                        </div>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">Account No</div>
                                <div class="value">${data.acc_no}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Branch</div>
                                <div class="value">${data.branch || '-'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Promise Date</div>
                                <div class="value">${new Date(data.valid).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Lock Amount</div>
                                <div class="value amount-highlight">RM ${Number(data.amount).toLocaleString('en-MY', {minimumFractionDigits:2})}</div>
                            </div>
                        </div>

                        <div class="info-item" style="margin-top:15px">
                            <div class="label">Category</div>
                            <div class="value">${data.category || '-'}</div>
                        </div>

                        <div class="remark-section">
                            <div class="label">Remarks / Note</div>
                            <div style="font-size:14px; color:#4a5568; line-height:1.6">${data.remarks || 'No additional remarks.'}</div>
                        </div>
                        
                        <button onclick="resetSearch()" style="margin-top:20px; background:none; border:1px solid #cbd5e0; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; color:#718096">Clear Search</button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="no-lock" style="color:var(--danger); border-color:#feb2b2; background:#fff5f5;"><strong>RECORD NOT FOUND</strong><br>Account is not currently locked.</div>`;
            }
        } catch (e) {
            resultDiv.innerHTML = `<div class="no-lock">ERROR CONNECTING TO SERVER</div>`;
        }
    }

    function resetSearch() {
        input.value = "";
        input.focus();
        resultDiv.innerHTML = `<div class="no-lock"><i class="fa fa-magnifying-glass" style="font-size: 40px; margin-bottom: 15px;"></i><p>Enter an account number to verify status</p></div>`;
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") checkLock(); });
    input.addEventListener("input", function() { this.value = this.value.replace(/[^0-9]/g,''); });
</script>
</body>
</html>
