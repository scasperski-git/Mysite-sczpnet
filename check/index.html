<!DOCTYPE html>
<html>

<head>

<title>Branch Lock Check</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:500px;
width:100%;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.12);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.check-btn{
background:#007bff;
color:white;
}

.check-btn:hover{
background:#0056b3;
}

.reset-btn{
background:#6c757d;
color:white;
}

.reset-btn:hover{
background:#545b62;
}

.result-card{
margin-top:20px;
padding:20px;
border-radius:8px;
background:#f8f9fa;
border-left:6px solid #28a745;
line-height:1.4;
animation:fadeIn .3s ease;
}

.status-box{
text-align:center;
margin-bottom:15px;
}

.status-box span{
display:inline-block;
padding:6px 16px;
background:#28a745;
color:white;
font-weight:bold;
font-size:18px;
border-radius:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
letter-spacing:1px;
}

.created-meta{
font-size:12px;
color:#777;
margin-top:4px;
margin-bottom:12px;
text-align:center;
}

.row{
display:flex;
justify-content:space-between;
gap:15px;
margin-bottom:15px;
}

.col{
flex:1;
}

.label{
font-weight:bold;
color:#555;
margin-bottom:3px;
}

.value{
font-size:18px;
font-weight:bold;
}

.amount{
font-size:22px;
font-weight:bold;
}

.remark{
margin-top:5px;
line-height:1.5;
}

.no-lock{
margin-top:20px;
padding:15px;
background:#ffe5e5;
border-left:6px solid red;
border-radius:6px;
font-weight:bold;
animation:fadeIn .3s ease;
}

.loading{
margin-top:20px;
text-align:center;
font-weight:bold;
}

.spinner{
margin:auto;
margin-top:10px;
width:30px;
height:30px;
border:4px solid #ccc;
border-top:4px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

@media (max-width:500px){
.row{
flex-direction:column;
}
}

</style>

</head>

<body>

<div class="container">

<h2>Branch Lock Check</h2>

<input
type="text"
id="acc_no"
inputmode="numeric"
maxlength="10"
placeholder="ENTER ACCOUNT NO">

<button class="check-btn" id="checkBtn">
Check Lock
</button>

<button class="reset-btn" id="resetBtn">
New Search
</button>

<div id="result"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwOyuL4w8IpqbGT1PzBizBLnHhUa6V1Wpe6r8TtLEHktOB1hyl1VSYe2GlY8ZQmkMaI/exec";

const input=document.getElementById("acc_no");
const result=document.getElementById("result");
const checkBtn=document.getElementById("checkBtn");
const resetBtn=document.getElementById("resetBtn");

let isLoading=false;

/* AUTO FOCUS */

window.onload=()=>{
input.focus();
};

/* FORMAT DATE */

function formatDate(dateStr){

const d=new Date(dateStr);

const day=("0"+d.getDate()).slice(-2);

const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const month=monthNames[d.getMonth()];

const year=d.getFullYear();

return day+" "+month+" "+year;

}

/* FORMAT DATETIME */

function formatDateTime(dateStr){

const d=new Date(dateStr);

const day=("0"+d.getDate()).slice(-2);

const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const month=monthNames[d.getMonth()];

const year=d.getFullYear();

const hours=("0"+d.getHours()).slice(-2);

const mins=("0"+d.getMinutes()).slice(-2);

return day+" "+month+" "+year+" "+hours+":"+mins;

}

/* SEARCH */

async function checkLock(){

const acc=input.value.trim();

if(!acc){
alert("Enter Account No");
input.focus();
return;
}

if(isLoading) return;

isLoading=true;

checkBtn.disabled=true;

result.innerHTML=
"<div class='loading'>Processing...<div class='spinner'></div></div>";

try{

const res=await fetch(api+"?acc_no="+encodeURIComponent(acc));

const data=await res.json();

if(data.status==="LOCKED"){

const formattedDate=formatDate(data.valid);

const amount="RM "+Number(data.amount).toLocaleString();

const created=formatDateTime(data.created);

result.innerHTML=

"<div class='result-card'>"+

"<div class='status-box'><span>LOCKED</span></div>"+

"<div class='created-meta'>Created by "+data.dca_id+
" • "+created+"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>ACCOUNT NO:</div>"+
"<div class='value'>"+data.acc_no+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>LOCK AT BRANCH:</div>"+
"<div class='value'>"+data.branch+"</div>"+
"</div>"+

"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>LOCK AMOUNT:</div>"+
"<div class='amount'>"+amount+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>PROMISE DATE:</div>"+
"<div class='value'>"+formattedDate+"</div>"+
"</div>"+

"</div>"+

"<div class='label'>PAYMENT CATEGORY:</div>"+
"<div class='value'>"+(data.category || "-")+"</div><br>"+

"<div class='label'>REMARKS:</div>"+
"<div class='remark'>"+(data.remarks || "-")+"</div>"+

"</div>";

}

else{

result.innerHTML=
"<div class='no-lock'>NO LOCK FOUND</div>";

}

}catch(err){

result.innerHTML=
"<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>";

}

checkBtn.disabled=false;
isLoading=false;

}

/* NEW SEARCH */

function newSearch(){

input.value="";
result.innerHTML="";
checkBtn.disabled=false;
input.focus();

}

/* EVENTS */

checkBtn.addEventListener("click",checkLock);

resetBtn.addEventListener("click",newSearch);

input.addEventListener("keypress",function(e){

if(e.key==="Enter"){
checkLock();
}

});

/* NUMERIC ONLY */

input.addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'');

});

</script>

</body>
</html>
