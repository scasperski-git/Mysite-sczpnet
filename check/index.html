<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check Lock Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0047ab;
            --success: #28a745;
            --danger: #dc3545;
            --bg-body: #f4f7f9;
            --text-main: #2d3748;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        /* CONTAINER */
        .container {
            max-width: 550px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 25px 20px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #userInfo {
            font-size: 13px;
            margin-top: 8px;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .header-buttons button {
            flex: 1;
            max-width: 140px;
            padding: 10px;
            font-size: 13px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
            transition: 0.2s;
        }

        .logout-btn { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.3) !important; }
        .master-btn { background: #6c63ff; }
        .header-buttons button:active { transform: scale(0.95); }

        /* SEARCH SECTION */
        .content {
            padding: 20px;
            margin-top: -15px;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            text-align: center;
            font-weight: 600;
            color: var(--primary-dark);
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button.main-btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .check-btn { background: var(--primary); color: white; }
        .reset-btn { background: #edf2f7; color: #4a5568; }
        .check-btn:disabled { opacity: 0.7; }

        /* RESULT CARD */
        .result-card {
            margin-top: 20px;
            padding: 25px;
            border-radius: 18px;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease-out;
        }

        .status-badge {
            text-align: center;
            margin-bottom: 20px;
        }

        .status-badge span {
            padding: 8px 24px;
            color: white;
            font-weight: 800;
            font-size: 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .data-item .label {
            font-size: 11px;
            color: #718096;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .data-item .value {
            font-size: 16px;
            font-weight: 700;
            color: #1a202c;
        }

        .data-item.full { grid-column: span 2; }

        .amount-highlight {
            font-size: 28px;
            font-weight: 800;
            color: var(--danger);
            display: block;
            margin-top: 2px;
        }

        .meta-footer {
            border-top: 1px dashed #e2e8f0;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 12px;
            color: #a0aec0;
            text-align: center;
        }

        /* STATES */
        .no-lock {
            margin-top: 20px;
            padding: 30px;
            background: #fff;
            border-radius: 18px;
            text-align: center;
            color: #718096;
            border: 2px dashed #e2e8f0;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* SESSION POPUP */
        #sessionPopup {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
            z-index: 10000;
        }

        .session-box {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 85%; max-width: 320px;
        }

        @media (max-width: 400px) {
            .data-grid { grid-template-columns: 1fr; gap: 15px; }
            .data-item.full { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fa fa-shield-halved"></i> Lock Checker</h1>
        <div id="userInfo">Loading user...</div>

        <div class="header-buttons">
            <button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">
                <i class="fa fa-chevron-left"></i> Menu
            </button>
            <button class="logout-btn" onclick="logout()">
                <i class="fa fa-power-off"></i> Logout
            </button>
        </div>
    </div>

    <div class="content">
        <div class="search-box">
            <input type="text" id="acc_no" inputmode="numeric" maxlength="12" placeholder="Account Number">
            <div class="btn-group">
                <button class="main-btn check-btn" id="checkBtn">
                    <i class="fa fa-search"></i> Check
                </button>
                <button class="main-btn reset-btn" id="resetBtn">
                    <i class="fa fa-redo"></i>
                </button>
            </div>
        </div>

        <div id="result"></div>
    </div>
</div>

<script src="../lockconfig.js"></script>
<script>
    const api = API_URL;
    const user = localStorage.getItem("lock_user");
    const role = localStorage.getItem("lock_role");
    const token = localStorage.getItem("session_token");
    const type = localStorage.getItem("lock_type");

    if(!type) window.location="../lockcheck-login/";
    if(type=="lock") { alert("Access denied"); window.location="../lock/"; }
    if(type === "master") document.getElementById("masterBtn").style.display = "flex";

    document.getElementById("userInfo").innerHTML = `<i class="fa fa-user-circle"></i> ${user || "User"} • ${role || "Staff"}`;

    const input = document.getElementById("acc_no");
    const result = document.getElementById("result");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");

    let isLoading = false;

    // Help formatting for display
    function formatDate(dateStr){
        if(!dateStr) return "-";
        const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        try {
            let d = new Date(dateStr.replace(/-/g, "/"));
            if(isNaN(d)) return dateStr;
            return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
        } catch(e) { return dateStr; }
    }

    async function checkLock(){
        const acc = input.value.trim();
        if(!acc) { input.focus(); return; }
        if(isLoading) return;

        isLoading = true;
        checkBtn.disabled = true;
        result.innerHTML = `<div class="no-lock"><div class="spinner"></div>Searching database...</div>`;

        try {
            const res = await fetch(`${api}?acc_no=${encodeURIComponent(acc)}&token=${token}`);
            const data = await res.json();

            if(data.status === "UNAUTHORIZED"){
                showSessionPopup("DEVICE");
                return;
            }

            if(data.status === "LOCKED"){
                const promiseDate = new Date(data.valid);
                const today = new Date();
                today.setHours(0,0,0,0);
                promiseDate.setHours(0,0,0,0);

                const isExpired = today > promiseDate;
                const statusText = isExpired ? "EXPIRED" : "LOCKED";
                const statusColor = isExpired ? "var(--danger)" : "var(--success)";

                const amountFormatted = "RM " + Number(data.amount || 0).toLocaleString("en-MY",{
                    minimumFractionDigits:2, maximumFractionDigits:2
                });

                result.innerHTML = `
                    <div class="result-card">
                        <div class="status-badge">
                            <span style="background:${statusColor}">${statusText}</span>
                        </div>

                        <div class="data-grid">
                            <div class="data-item">
                                <div class="label">Account Number</div>
                                <div class="value">${data.acc_no}</div>
                            </div>
                            <div class="data-item">
                                <div class="label">Branch</div>
                                <div class="value">${data.branch}</div>
                            </div>
                            <div class="data-item full">
                                <div class="label">Lock Amount</div>
                                <div class="amount-highlight">${amountFormatted}</div>
                            </div>
                            <div class="data-item">
                                <div class="label">Promise Date</div>
                                <div class="value">${formatDate(data.valid)}</div>
                            </div>
                            <div class="data-item">
                                <div class="label">Category</div>
                                <div class="value">${data.category || "-"}</div>
                            </div>
                            <div class="data-item full">
                                <div class="label">Remarks</div>
                                <div class="value" style="font-weight:400; font-size:14px;">${data.remarks || "No remarks provided"}</div>
                            </div>
                        </div>

                        <div class="meta-footer">
                            <i class="fa fa-pen-to-square"></i> Locked by ${data.dca_id} on ${data.created}
                        </div>
                    </div>
                `;
            } else {
                result.innerHTML = `<div class="no-lock"><i class="fa fa-folder-open" style="font-size:30px; display:block; margin-bottom:10px; opacity:0.3"></i>No lock records found for this account.</div>`;
            }
        } catch(err) {
            result.innerHTML = `<div class="no-lock" style="color:var(--danger)">System error. Please try again.</div>`;
        }
        isLoading = false;
        checkBtn.disabled = false;
    }

    // Event Listeners
    checkBtn.addEventListener("click", checkLock);
    resetBtn.addEventListener("click", () => {
        input.value = "";
        result.innerHTML = "";
        input.focus();
    });
    input.addEventListener("keypress", (e) => { if(e.key === "Enter") checkLock(); });
    input.addEventListener("input", function() { this.value = this.value.replace(/[^0-9]/g,''); });

    function goMaster() { window.location="../menu/"; }
    function logout() { localStorage.clear(); window.location="../lockcheck-login/"; }
    
    function showSessionPopup(type) {
        document.getElementById("sessionPopup").style.display = "flex";
        setTimeout(() => logout(), 3000);
    }
</script>

<div id="sessionPopup">
    <div class="session-box">
        <i class="fa fa-triangle-exclamation" style="font-size:40px; color:var(--danger)"></i>
        <h3 style="margin:15px 0 5px">Session Ended</h3>
        <p style="font-size:14px; color:#718096">Redirecting to login page...</p>
    </div>
</div>

</body>
</html>
