<!DOCTYPE html>
<html>

<head>

<title>Check Lock Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:20px;
}

/* CONTAINER */

.container{
max-width:520px;
width:100%;
margin:auto;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
overflow:hidden;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#007bff,#0047ab);
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
letter-spacing:0.5px;
}

#userInfo{
font-size:14px;
font-weight:600;
margin-top:4px;
opacity:0.95;
}

.header-buttons{
display:flex;
gap:10px;
margin-top:12px;
justify-content:center;
}

.header-buttons button{
width:140px;
margin-top:0 !important;
padding:8px 0;
font-size:13px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

.logout-btn{
background:#dc3545;
}

.master-btn{
background:#6c63ff;
}

.header-buttons button:hover{
opacity:0.9;
transform:translateY(-1px);
}

.content{
padding:25px;
}

/* INPUT */

input{
width:100%;
padding:14px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
transition:0.2s;
}

input:focus{
border-color:#007bff;
box-shadow:0 0 0 3px rgba(0,123,255,0.15);
}

/* BUTTON */

button{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.check-btn{
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
}

.check-btn:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.reset-btn{
background:#e9ecef;
color:#333;
}

.reset-btn:hover{
background:#dfe3e6;
}

/* RESULT CARD */

.result-card{
margin-top:22px;
padding:22px;
border-radius:10px;
background:white;
border:1px solid #e6e6e6;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
animation:fadeIn .3s ease;
}

/* STATUS */

.status-box{
text-align:center;
margin-bottom:12px;
}

.status-box span{
display:inline-block;
padding:7px 22px;
background:#dc3545;
color:white;
font-weight:700;
font-size:18px;
border-radius:30px;
letter-spacing:1px;
}

/* META */

.created-meta{
font-size:12px;
color:#777;
text-align:center;
margin-bottom:15px;
}

/* GRID */

.row{
display:flex;
justify-content:space-between;
gap:15px;
margin-bottom:15px;
}

.col{
flex:1;
}

.label{
font-weight:bold;
color:#666;
font-size:13px;
margin-bottom:3px;
}

.value{
font-size:18px;
font-weight:700;
}

.amount{
font-size:26px;
font-weight:800;
color:#dc3545;
letter-spacing:1px;
}

/* REMARK */

.remark{
margin-top:6px;
line-height:1.5;
}

/* NO LOCK */

.no-lock{
margin-top:20px;
padding:18px;
background:#fff5f5;
border:1px solid #ffc9c9;
border-radius:8px;
text-align:center;
font-weight:600;
color:#c92a2a;
animation:fadeIn .3s ease;
}

/* SESSION POPUP */

#sessionPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.session-box{
background:white;
padding:32px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
max-width:320px;
width:90%;
}

.session-box i{
font-size:40px;
color:#dc3545;
margin-bottom:10px;
}

.session-title{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.session-msg{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.session-count{
font-size:12px;
color:#888;
}
/* LOADING */

.loading{
margin-top:25px;
text-align:center;
font-weight:600;
color:#444;
}

.spinner{
margin:auto;
margin-top:12px;
width:35px;
height:35px;
border:4px solid #e5e5e5;
border-top:4px solid #007bff;
border-radius:50%;
animation:spin .9s linear infinite;
}

/* ANIMATION */

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(6px);}
to{opacity:1;transform:translateY(0);}
}

/* MOBILE */

@media (max-width:500px){

.row{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">
<i class="fa fa-search"></i> Check Lock Portal
<div id="userInfo"></div>

<div class="header-buttons">

<button class="logout-btn" onclick="logout()">
<i class="fa fa-right-from-bracket"></i> Logout
</button>

<button id="masterBtn" class="master-btn" onclick="goMaster()" style="display:none">
<i class="fa fa-arrow-left"></i> Master Menu
</button>

</div>
</div>

<div class="content">

<input
type="text"
id="acc_no"
autocomplete="off"
inputmode="numeric"
maxlength="10"
placeholder="Enter Account Number">

<button class="check-btn" id="checkBtn">
<i class="fa fa-search"></i> Check Lock
</button>

<button class="reset-btn" id="resetBtn">
<i class="fa fa-rotate-left"></i> New Search
</button>

<div id="result"></div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const api = API_URL;

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");
const token = localStorage.getItem("session_token");

const type = localStorage.getItem("lock_type");

if(!type){
window.location="../lockcheck-login/";
}

if(type=="lock"){
alert("Access denied");
window.location="../lock/";
}

if(type === "master"){
document.getElementById("masterBtn").style.display = "inline-block";
}

async function checkSession(){

try{

const res = await fetch(api+"?action=session&token="+token);
const data = await res.json();

if(data.status !== "ACTIVE"){

showSessionPopup("DEVICE");
return;

localStorage.clear();
window.location="../lockcheck-login/";

}

}catch(e){
console.log("session check error");
}

}

function goMaster(){
window.location="../menu/";
}

if(!token){
logout();
}

document.getElementById("userInfo").innerHTML =
"User: "+(user || "-")+" | Role: "+(role || "-");

const input=document.getElementById("acc_no");
const result=document.getElementById("result");
const checkBtn=document.getElementById("checkBtn");
const resetBtn=document.getElementById("resetBtn");

let isLoading=false;

window.onload=()=>{
input.focus();
};

function formatDate(dateStr){

if(!dateStr) return "-";

if(dateStr.includes("-") && dateStr.split("-")[0].length==4){

var p=dateStr.split("-");
var year=p[0];
var month=parseInt(p[1])-1;
var day=p[2];

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year;

}

if(dateStr.includes("/")){

var p=dateStr.split("/");

var day=parseInt(p[0]);
var month=parseInt(p[1])-1;
var year=p[2];

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return ("0"+day).slice(-2)+" "+m[month]+" "+year;

}

if(dateStr.includes("T")){

var d=new Date(dateStr);

var day=("0"+d.getDate()).slice(-2);
var month=d.getMonth();
var year=d.getFullYear();

var m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[month]+" "+year;

}

return dateStr;

}

function formatDateTime(dateStr){

if(!dateStr) return "-";

/* format expected: dd/MM/yyyy HH:mm:ss */

const parts = dateStr.split(" ");

const datePart = parts[0].split("/");
const timePart = parts[1].split(":");

const day = datePart[0];
const monthIndex = parseInt(datePart[1]) - 1;
const year = datePart[2];

const hour = timePart[0];
const minute = timePart[1];

const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return day+" "+m[monthIndex]+" "+year+" "+hour+":"+minute;

}

async function checkLock(){

const acc=input.value.trim();

if(!acc){
alert("Enter Account No");
input.focus();
return;
}

if(isLoading) return;

isLoading=true;
checkBtn.disabled=true;

result.innerHTML=
"<div class='loading'>Checking Lock Status<div class='spinner'></div></div>";

try{

const res = await fetch(api+"?acc_no="+encodeURIComponent(acc)+"&token="+token);

const data=await res.json();

if(data.status=="UNAUTHORIZED"){

if(data.reason=="SESSION_REPLACED"){
alert("Your account has been logged in from another device.");
}
else{
showSessionPopup("EXPIRED");
return;
}

localStorage.clear();
window.location="../lockcheck-login/";
return;

}

if(data.status==="LOCKED"){

const formattedDate=formatDate(data.valid);
const created=formatDateTime(data.created);
const amount = "RM " + Number(data.amount || 0).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

const promiseDate=new Date(data.valid);

const today=new Date();
today.setHours(0,0,0,0);

promiseDate.setHours(0,0,0,0);

let statusText="LOCKED";
let statusColor="#28a745";

if(today>promiseDate){
statusText="EXPIRED";
statusColor="#dc3545";
}

result.innerHTML=

"<div class='result-card'>"+

"<div class='status-box'><span style='background:"+statusColor+"'>"+statusText+"</span></div>"+

"<div class='created-meta'>Created by "+data.dca_id+
" • "+created+"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>ACCOUNT NO</div>"+
"<div class='value'>"+data.acc_no+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>BRANCH</div>"+
"<div class='value'>"+data.branch+"</div>"+
"</div>"+

"</div>"+

"<div class='row'>"+

"<div class='col'>"+
"<div class='label'>LOCK AMOUNT</div>"+
"<div class='amount'>"+amount+"</div>"+
"</div>"+

"<div class='col'>"+
"<div class='label'>PROMISE DATE</div>"+
"<div class='value'>"+formattedDate+"</div>"+
"</div>"+

"</div>"+

"<div class='label'>PAYMENT CATEGORY</div>"+
"<div class='value'>"+(data.category || "-")+"</div><br>"+

"<div class='label'>REMARKS</div>"+
"<div class='remark'>"+(data.remarks || "-")+"</div>"+

"</div>";

}
else{

result.innerHTML=
"<div class='no-lock'>NO LOCK FOUND</div>";

}

}catch(err){

result.innerHTML=
"<div class='no-lock'>SYSTEM ERROR. TRY AGAIN.</div>";

}

checkBtn.disabled=false;
isLoading=false;

}

function newSearch(){

input.value="";
result.innerHTML="";
checkBtn.disabled=false;
input.focus();

}

function showSessionPopup(type){

let title="Session Expired";
let msg="Your session has expired. Please login again.";

if(type==="DEVICE"){
title="Logged In From Another Device";
msg="Your account has been logged in from another device.";
}

document.getElementById("sessionTitle").innerText=title;
document.getElementById("sessionMsg").innerText=msg;

document.getElementById("sessionPopup").style.display="flex";

setTimeout(()=>{
localStorage.clear();
window.location="../lockcheck-login/";
},3000);

}

function logout(){
localStorage.clear();
window.location="../lockcheck-login/";
}

checkBtn.addEventListener("click",checkLock);
resetBtn.addEventListener("click",newSearch);

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
checkLock();
}
});

input.addEventListener("input",function(){
this.value=this.value.replace(/[^0-9]/g,'');
});
  
let lastActivity = Date.now();
const IDLE_LIMIT = 60000; // 1 min

function updateActivity(){
lastActivity = Date.now();
}

function checkIdle(){
if(Date.now() - lastActivity > IDLE_LIMIT){
showSessionPopup("EXPIRED");
}
}

setInterval(checkIdle, 5000);

[
"touchstart",
"touchmove",
"click",
"scroll",
"keydown",
"mousemove"
].forEach(event=>{
document.addEventListener(event, updateActivity, {passive:true});
});

document.addEventListener("visibilitychange",()=>{

if(!document.hidden){
if(Date.now() - lastActivity > IDLE_LIMIT){
showSessionPopup("EXPIRED");
}
}

});
/* SESSION MONITOR */

setInterval(checkSession,15000);
  
</script>

<div id="sessionPopup">
<div class="session-box">

<i class="fa fa-lock"></i>

<div class="session-title" id="sessionTitle">
Session Expired
</div>

<div class="session-msg" id="sessionMsg">
Please login again.
</div>

<div class="session-count">
Redirecting to login...
</div>

</div>
</div>

</body>
</html>
