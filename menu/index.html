<!DOCTYPE html>
<html>

<head>

<title>Master Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding:10px;
}

/* MAIN CARD */

.box{
background:white;
padding:16px 28px 28px 28px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:100%;
max-width:520px;
}

/* SECTION CARD */

.section{
background:white;
border-radius:12px;
padding:6px 16px 16px 16px;
margin-bottom:8px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
border:1px solid #eef1f6;
}

.section:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.2s;
}

/* SECTION COLORS */

.dashboard.section{
background:linear-gradient(135deg,#f3f6ff,#e8efff);
border:1px solid #d9e3ff;
}

.summary.section{
background:linear-gradient(135deg,#f3fff6,#e8fff0);
border:1px solid #cfeedd;
}

/* TITLE */

h2{
margin-top:0;
margin-bottom:6px;
}

/* FIX ICON ALIGN */

h3{
display:flex;
align-items:center;
gap:6px;
font-size:15px;
font-weight:700;
margin-bottom:4px;
}

h3 i{
font-size:14px;
}

/* USER INFO */

#userInfo{
font-size:11px;
color:#777;
margin-bottom:10px;
}

/* BUTTONS */

button{
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

.top-buttons{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.top-buttons button{
padding:8px 14px;
font-size:13px;
border-radius:8px;
}

/* BUTTON COLORS */

.check{
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
}

.lock{
background:linear-gradient(135deg,#28a745,#1f7a33);
color:white;
}

.logout{
background:linear-gradient(135deg,#dc3545,#b02a37);
color:white;
}

/* DASHBOARD GRID */

.dash-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:10px;
margin-bottom:12px;
}

.dash-grid label{
font-size:12px;
color:#555;
}

.dash-grid select,
.dash-grid input{
width:100%;
padding:6px;
font-size:13px;
border-radius:6px;
border:1px solid #ccc;
}

/* LOAD BUTTON */

.load-btn{
width:100%;
padding:14px;
margin-top:10px;
font-size:15px;
background:linear-gradient(135deg,#6c63ff,#5148d8);
color:white;
}

/* DASH CARD */

.dash-card{
margin-top:15px;
background:linear-gradient(135deg,#eef4ff,#dbe8ff);
padding:14px;
border-radius:10px;
border:1px solid #cfdcff;
}

.dash-stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* STAT BOX */

.stat-box{
background:#ffffff !important;
border-radius:8px;
padding:10px;
border:1px solid #dfe5f1;
}

.stat-label{
font-size:11px;
color:#666;
margin-bottom:4px;
}

.stat-number{
font-weight:bold;
font-size:clamp(16px,4vw,22px);
white-space:nowrap;
}

.stat-number.lock{
color:#003c9e !important;
background:none !important;
}

.stat-number.amount{
color:#0a7d35;
}

.dash-status{
font-size:11px;
color:#777;
margin-top:8px;
text-align:center;
}

/* SESSION POPUP */

#sessionPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.session-box{
background:white;
padding:32px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
max-width:320px;
width:90%;
}

.session-box i{
font-size:40px;
color:#dc3545;
margin-bottom:10px;
}

.session-title{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.session-msg{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.session-count{
font-size:12px;
color:#888;
}

/* SUMMARY */

.summary-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.box-card{
background:white;
border:1px solid #e4e7ec;
padding:10px;
border-radius:8px;
font-size:12px;
}

.box-card div:first-child{
color:#777;
font-size:11px;
margin-bottom:2px;
}

/* SPINNER */

.spinner{
width:16px;
height:16px;
border:3px solid rgba(255,255,255,0.4);
border-top:3px solid white;
border-radius:50%;
animation:spin 0.7s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* MOBILE */

@media (max-width:600px){

body{
padding:15px;
}

.box{
padding:25px;
}

button{
padding:18px;
font-size:17px;
}

h2{
font-size:22px;
}

#userInfo{
font-size:14px;
}

}

/* DESKTOP LARGE */

@media (min-width:1200px){

.box{
max-width:600px;
padding:32px;
}

}

</style>

</head>

<body>

<div class="box">

<h2><i class="fa fa-table"></i> Master Menu</h2>

<div id="userInfo"></div>

<div class="top-buttons">

<button class="check" onclick="goCheck()">
<i class="fa fa-search"></i> Check
</button>

<button class="lock" onclick="goLock()">
<i class="fa fa-lock"></i> Lock
</button>

<button class="logout" onclick="logout()">
<i class="fa fa-right-from-bracket"></i> Logout
</button>

</div>

<div class="section dashboard">

<h3><i class="fa fa-chart-line"></i> Lock Dashboard</h3>

<div class="dash-grid">

<div>
<label>DCA NAME</label>
<select id="dcaFilter"></select>
</div>

<div>
<label>Start Date</label>
<input type="date" id="startDate">
</div>

<div>
<label>End Date</label>
<input type="date" id="endDate">
</div>

</div>

<button class="load-btn" id="loadBtn" onclick="loadDashboard()">
<i class="fa fa-chart-line"></i>
Load Dashboard
</button>

<div class="dash-card">

<div class="dash-stats">

<div class="stat-box">
<div class="stat-label">Total Lock</div>
<div id="dashTotal" class="stat-number lock">0</div>
</div>

<div class="stat-box">
<div class="stat-label">Total Amount</div>
<div id="dashAmount" class="stat-number amount">RM0</div>
</div>

</div>

<div id="dashStatus" class="dash-status"></div>

</div>

</div>

<div class="section summary">

<h3><i class="fa fa-calendar"></i> Today Summary</h3>

<div id="refreshInfo" style="font-size:11px;color:#888;margin-bottom:8px;">
⟳ Auto refresh every 2 min | <span id="lastUpdate">Last update: -</span>
</div>

<div class="summary-grid">

<div class="box-card">
<div>Total Lock</div>
<div id="sumLock">0</div>
</div>

<div class="box-card">
<div>Total Amount</div>
<div id="sumAmount">RM0</div>
</div>

</div>

<div class="summary-grid">

<div class="box-card">
<div>Top User</div>
<div id="topUser"></div>
</div>

<div class="box-card">
<div>Top Branch</div>
<div id="topBranch"></div>
</div>

</div>

</div>

</div>

<script src="../lockconfig.js"></script>

<script>

const token = localStorage.getItem("session_token");

if(!token){
window.location="../lockcheck-login/";
}

const api = API_URL;

// AUTO REFRESH CONTROL
let lastUserAction = Date.now();
const USER_ACTIVE_COOLDOWN = 15000; // 15s
const SUMMARY_REFRESH = 120000; // 2 min
  
function getTodayLocal(){

var now = new Date();

var year = now.getFullYear();
var month = ("0" + (now.getMonth()+1)).slice(-2);
var day = ("0" + now.getDate()).slice(-2);

return year + "-" + month + "-" + day;

}
  
function loadUsers(){

fetch(api+"?action=users&token="+token)
.then(r=>r.json())
.then(list=>{

var select=document.getElementById("dcaFilter");

select.innerHTML="";

list.forEach(function(u){

var opt=document.createElement("option");

if(typeof u === "string"){
opt.value = "ALL";
opt.text = "ALL USER";
}else{
opt.value = u.id;
opt.text = u.name;
}

select.appendChild(opt);

});

});

}

function loadSummary(){

fetch(api+"?action=summary&token="+token)
.then(r=>r.json())
.then(data=>{

document.getElementById("sumLock").innerText=data.totalLock;

document.getElementById("sumAmount").innerText=
"RM "+Number(data.totalAmount).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
})

var userHTML="";

data.topUser.forEach(function(u){

userHTML += u.user+" ("+u.count+")<br>";

});

document.getElementById("topUser").innerHTML=userHTML;

var branchHTML="";

data.topBranch.forEach(function(b){

branchHTML += b.branch+" ("+b.count+")<br>";

});

document.getElementById("topBranch").innerHTML=branchHTML;

/* update last refresh time */

var now=new Date();

var time=now.toLocaleTimeString("en-MY",{
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

document.getElementById("lastUpdate").innerText="Last update: "+time;

});
}

async function checkSession(){

try{

const res = await fetch(api+"?action=session&token="+token);
const data = await res.json();

if(data.status !== "ACTIVE"){

showSessionPopup("DEVICE");
return;

localStorage.clear();
window.location="../lockcheck-login/";

}

}catch(e){
console.log("Session check error");
}

}
  
function loadDashboard(){

var btn=document.getElementById("loadBtn");
var status=document.getElementById("dashStatus");

btn.disabled=true;
btn.innerHTML='<div class="spinner"></div> Please wait...';

status.innerText="Loading dashboard...";

var dca=document.getElementById("dcaFilter").value;
var start=document.getElementById("startDate").value;
var end=document.getElementById("endDate").value;

var url=api+"?action=dashboard&token="+token;

if(dca) url+="&dca="+dca;
if(start) url+="&start="+start;
if(end) url+="&end="+end;

/* timeout protection */

var controller = new AbortController();
var timeout = setTimeout(()=>controller.abort(),8000);

fetch(url,{signal:controller.signal})
.then(r=>r.json())
.then(data=>{

if(data.status){
status.innerText="Access denied";
return;
}

document.getElementById("dashTotal").innerText=data.total || 0;

document.getElementById("dashAmount").innerText =
"RM "+Number(data.amount || 0).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});;

status.innerText="";

})
.catch(err=>{

if(err.name==="AbortError"){

status.innerText="Server slow. Please try again.";

}else{

status.innerText="Error loading dashboard.";

}

document.getElementById("dashTotal").innerText="-";
document.getElementById("dashAmount").innerText="RM -";

})
.finally(()=>{

clearTimeout(timeout);

btn.disabled=false;
btn.innerHTML='<i class="fa fa-chart-line"></i> Load Dashboard';

});

}
  
window.onload=function(){

var today=getTodayLocal();

document.getElementById("startDate").value=today;
document.getElementById("endDate").value=today;

document.getElementById("startDate").max=today;
document.getElementById("endDate").max=today;

loadUsers();
loadDashboard();
loadSummary();

setInterval(()=>{

  if(document.hidden) return;

  const now = Date.now();
  const isUserActive = (now - lastUserAction) < USER_ACTIVE_COOLDOWN;

  if(isUserActive) return;

  loadSummary();

}, SUMMARY_REFRESH);

};

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");

document.getElementById("userInfo").innerHTML =
"<i class='fa fa-user'></i> <b>"+(user || "-")+"</b> &nbsp;|&nbsp; "+(role || "-");

function goCheck(){
window.location="../check/";
}

function goLock(){
window.location="../lock/";
}

function logout(){
localStorage.clear();
window.location="../lockcheck-login/";
}

function showSessionPopup(type){

let title="Session Expired";
let msg="Your session has expired. Please login again.";

if(type==="DEVICE"){
title="Logged In From Another Device";
msg="Your account has been logged in from another device.";
}

document.getElementById("sessionTitle").innerText=title;
document.getElementById("sessionMsg").innerText=msg;

document.getElementById("sessionPopup").style.display="flex";

setTimeout(()=>{
localStorage.clear();
window.location="../lockcheck-login/";
},3000);

}

/* =========================
MOBILE SAFE IDLE LOGOUT
========================= */

let lastActivity = Date.now();
const IDLE_LIMIT = 60000; // 1 min

function updateActivity(){
lastActivity = Date.now();
}

function checkIdle(){

if(Date.now() - lastActivity > IDLE_LIMIT){
showSessionPopup("EXPIRED");
}

}
// TRACK USER INTERACTION
["scroll","click","keydown","touchstart"].forEach(event=>{
document.addEventListener(event, ()=>{
  lastUserAction = Date.now();
}, {passive:true});
});

setInterval(()=>{

  if(document.hidden) return;

  const now = Date.now();
  const isUserActive = (now - lastUserAction) < USER_ACTIVE_COOLDOWN;

  if(isUserActive) return;

  var today=getTodayLocal();

  var start=document.getElementById("startDate").value;
  var end=document.getElementById("endDate").value;

  // ✅ only refresh kalau user guna today filter
  if(start===today && end===today){
    loadDashboard();
  }

},120000); // ikut 2 min juga

setInterval(checkIdle, 5000);

[
"touchstart",
"touchmove",
"click",
"scroll",
"keydown",
"mousemove"
].forEach(event=>{
document.addEventListener(event, updateActivity, {passive:true});
});

document.addEventListener("visibilitychange",()=>{

if(!document.hidden){

if(Date.now() - lastActivity > IDLE_LIMIT){
showSessionPopup("EXPIRED");
}

}

});
/* SESSION MONITOR */

setInterval(checkSession,15000);

</script>

<div id="sessionPopup">
<div class="session-box">

<i class="fa fa-lock"></i>

<div class="session-title" id="sessionTitle">
Session Expired
</div>

<div class="session-msg" id="sessionMsg">
Please login again.
</div>

<div class="session-count">
Redirecting to login...
</div>

</div>
</div>
  
</body>
</html>
