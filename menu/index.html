<!DOCTYPE html>
<html>

<head>

<title>Master Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding:30px 20px;
}

/* MAIN CARD */

.box{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:100%;
max-width:420px;
}

/* TITLE */

h2{
margin-top:0;
margin-bottom:12px;
}

/* USER INFO */

#userInfo{
font-size:13px;
color:#666;
margin-bottom:24px;
}

/* BUTTON */

button{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* COLORS */

.check{
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
}

.lock{
background:linear-gradient(135deg,#28a745,#1f7a33);
color:white;
}

.logout{
background:linear-gradient(135deg,#dc3545,#b02a37);
color:white;
}

/* MOBILE */

@media (max-width:600px){

body{
padding:15px;
align-items:flex-start;
}

.box{
max-width:100%;
padding:25px;
margin-top:40px;
}

button{
padding:18px;
font-size:17px;
}

h2{
font-size:22px;
}

#userInfo{
font-size:14px;
}

}

/* LARGE DESKTOP */

@media (min-width:1200px){

.box{
max-width:460px;
padding:50px;
}

button{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="box">

<h2>•Master Menu•</h2>

<div id="userInfo"></div>

<div class="dashboard">

<h3>Lock Dashboard</h3>

<label>DCA ID</label>
<input id="dcaFilter" placeholder="Optional">

<label>Start Date</label>
<input type="date" id="startDate">

<label>End Date</label>
<input type="date" id="endDate">

<button onclick="loadDashboard()">Load Dashboard</button>

<div id="dashResult" style="margin-top:15px;font-size:20px;font-weight:bold"></div>

</div>

<button class="check" onclick="goCheck()">
<i class="fa fa-search"></i> Check Lock
</button>

<button class="lock" onclick="goLock()">
<i class="fa fa-lock"></i> Create Lock
</button>

<button class="logout" onclick="logout()">
<i class="fa fa-right-from-bracket"></i> Logout
</button>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwPq44mgtXFY7I8l6iRXIvLqRjaIhSu1tjDQt9F_P3YCAaHWaPeTrDA8FWZ1aIxVIzE/exec";

function loadDashboard(){

var dca=document.getElementById("dcaFilter").value;
var start=document.getElementById("startDate").value;
var end=document.getElementById("endDate").value;

var url=api+"?action=dashboard";

if(dca) url+="&dca="+encodeURIComponent(dca);
if(start) url+="&start="+start;
if(end) url+="&end="+end;

fetch(url)
.then(res=>res.json())
.then(data=>{

document.getElementById("dashResult").innerHTML=
"Total Lock : "+data.total;

});

}

window.onload = function(){

var today = new Date().toISOString().split("T")[0];

document.getElementById("startDate").value = today;
document.getElementById("endDate").value = today;

loadDashboard();

};

const token = localStorage.getItem("session_token");

if(!token){
window.location="../lockcheck-login/";
}

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");

document.getElementById("userInfo").innerHTML =
"<i class='fa fa-user'></i> <b>"+(user || "-")+"</b> &nbsp;|&nbsp; "+(role || "-");

function goCheck(){
window.location="../check/";
}

function goLock(){
window.location="../lock/";
}

function logout(){
localStorage.clear();
window.location="../lockcheck-login/";
}

/* =========================
MOBILE SAFE IDLE LOGOUT
========================= */

let lastActivity = Date.now();
const IDLE_LIMIT = 60000; // 1 min

function updateActivity(){
lastActivity = Date.now();
}

function checkIdle(){

if(Date.now() - lastActivity > IDLE_LIMIT){
logout();
}

}

setInterval(checkIdle, 5000);

[
"touchstart",
"touchmove",
"click",
"scroll",
"keydown"
].forEach(event=>{
document.addEventListener(event, updateActivity, {passive:true});
});

document.addEventListener("visibilitychange",()=>{

if(!document.hidden){

if(Date.now() - lastActivity > IDLE_LIMIT){
logout();
}

}

});

</script>
  
</body>
</html>
