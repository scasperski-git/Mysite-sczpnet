<!DOCTYPE html>
<html>

<head>

<title>DCA System Menu</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:300px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.check{
background:#007bff;
color:white;
}

.lock{
background:#28a745;
color:white;
}

.logout{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>DCA System</h2>

<div id="userInfo"></div>

<button class="check" onclick="goCheck()">Check Lock</button>

<button class="lock" onclick="goLock()">Create Lock</button>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const token = localStorage.getItem("session_token");

if(!token){
window.location="../logincheck/";
}

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");

document.getElementById("userInfo").innerHTML =
"User: "+user+" | Role: "+role;

function goCheck(){
window.location="../check/";
}

function goLock(){
window.location="../lock/";
}

function logout(){
localStorage.clear();
window.location="../logincheck/";
}

</script>
  
</body>
</html>
