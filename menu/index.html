<!DOCTYPE html>
<html>

<head>

<title>DCA System Menu</title>

<style>

body{
*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

/* MAIN CARD */

.box{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:100%;
max-width:420px;
}

/* TITLE */

h2{
margin-top:0;
margin-bottom:15px;
}

/* USER INFO */

#userInfo{
font-size:14px;
color:#666;
margin-bottom:20px;
}

/* BUTTON */

button{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* COLORS */

.check{
background:#007bff;
color:white;
}

.lock{
background:#28a745;
color:white;
}

.logout{
background:#dc3545;
color:white;
}

/* MOBILE */

@media (max-width:600px){

body{
padding:15px;
align-items:flex-start;
}

.box{
max-width:100%;
padding:25px;
margin-top:40px;
}

button{
padding:18px;
font-size:18px;
}

}

/* LARGE DESKTOP */

@media (min-width:1200px){

.box{
max-width:460px;
padding:50px;
}

button{
font-size:18px;
}

}
</style>

</head>

<body>

<div class="box">

<h2>DCA System</h2>

<div id="userInfo"></div>

<button class="check" onclick="goCheck()">Check Lock</button>

<button class="lock" onclick="goLock()">Create Lock</button>

<button class="logout" onclick="logout()">Logout</button>

</div>

<script>

const token = localStorage.getItem("session_token");

if(!token){
window.location="../logincheck/";
}

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");

document.getElementById("userInfo").innerHTML =
"User: "+(user || "-")+" | Role: "+(role || "-");

function goCheck(){
window.location="../check/";
}

function goLock(){
window.location="../lock/";
}

function logout(){
localStorage.clear();
window.location="../logincheck/";
}

/* =======================
IDLE SESSION TIMER
======================= */

let idleTimer;
const IDLE_LIMIT = 600000; // 10 minutes idle

function resetIdleTimer(){

clearTimeout(idleTimer);

idleTimer = setTimeout(()=>{
alert("Session expired due to inactivity.");
logout();
}, IDLE_LIMIT);

}

/* detect activity */

["click","mousemove","keypress","scroll","touchstart","mousedown"]
.forEach(event=>{
document.addEventListener(event, resetIdleTimer);
});

/* start timer */

resetIdleTimer();

</script>
  
</body>
</html>
