<!DOCTYPE html>
<html>

<head>

<title>Master Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
margin:0;
padding:30px 20px;
}

/* MAIN CARD */

.box{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:100%;
max-width:420px;
}

.spinner{
width:16px;
height:16px;
border:3px solid rgba(255,255,255,0.4);
border-top:3px solid white;
border-radius:50%;
animation:spin 0.7s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* TITLE */

h2{
margin-top:0;
margin-bottom:12px;
}

/* USER INFO */

#userInfo{
font-size:13px;
color:#666;
margin-bottom:24px;
}

.load-btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,#6c63ff,#5148d8);
color:white;
transition:0.2s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.load-btn:hover{
transform:translateY(-1px);
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.load-btn:disabled{
opacity:0.7;
cursor:not-allowed;
}

/* BUTTON */

button{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
font-weight:bold;
transition:.2s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* COLORS */

.check{
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
}

.lock{
background:linear-gradient(135deg,#28a745,#1f7a33);
color:white;
}

.logout{
background:linear-gradient(135deg,#dc3545,#b02a37);
color:white;
}

.summary{
margin-bottom:25px;
text-align:left;
}

.summary-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.box-card{
background:#ffffff;
border:1px solid #e4e7ec;
padding:10px;
border-radius:8px;
font-size:12px;
}

.box-card div:first-child{
color:#777;
font-size:11px;
margin-bottom:2px;
}

#topUser,
#topBranch{
font-size:12px;
line-height:1.4;
}

.dashboard{
margin-bottom:25px;
text-align:left;
}

.dash-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:10px;
margin-bottom:12px;
}

.dash-grid label{
font-size:12px;
color:#555;
}

.dash-grid select,
.dash-grid input{
width:100%;
padding:6px;
font-size:13px;
border-radius:6px;
border:1px solid #ccc;
}

.dash-card{
margin-top:15px;
background:linear-gradient(135deg,#eef4ff,#dbe8ff);
padding:14px;
border-radius:10px;
text-align:center;
font-size:13px;
border:1px solid #cfdcff;
}

.dash-card div{
margin-top:4px;
}

.dash-stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:5px;
}

.stat-box{
background:white;
border-radius:8px;
padding:10px;
border:1px solid #dfe5f1;
}

.stat-label{
font-size:11px;
color:#666;
margin-bottom:4px;
}

.stat-number{
font-weight:bold;
font-size:20px;
}

.stat-number.lock{
color:#003c9e;
}

.stat-number.amount{
color:#0a7d35;
}

.dash-status{
font-size:11px;
color:#777;
margin-top:8px;
text-align:center;
}

#dashTotal{
font-weight:bold;
font-size:20px;
color:#003c9e;
}

#dashAmount{
font-weight:bold;
font-size:18px;
color:#0a7d35;
}

.action-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.action-buttons button{
width:100%;
padding:14px;
font-size:14px;
}

h3{
font-size:16px;
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:4px;
}

@media (min-width:900px){

.box{
max-width:520px;
}

.summary-grid{
grid-template-columns:1fr 1fr;
}

}
  
/* MOBILE */

@media (max-width:600px){

body{
padding:15px;
align-items:flex-start;
}

.box{
max-width:100%;
padding:25px;
margin-top:40px;
}

button{
padding:18px;
font-size:17px;
}

h2{
font-size:22px;
}

#userInfo{
font-size:14px;
}

}

/* LARGE DESKTOP */

@media (min-width:1200px){

.box{
max-width:460px;
padding:50px;
}

button{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="box">

<h2>•Master Menu•</h2>

<div id="userInfo"></div>

<div class="dashboard">

<h3>Lock Dashboard</h3>

<div class="dash-grid">

<div>
<label>User ID</label>
<select id="dcaFilter"></select>
</div>

<div>
<label>Start Date</label>
<input type="date" id="startDate">
</div>

<div>
<label>End Date</label>
<input type="date" id="endDate">
</div>

</div>

<button class="load-btn" id="loadBtn" onclick="loadDashboard()">
<i class="fa fa-chart-line"></i>
Load Dashboard
</button>

<div class="dash-card">

<div class="dash-stats">

<div class="stat-box">
<div class="stat-label">Total Lock</div>
<div id="dashTotal" class="stat-number lock">0</div>
</div>

<div class="stat-box">
<div class="stat-label">Total Amount</div>
<div id="dashAmount" class="stat-number amount">RM0</div>
</div>

</div>

<div id="dashStatus" class="dash-status"></div>

</div>

</div>

<div class="summary">

<h3>Today Summary</h3>

<div id="refreshInfo" style="
font-size:11px;
color:#888;
margin-bottom:8px;
">
⟳ auto refresh every 30s
</div>

<div id="lastUpdate" style="
font-size:11px;
color:#999;
margin-bottom:10px;
">
Last update: -
</div>

<div class="summary-grid">

<div class="box-card">
<div>Total Lock</div>
<div id="sumLock">0</div>
</div>

<div class="box-card">
<div>Total Amount</div>
<div id="sumAmount">RM0</div>
</div>

</div>

<div class="summary-grid">

<div class="box-card">
<div>Top User</div>
<div id="topUser"></div>
</div>

<div class="box-card">
<div>Top Branch</div>
<div id="topBranch"></div>
</div>

</div>

</div>

<div class="action-buttons">

<button class="check" onclick="goCheck()">
<i class="fa fa-search"></i> Check Lock
</button>

<button class="lock" onclick="goLock()">
<i class="fa fa-lock"></i> Create Lock
</button>

</div>

<button class="logout" onclick="logout()">
<i class="fa fa-right-from-bracket"></i> Logout
</button>

</div>

<script>

const token = localStorage.getItem("session_token");

if(!token){
window.location="../lockcheck-login/";
}

const api="https://script.google.com/macros/s/AKfycbzimr6MBBV-Yl2yumyTrRufwx3E3vE7B4bKPp8S3mjNnJ39ZG8SYy7tX8hft9hTPMSi/exec";

function getTodayLocal(){

var now = new Date();

var year = now.getFullYear();
var month = ("0" + (now.getMonth()+1)).slice(-2);
var day = ("0" + now.getDate()).slice(-2);

return year + "-" + month + "-" + day;

}
  
function loadUsers(){

fetch(api+"?action=users&token="+token)
.then(r=>r.json())
.then(list=>{

var select=document.getElementById("dcaFilter");

select.innerHTML="";

list.forEach(function(u){

var opt=document.createElement("option");
opt.value=u;
opt.text=u;

select.appendChild(opt);

});

});

}

function loadSummary(){

fetch(api+"?action=summary&token="+token)
.then(r=>r.json())
.then(data=>{

document.getElementById("sumLock").innerText=data.totalLock;

document.getElementById("sumAmount").innerText=
"RM "+Number(data.totalAmount).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
})

var userHTML="";

data.topUser.forEach(function(u){

userHTML += u.user+" ("+u.count+")<br>";

});

document.getElementById("topUser").innerHTML=userHTML;

var branchHTML="";

data.topBranch.forEach(function(b){

branchHTML += b.branch+" ("+b.count+")<br>";

});

document.getElementById("topBranch").innerHTML=branchHTML;

/* update last refresh time */

var now=new Date();

var time=now.toLocaleTimeString("en-MY",{
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
});

document.getElementById("lastUpdate").innerText="Last update: "+time;

});
}
  
function loadDashboard(){

var btn=document.getElementById("loadBtn");
var status=document.getElementById("dashStatus");

btn.disabled=true;
btn.innerHTML='<div class="spinner"></div> Please wait...';

status.innerText="Loading dashboard...";

var dca=document.getElementById("dcaFilter").value;
var start=document.getElementById("startDate").value;
var end=document.getElementById("endDate").value;

var url=api+"?action=dashboard&token="+token;

if(dca) url+="&dca="+dca;
if(start) url+="&start="+start;
if(end) url+="&end="+end;

/* timeout protection */

var controller = new AbortController();
var timeout = setTimeout(()=>controller.abort(),8000);

fetch(url,{signal:controller.signal})
.then(r=>r.json())
.then(data=>{

document.getElementById("dashTotal").innerText=data.total;

document.getElementById("dashAmount").innerText =
"RM "+Number(data.amount).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

status.innerText="";

})
.catch(err=>{

if(err.name==="AbortError"){

status.innerText="Server slow. Please try again.";

}else{

status.innerText="Error loading dashboard.";

}

document.getElementById("dashTotal").innerText="-";
document.getElementById("dashAmount").innerText="RM -";

})
.finally(()=>{

clearTimeout(timeout);

btn.disabled=false;
btn.innerHTML='<i class="fa fa-chart-line"></i> Load Dashboard';

});

}
  
window.onload=function(){

var today=getTodayLocal();

document.getElementById("startDate").value=today;
document.getElementById("endDate").value=today;

document.getElementById("startDate").max=today;
document.getElementById("endDate").max=today;

loadUsers();
loadDashboard();
loadSummary();

setInterval(loadSummary,30000);

};

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");

document.getElementById("userInfo").innerHTML =
"<i class='fa fa-user'></i> <b>"+(user || "-")+"</b> &nbsp;|&nbsp; "+(role || "-");

function goCheck(){
window.location="../check/";
}

function goLock(){
window.location="../lock/";
}

function logout(){
localStorage.clear();
window.location="../lockcheck-login/";
}

/* =========================
MOBILE SAFE IDLE LOGOUT
========================= */

let lastActivity = Date.now();
const IDLE_LIMIT = 60000; // 1 min

function updateActivity(){
lastActivity = Date.now();
}

function checkIdle(){

if(Date.now() - lastActivity > IDLE_LIMIT){
logout();
}

}

setInterval(function(){

var today=getTodayLocal();

var start=document.getElementById("startDate");
var end=document.getElementById("endDate");

if(start.value!=today){

start.value=today;
end.value=today;

start.max=today;
end.max=today;

loadDashboard();
loadSummary();

}

},60000);

setInterval(checkIdle, 5000);

[
"touchstart",
"touchmove",
"click",
"scroll",
"keydown"
].forEach(event=>{
document.addEventListener(event, updateActivity, {passive:true});
});

document.addEventListener("visibilitychange",()=>{

if(!document.hidden){

if(Date.now() - lastActivity > IDLE_LIMIT){
logout();
}

}

});

</script>
  
</body>
</html>
