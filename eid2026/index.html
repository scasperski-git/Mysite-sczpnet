<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

.card {
    width: 380px;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fadeIn 2s ease;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    margin-bottom: 10px;
    color: #ffd700;
}

h2 {
    font-weight: 300;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

p {
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.9;
}

.signature {
    margin-top: 25px;
    font-style: italic;
    font-size: 15px;
    color: #ffd700;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* subtle glow animation */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, gold, transparent, gold);
    opacity: 0.2;
    filter: blur(10px);
    z-index: -1;
    animation: glow 4s infinite linear;
}

@keyframes glow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
    <h1>🌙 Selamat Hari Raya</h1>
    <h2>Aidilfitri</h2>

    <p>
        Maaf zahir dan batin.<br>
        Semoga Syawal ini membawa seribu keberkatan,<br>
        kebahagiaan, dan kedamaian buat kita semua.
    </p>

    <p>
        Di kesempatan ini,<br>
        disusun sepuluh jari memohon ampun dan maaf<br>
        atas segala khilaf dan salah.
    </p>

    <div class="signature">
        Ikhlas daripada,<br>
        <b>Syahrizah</b>
    </div>
</div>

</body>
</html>
