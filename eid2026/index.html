<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Hari Raya</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #064e3b, #16a34a);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* center content */
.container {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
}

/* envelope */
.envelope {
    width: 200px;
    height: 120px;
    background: gold;
    margin: auto;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: 0.5s;
}

.envelope:before {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 60px solid #facc15;
    top: -60px;
    left: 0;
}

/* open animation */
.open {
    transform: scale(1.1) rotateX(180deg);
}

/* hidden card */
.card {
    display: none;
    margin-top: 30px;
    padding: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

h1 {
    font-size: 30px;
}

</style>
</head>

<body>

<div class="container">

    <h2>✨ Ada sesuatu untuk anda... ✨</h2>
    <p>Klik sampul di bawah 👇</p>

    <div class="envelope" onclick="openEnvelope()" id="env"></div>

    <div class="card" id="card">
        <h1>🌙 Selamat Hari Raya 🌙</h1>
        <p id="name"></p>
        <p>
            Maaf Zahir & Batin 🤍<br><br>
            Semoga Syawal ini membawa kebahagiaan,<br>
            ketenangan dan rezeki yang melimpah 🌿<br><br>
            Terima kasih kerana sentiasa ada 💚
        </p>
        <p><strong>— Ikhlas daripada, SCZP</strong></p>
    </div>

</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>

<script>

function openEnvelope() {
    document.getElementById("env").classList.add("open");

    setTimeout(() => {
        document.getElementById("card").style.display = "block";
        startConfetti();
        document.getElementById("music").play();
    }, 600);

    // personalize name
    const params = new URLSearchParams(window.location.search);
    const person = params.get("name");

    if (person) {
        document.getElementById("name").innerHTML = "Untuk " + person + " 💚";
    }
}

/* confetti generator */
function startConfetti() {
    for (let i = 0; i < 40; i++) {
        let conf = document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.animationDuration = (2 + Math.random() * 3) + "s";
        document.body.appendChild(conf);
    }
}

</script>

</body>
</html>
