<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kad Raya Canggih</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    overflow: hidden;
    color: white;
}

.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    border-radius: 20px;
    padding: 25px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-10px); }
    100% { transform: translate(-50%, -50%) translateY(0); }
}

.title {
    font-size: 24px;
    font-weight: bold;
    color: gold;
}

.subtitle {
    margin-bottom: 15px;
    font-size: 14px;
    color: #ffd700;
}

.message {
    font-size: 14px;
    line-height: 1.6;
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: gold;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10vh); opacity: 1; }
    to { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
    <div class="title">🌙 Selamat Hari Raya 🌙</div>
    <div class="subtitle">Aidilfitri 2026</div>

    <div class="message">
        Maaf zahir & batin 🙏<br><br>

        Kalau ada salah silap,<br>
        itu bukan sengaja… cuma kadang-kadang blur 😅<br><br>

        Kalau makan banyak sangat,<br>
        jangan risau… baju je yang stress 🤭<br><br>

        Semoga raya kali ni penuh bahagia,<br>
        dan duit raya tak “ciput” tahun ni 💰😆<br><br>

        🎉 Selamat Hari Raya! 🎉
    </div>
</div>

<script>
for(let i=0;i<40;i++){
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100+"vw";
    s.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(s);
}
</script>

</body>
</html>
