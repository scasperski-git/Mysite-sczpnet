<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
    background-size:600% 600%;
    animation:bgMove 18s ease infinite;
    overflow:auto;
}

@keyframes bgMove{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* PARTICLES */
.particles span{
    position:absolute;
    width:5px;height:5px;
    background:gold;
    border-radius:50%;
    animation:floatUp 10s linear infinite;
}
@keyframes floatUp{
    from{transform:translateY(100vh)}
    to{transform:translateY(-10vh)}
}

/* WRAP */
.envelope-wrap{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* ENVELOPE */
.envelope{
    width:80%;
    max-width:260px;
    height:160px;
    position:relative;
    cursor:pointer;
    perspective:1000px;
}

/* BODY */
.body{
    width:100%;
    height:100%;
    border-radius:12px;
    background:linear-gradient(145deg,#d4af37,#b8962e);
    box-shadow:0 20px 50px rgba(0,0,0,0.8);
}

/* FLAP */
.flap{
    position:absolute;
    width:100%;
    height:50%;
    background:linear-gradient(145deg,#caa52f,#a88623);
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:1s;
}

/* OPEN */
.open .flap{ transform:rotateX(180deg); }

/* TAP */
.tap{
    margin-top:15px;
    font-size:14px;
    color:#fff;
    opacity:0.7;
}

/* CARD */
.container{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    padding:15px;
    animation:fade 0.8s ease;
}

@keyframes fade{
    from{opacity:0;transform:scale(0.9)}
    to{opacity:1;transform:scale(1)}
}

.card{
    width:100%;
    max-width:360px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:white;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* TEXT */
h1{
    font-family:'Playfair Display';
    font-size:24px;
    color:gold;
}
h2{
    font-family:'Amiri';
    margin-bottom:10px;
}
p{
    font-family:'Amiri';
    font-size:14px;
    line-height:1.6;
}

/* BUTTON */
.btn{
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    font-weight:bold;
    width:100%;
    font-size:14px;
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:6px;
    height:6px;
    background:red;
    top:-10px;
    animation:fall 3s linear infinite;
}
@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg)}
}
</style>
</head>

<body>

<div class="particles"></div>

<div class="envelope-wrap" onclick="openCard()">
    <div class="envelope" id="env">
        <div class="flap"></div>
        <div class="body"></div>
    </div>
    <div class="tap">Tap untuk buka 🎁</div>
</div>

<div class="container" id="card">
    <div class="card">

        <h1>Selamat Hari Raya</h1>
        <h2 id="nama"></h2>

        <p>
        Mohon maaf zahir dan batin.<br>
        Semoga Syawal ini membawa kebahagiaan ❤️
        </p>

        <button class="btn" onclick="shareWA()">📤 Share WhatsApp</button>

    </div>
</div>

<audio id="lagu">
<source src="laguraya.mp3" type="audio/mpeg">
</audio>

<script>

/* AUTO NAME (URL PARAM) */
let params = new URLSearchParams(window.location.search);
let nama = params.get("to") || "Sahabatku";
document.getElementById("nama").innerText = nama;

/* PARTICLES */
let p=document.querySelector(".particles");
for(let i=0;i<20;i++){
 let s=document.createElement("span");
 s.style.left=Math.random()*100+"%";
 s.style.animationDelay=Math.random()*10+"s";
 p.appendChild(s);
}

/* CONFETTI */
function confetti(){
 for(let i=0;i<30;i++){
  let c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"%";
  c.style.background=`hsl(${Math.random()*360},100%,50%)`;
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),3000);
 }
}

/* OPEN */
function openCard(){
 document.getElementById("env").classList.add("open");

 setTimeout(()=>{
  document.querySelector(".envelope-wrap").style.display="none";
  document.getElementById("card").style.display="flex";

  confetti();

  let audio=document.getElementById("lagu");
  audio.play().catch(()=>{});

 },900);
}

/* SHARE WA */
function shareWA(){
 let text = "Selamat Hari Raya 🌙✨\nKlik kad ini:\n" + window.location.href;
 window.open("https://wa.me/?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
