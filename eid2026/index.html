<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 400px;
    padding: 50px;
    border-radius: 25px;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
}

/* SVG glow */
.icon {
    margin-bottom: 20px;
    filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    color: gold;
    margin-bottom: 5px;
}

h2 {
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 25px;
}

p {
    font-size: 15px;
    line-height: 1.8;
    opacity: 0.9;
}

.signature {
    margin-top: 30px;
    color: gold;
    font-size: 16px;
    font-style: italic;
}

/* footer */
.footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 12px;
}

.footer a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    letter-spacing: 1px;
}

.footer a:hover {
    color: gold;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <!-- ULTRA REAL SVG MASJID + CRESCENT -->
        <div class="icon">
        <svg width="120" height="120" viewBox="0 0 200 200" fill="none">
            <!-- Dome -->
            <circle cx="100" cy="80" r="30" fill="gold"/>
            
            <!-- Minarets -->
            <rect x="40" y="70" width="15" height="60" fill="gold"/>
            <rect x="145" y="70" width="15" height="60" fill="gold"/>

            <!-- Base -->
            <rect x="60" y="100" width="80" height="40" fill="gold"/>

            <!-- Crescent -->
            <path d="M130 40 
                     A20 20 0 1 1 120 70 
                     A15 15 0 1 0 130 40" 
                  fill="gold"/>
        </svg>
        </div>

        <h1>Selamat Hari Raya</h1>
        <h2>Aidilfitri</h2>

        <p>
            Maaf zahir dan batin.<br>
            Semoga Syawal ini membawa keberkatan,<br>
            ketenangan jiwa dan kebahagiaan<br>
            buat kita semua.
        </p>

        <p>
            Dengan penuh keikhlasan,<br>
            kami menyusun sepuluh jari<br>
            memohon ampun dan maaf<br>
            atas segala kekhilafan.
        </p>

        <div class="signature">
            Ikhlas daripada,<br>
            <b>Syahrizah</b>
        </div>

    </div>
</div>

<div class="footer">
    © <span id="year"></span> 
    <a href="https://sczpnet.org" target="_blank">sczpnet.org</a>
</div>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

</body>
</html>
