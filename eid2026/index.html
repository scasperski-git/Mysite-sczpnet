<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
    background-size: 600% 600%;
    animation: bgMove 15s ease infinite;
}

/* animated background */
@keyframes bgMove {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

/* envelope screen */
.envelope-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.envelope {
    width: 220px;
    height: 150px;
    background: linear-gradient(145deg, #d4af37, #b8962e);
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: float 3s infinite;
}

.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 75px;
    background: linear-gradient(145deg, #caa52f, #a88623);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.tap-text {
    position: absolute;
    bottom: -30px;
    width: 100%;
    text-align: center;
    color: #fff;
    font-size: 13px;
    opacity: 0.7;
}

/* card hidden first */
.container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.card {
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(0,0,0,0.8);
    animation: fadeUp 1.5s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* icon */
.icon {
    font-size: 55px;
}

.symbols {
    color: gold;
    font-size: 22px;
}

/* text */
h1 {
    font-family: 'Playfair Display', serif;
    color: gold;
}

h2 {
    font-weight: 300;
    letter-spacing: 4px;
}

.signature {
    margin-top: 20px;
    color: gold;
}

/* footer */
.footer {
    display: none;
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
}

.footer a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope-screen" onclick="openCard()">
    <div class="envelope"></div>
    <div class="tap-text">Tap untuk buka kad</div>
</div>

<!-- CARD -->
<div class="container" id="card">
    <div class="card">
        <div class="icon">🕌</div>
        <div class="symbols">🌙 ✨</div>

        <h1>Selamat Hari Raya</h1>
        <h2>Aidilfitri</h2>

        <p>
            Maaf zahir dan batin.<br>
            Semoga Syawal ini membawa keberkatan,<br>
            ketenangan dan kebahagiaan buat semua.
        </p>

        <div class="signature">
            Ikhlas daripada,<br>
            <b>Syahrizah</b>
        </div>
    </div>
</div>

<div class="footer" id="footer">
    © <span id="year"></span> 
    <a href="https://sczpnet.org" target="_blank">sczpnet.org</a>
</div>

<!-- AUDIO (guna lagu raya placeholder, boleh tukar link nanti) -->
<audio id="lagu" loop autoplay>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<script>
// year
document.getElementById("year").innerText = new Date().getFullYear();

// open animation
function openCard(){
    document.querySelector(".envelope-screen").style.display="none";
    document.getElementById("card").style.display="flex";
    document.getElementById("footer").style.display="block";

    let audio = document.getElementById("lagu");
    audio.play().catch(()=>{});
}
</script>

</body>
</html>
