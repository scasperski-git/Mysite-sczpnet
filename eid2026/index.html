<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    overflow: hidden;
}

/* ENVELOPE 3D */
.envelope-wrap {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.envelope {
    width: 240px;
    height: 160px;
    background: gold;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
}

.flap {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #d4af37;
    top: 0;
    transform-origin: top;
    transition: transform 1s;
    clip-path: polygon(0 0,100% 0,50% 100%);
}

.open .flap {
    transform: rotateX(180deg);
}

/* CARD */
.card-container {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.card {
    max-width: 420px;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    color: white;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    animation: fade 1.5s ease;
}

@keyframes fade {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* shimmer text */
h1 {
    font-family: 'Playfair Display';
    font-size: 32px;
    background: linear-gradient(90deg, gold, white, gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% { background-position: -200px; }
    100% { background-position: 200px; }
}

.signature {
    margin-top: 20px;
    color: gold;
}

/* fireworks canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* footer */
.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="envelope-wrap" onclick="openCard()">
    <div class="envelope" id="env">
        <div class="flap"></div>
    </div>
</div>

<div class="card-container" id="card">
    <div class="card">
        <div style="font-size:50px;">🕌 🌙</div>

        <h1>Selamat Hari Raya</h1>
        <h2>Aidilfitri</h2>

        <p>
            Maaf zahir dan batin.<br>
            Semoga Syawal ini membawa seribu keberkatan,<br>
            kebahagiaan dan ketenangan buat dirimu.
        </p>

        <p>
            Ampun dan maaf dipohon atas segala khilaf,<br>
            semoga silaturahim kita terus terjalin erat.
        </p>

        <div class="signature">
            Ikhlas daripada,<br>
            <b>Syahrizah</b>
        </div>
    </div>
</div>

<div class="footer">
© <span id="year"></span> sczpnet.org
</div>

<audio id="lagu" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<script>
// year
document.getElementById("year").innerText = new Date().getFullYear();

// open animation
function openCard(){
    document.getElementById("env").classList.add("open");
    setTimeout(()=>{
        document.querySelector(".envelope-wrap").style.display="none";
        document.getElementById("card").style.display="flex";
        startFireworks();

        let a=document.getElementById("lagu");
        a.volume=0;
        a.play().catch(()=>{});
        let v=0;
        let f=setInterval(()=>{
            if(v<0.5){v+=0.02;a.volume=v;}
            else clearInterval(f);
        },200);

    },800);
}

/* FIREWORKS */
const c=document.getElementById("fireworks");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

function startFireworks(){
    setInterval(()=>{
        let x=Math.random()*c.width;
        let y=Math.random()*c.height/2;

        for(let i=0;i<30;i++){
            let angle=Math.random()*2*Math.PI;
            let speed=Math.random()*3;
            let dx=Math.cos(angle)*speed;
            let dy=Math.sin(angle)*speed;

            let life=30;

            let fw=setInterval(()=>{
                ctx.fillStyle="gold";
                ctx.fillRect(x,y,2,2);
                x+=dx;
                y+=dy;
                life--;
                if(life<=0) clearInterval(fw);
            },30);
        }
    },800);
}
</script>

</body>
</html>
