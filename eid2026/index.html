<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Hari Raya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* container center */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* card */
.card {
    width: 100%;
    max-width: 420px;
    padding: 40px 30px;
    border-radius: 25px;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 60px rgba(0,0,0,0.7);
}

/* icon area */
.icon {
    font-size: 55px;
    margin-bottom: 10px;
}

.symbols {
    font-size: 22px;
    margin-bottom: 15px;
    color: gold;
}

/* text */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: gold;
    margin-bottom: 5px;
}

h2 {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

p {
    font-size: 14px;
    line-height: 1.7;
    margin: 10px 0;
    opacity: 0.9;
}

.signature {
    margin-top: 25px;
    font-size: 15px;
    color: gold;
    font-style: italic;
}

/* footer trademark FIXED */
.footer {
    text-align: center;
    padding: 15px 10px 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
}

.footer a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
}

.footer a:hover {
    color: gold;
}

/* desktop enhancement */
@media (min-width: 768px) {
    .card {
        padding: 50px;
    }

    h1 {
        font-size: 34px;
    }

    p {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="icon">🕌</div>
        <div class="symbols">🌙 ✨</div>

        <h1>Selamat Hari Raya</h1>
        <h2>Aidilfitri</h2>

        <p>
            Maaf zahir dan batin.<br>
            Semoga Syawal ini membawa keberkatan,<br>
            ketenangan dan kebahagiaan buat semua.
        </p>

        <p>
            Dengan penuh keikhlasan,<br>
            kami memohon ampun dan maaf<br>
            atas segala kesilapan dan kekhilafan.
        </p>

        <div class="signature">
            Ikhlas daripada,<br>
            <b>Syahrizah</b>
        </div>

    </div>
</div>

<div class="footer">
    © <span id="year"></span> 
    <a href="https://sczpnet.org" target="_blank">sczpnet.org</a>
</div>

<script>
document.getElementById("year").innerText = new Date().getFullYear();
</script>

</body>
</html>
