<!DOCTYPE html>
<html>

<head>

<title>Lock Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:#eef2f7;
}

/* ================= NAVBAR ================= */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:linear-gradient(135deg,#007bff,#0047ab);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
z-index:999;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.nav-left{
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.nav-right{
display:flex;
align-items:center;
gap:10px;
font-size:12px;
}

.nav-user{
text-align:right;
}

/* ================= TAB NAV ================= */

.tab-bar{
margin-top:60px;
display:flex;
background:white;
border-bottom:1px solid #ddd;
}

.tab-btn{
flex:1;
padding:12px;
text-align:center;
cursor:pointer;
font-weight:600;
font-size:14px;
transition:.2s;
border-bottom:3px solid transparent;
}

.tab-btn.active{
color:#007bff;
border-bottom:3px solid #007bff;
background:#f5f9ff;
}

/* ================= CONTAINER ================= */

.container{
max-width:520px;
margin:15px auto;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
overflow:hidden;
}

/* ================= FORM ================= */

.form-body{
padding:20px;
}

label{
font-size:13px;
font-weight:bold;
color:#555;
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

input:focus,select:focus,textarea:focus{
border-color:#007bff;
outline:none;
box-shadow:0 0 0 3px rgba(0,123,255,0.1);
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* ================= TABLE ================= */

.table-scroll{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

th{
background:#f8fafc;
}

/* ================= BADGE ================= */

.status-badge{
display:inline-block;
padding:6px 16px;
border-radius:20px;
background:#28a745;
color:white;
font-weight:bold;
}

/* ================= PAGINATION ================= */

.pagination-bar{
display:flex;
justify-content:space-between;
padding:10px;
}

.page-btn{
padding:8px 12px;
border-radius:6px;
background:#007bff;
color:white;
border:none;
}

/* ================= OVERLAY ================= */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

/* ================= MOBILE ================= */

@media(max-width:600px){

.container{
margin:10px;
}

}

/* ================= HIDE SECTION ================= */

.hidden{
display:none;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    
<div class="nav-left">
<i class="fa fa-lock"></i> Lock Portal
</div>

<div class="nav-right">
<div class="nav-user">
<div id="userInfo"></div>
<div id="userSummary">Loading...</div>
</div>

<button onclick="logout()" style="background:#dc3545;padding:6px 10px;border-radius:6px">
<i class="fa fa-right-from-bracket"></i>
</button>

</div>

</div>

<!-- TAB -->
<div class="tab-bar">

<div class="tab-btn active" onclick="switchTab('form')">
<i class="fa fa-lock"></i> Lock
</div>

<div class="tab-btn" onclick="switchTab('list')">
<i class="fa fa-list"></i> My Locks
</div>

</div>

<div class="container">

<div class="form-body">

<!-- FORM -->
<div id="formSection">

<form id="lockForm">

<label>Account No</label>
<input type="text" id="acc_no">

<label>Branch</label>
<select id="branch"></select>

<label>Lock Amount</label>
<input type="text" id="amount">

<label>Payment Category</label>
<select id="payment_category">
<option value="">SELECT</option>
<option>PARTIAL PAYMENT</option>
<option>FULL PAYMENT</option>
</select>

<label>Promise Date</label>
<input type="date" id="promise_date">

<label>DCA ID</label>
<input type="text" id="dca_id" readonly>

<label>Remarks</label>
<textarea id="remarks"></textarea>

<button type="submit">
<i class="fa fa-lock"></i> Submit Lock
</button>

</form>

</div>

<!-- LIST -->
<div id="lockListSection" class="hidden">

<div style="text-align:center;margin-bottom:10px">
<span class="status-badge">MY LOCK LIST</span>
</div>

<div class="table-scroll">
<table>
<thead>
<tr>
<th>ACC</th>
<th>BRANCH</th>
<th>AMOUNT</th>
<th>DATE</th>
<th>REMARK</th>
</tr>
</thead>
<tbody id="lockTable"></tbody>
</table>
</div>

<div class="pagination-bar">
<button onclick="prevPage()" class="page-btn">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()" class="page-btn">Next</button>
</div>

</div>

</div>
</div>

<script src="../lockconfig.js"></script>

<script>

/* ================= INIT ================= */

const api = API_URL;

const user = localStorage.getItem("lock_user");
const role = localStorage.getItem("lock_role");
const token = localStorage.getItem("session_token");

if(!token){
logout();
}

document.getElementById("userInfo").innerHTML =
"User: "+(user || "-");

loadUserSummary();
setInterval(loadUserSummary,120000);

/* ================= TAB SWITCH ================= */

function switchTab(tab){

document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.classList.remove("active");
});

event.target.classList.add("active");

if(tab === "form"){
document.getElementById("formSection").classList.remove("hidden");
document.getElementById("lockListSection").classList.add("hidden");
}
else{
document.getElementById("formSection").classList.add("hidden");
document.getElementById("lockListSection").classList.remove("hidden");
viewMyLocks();
}

}

/* ================= LOAD SUMMARY ================= */

function loadUserSummary(){

var dca = localStorage.getItem("lock_user");

fetch(api+"?action=dashboard&token="+token+"&dca="+dca)
.then(r=>r.json())
.then(data=>{

var total = data.total || 0;
var amount = Number(data.amount || 0).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

document.getElementById("userSummary").innerHTML =
'Today: '+total+' | RM '+amount;

})
.catch(()=>{
document.getElementById("userSummary").innerText = "-";
});

}

/* ================= LOAD BRANCH ================= */

fetch(api+"?action=branches&token="+token)
.then(res=>res.json())
.then(data=>{

var select=document.getElementById("branch");
select.innerHTML='<option value="">SELECT BRANCH</option>';

data.forEach(b=>{
var option=document.createElement("option");
option.value=b.id;
option.text=b.name;
select.appendChild(option);
});

});

/* ================= AUTO DCA ================= */

document.getElementById("dca_id").value = user || "";

/* ================= DATE ================= */

document.getElementById("promise_date").min =
new Date().toISOString().split("T")[0];

/* ================= FORMAT ================= */

document.getElementById("amount").addEventListener("blur", function(){

let value = this.value.replace(/,/g,'');

if(value==="") return;

let num = parseFloat(value);

if(!isNaN(num)){
this.value = num.toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});
}

});

/* ================= SUBMIT ================= */

document.getElementById("lockForm").addEventListener("submit",e=>{

e.preventDefault();

document.getElementById("overlay").style.display="flex";

var formData=new FormData();

formData.append("acc_no",document.getElementById("acc_no").value);
formData.append("branch_id",document.getElementById("branch").value);
formData.append("amount",document.getElementById("amount").value);
formData.append("payment_category",document.getElementById("payment_category").value);
formData.append("promise_date",document.getElementById("promise_date").value);
formData.append("dca_id",document.getElementById("dca_id").value);
formData.append("remarks",document.getElementById("remarks").value);
formData.append("token",token);
formData.append("user",user);

fetch(api,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{

document.getElementById("overlay").style.display="none";

if(data==="UNAUTHORIZED"){
logout();
return;
}

alert("Lock Created ✅");

document.getElementById("lockForm").reset();
loadUserSummary();

});

});

/* ================= LOGOUT ================= */

function logout(){
localStorage.clear();
window.location="../lockcheck-login/";
}

/* ================= LIST ================= */

let fullData = [];
let filteredData = [];
let currentPage = 1;
const pageSize = 5;

async function viewMyLocks(){

const res = await fetch(api+"?action=mylocks&token="+token);
const data = await res.json();

fullData = data.sort((a,b)=> new Date(b.created) - new Date(a.created));
filteredData = fullData;
currentPage = 1;

renderTable();

}

function renderTable(){

let start = (currentPage-1)*pageSize;
let end = start + pageSize;

let pageData = filteredData.slice(start,end);

let html = "";

pageData.forEach(d=>{

let amount = "RM " + Number(d.amount || 0).toLocaleString("en-MY",{
minimumFractionDigits:2,
maximumFractionDigits:2
});

html += `
<tr>
<td>${d.acc_no}</td>
<td>${d.branch}</td>
<td>${amount}</td>
<td>${formatDate(d.promise)}</td>
<td>${d.remarks || "-"}</td>
</tr>
`;

});

document.getElementById("lockTable").innerHTML = html;

let totalPage = Math.ceil(filteredData.length / pageSize) || 1;

document.getElementById("pageInfo").innerText =
`Page ${currentPage} / ${totalPage}`;

}

/* ================= PAGINATION ================= */

function nextPage(){
if(currentPage * pageSize < filteredData.length){
currentPage++;
renderTable();
}
}

function prevPage(){
if(currentPage > 1){
currentPage--;
renderTable();
}
}

/* ================= DATE FORMAT ================= */

function formatDate(dateStr){

let d = new Date(dateStr);

if(!isNaN(d)){
let day = ("0"+d.getDate()).slice(-2);
let monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let month = monthNames[d.getMonth()];
let year = d.getFullYear();
return day+" "+month+" "+year;
}

return dateStr;

}

</script>

</body>
</html>
