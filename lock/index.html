<!DOCTYPE html>
<html>

<head>

<title>Lock System Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{box-sizing:border-box;}

html{
font-size:clamp(14px,1.1vw,16px);
}

body{
font-family:Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:20px 15px;
}

/* CONTAINER */

.container{
width:100%;
max-width:650px;
margin:auto;
background:white;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
overflow:hidden;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#007bff,#0047ab);
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
letter-spacing:.5px;
}

.form-body{
padding:25px;
}

label{
font-size:13px;
font-weight:bold;
color:#555;
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:13px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
transition:.2s;
text-transform:uppercase;
}

input:focus,
select:focus,
textarea:focus{
border-color:#007bff;
box-shadow:0 0 0 3px rgba(0,123,255,0.15);
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:linear-gradient(135deg,#007bff,#0056b3);
color:white;
font-weight:600;
}

.error{
color:red;
font-size:13px;
margin-bottom:10px;
display:none;
}

#remarkCounter{
font-size:12px;
color:#666;
text-align:right;
margin-top:-5px;
margin-bottom:10px;
}

.success-card{
margin-top:25px;
padding:25px;
border-radius:10px;
background:white;
border:1px solid #e6e6e6;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
text-align:center;
}

.amount{
font-size:26px;
font-weight:800;
color:#dc3545;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<i class="fa fa-lock"></i> Lock System Portal
</div>

<div class="form-body">

<div id="formSection">

<form id="lockForm" autocomplete="off">

<label>Account No</label>
<input type="text" id="acc_no">
<div class="error" id="err_acc">Account No required</div>

<label>Branch</label>
<select id="branch"></select>
<div class="error" id="err_branch">Please select branch</div>

<label>Lock Amount</label>
<input type="text" id="amount">
<div class="error" id="err_amount">Amount required</div>

<label>Payment Category</label>
<select id="payment_category">
<option value="">SELECT PAYMENT CATEGORY</option>
<option>PARTIAL PAYMENT</option>
<option>FULL PAYMENT</option>
<option>UNDER DISCOUNT</option>
</select>
<div class="error" id="err_category">Payment category required</div>

<label>Promise Date</label>
<input type="date" id="promise_date">
<div class="error" id="err_date">Promise date required</div>

<label>DCA ID</label>
<input type="text" id="dca_id">
<div class="error" id="err_dca">DCA ID required</div>

<label>Remarks</label>
<textarea id="remarks" maxlength="100"></textarea>

<div id="remarkCounter">0 / 100</div>
<div class="error" id="err_remarks">Remarks required</div>

<button type="submit">
<i class="fa-solid fa-lock"></i> Submit Lock
</button>

</form>

</div>

<div id="result"></div>

</div>
</div>

<script>

const api="https://script.google.com/macros/s/AKfycbz8UqMjTBYaJ_o-1qOCKgOm3FasL1P1MA_n4wSeBRGc67LRneHX1elXjYiybZAvqnNy/exec";

const loggedUser = localStorage.getItem("user");

if(loggedUser){
document.getElementById("dca_id").value = loggedUser;
document.getElementById("dca_id").readOnly = true;
}

/* LOAD BRANCH */

fetch(api+"?action=branches")
.then(res=>res.json())
.then(data=>{

var select=document.getElementById("branch");
select.innerHTML='<option value="">SELECT BRANCH</option>';

data.forEach(b=>{
var option=document.createElement("option");
option.value=b.id;
option.text=b.name;
select.appendChild(option);
});

});

document.getElementById("promise_date").min =
new Date().toISOString().split("T")[0];

/* REMARK COUNTER */

const remarkBox=document.getElementById("remarks");
const remarkCounter=document.getElementById("remarkCounter");

remarkBox.addEventListener("input",function(){

if(this.value.length>100){
this.value=this.value.substring(0,100);
}

remarkCounter.textContent=this.value.length+" / 100";

});

/* FORM SUBMIT */

document.getElementById("lockForm").addEventListener("submit",e=>{

e.preventDefault();

var acc=document.getElementById("acc_no");
var branch=document.getElementById("branch");
var amount=document.getElementById("amount");
var category=document.getElementById("payment_category");
var date=document.getElementById("promise_date");
var dca=document.getElementById("dca_id");
var remarks=document.getElementById("remarks");

if(!acc.value){showError(acc,"err_acc");return;}
if(!branch.value){showError(branch,"err_branch");return;}
if(!amount.value){showError(amount,"err_amount");return;}
if(!category.value){showError(category,"err_category");return;}
if(!date.value){showError(date,"err_date");return;}
if(!dca.value){showError(dca,"err_dca");return;}
if(!remarks.value){showError(remarks,"err_remarks");return;}

var formData=new FormData();

formData.append("acc_no",acc.value);
formData.append("branch_id",branch.value);
formData.append("branch_name",branch.selectedOptions[0].text);
formData.append("amount",amount.value);
formData.append("payment_category",category.value);
formData.append("promise_date",date.value);
formData.append("dca_id",dca.value);
formData.append("remarks",remarks.value);

fetch(api,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{

if(data=="ACCOUNT_ALREADY_LOCKED"){

document.getElementById("result").innerHTML=
"<div class='success-card' style='border-left:6px solid red'><b>ACCOUNT ALREADY LOCKED</b></div>";

}
else{

document.getElementById("formSection").style.display="none";

document.getElementById("result").innerHTML=
"<div class='success-card'><b>LOCK CREATED</b></div>";

}

});

});

function showError(input,errorId){

input.classList.add("shake");
document.getElementById(errorId).style.display="block";

setTimeout(()=>{
input.classList.remove("shake");
},300);

}

</script>

</body>
</html>
