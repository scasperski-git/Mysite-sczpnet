<!DOCTYPE html>
<html>

<head>
<title>DCA Lock Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>DCA Lock Payment</h2>

<form id="lockForm">

Account No
<input type="text" name="acc_no" required>

Branch
<select id="branch" name="branch_id"></select>

Lock Amount
<input type="number" name="amount" required>

Promise Date
<input type="date" name="promise_date" required>

DCA ID
<input type="text" name="dca_id" required>

Remarks
<textarea name="remarks" rows="3" placeholder="Enter remarks"></textarea>

<button type="submit">Submit Lock</button>

</form>

<p id="result"></p>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwJ922NCBbRnMOcc3Yz2yJotxM5TVNTWc7u_zpL8lRsTbIc4T2rkwRs_DaaeM49Vazm/exec";

fetch(api+"?action=branches")
.then(res=>res.json())
.then(data=>{

var select=document.getElementById("branch");

data.forEach(b=>{

var option=document.createElement("option");
option.value=b.id;
option.text=b.name;

select.appendChild(option);

});

});

document.getElementById("lockForm").addEventListener("submit",e=>{

e.preventDefault();

var formData=new FormData(e.target);

var branchName=document.getElementById("branch").selectedOptions[0].text;
formData.append("branch_name",branchName);

fetch(api,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{

if(data=="ACCOUNT_ALREADY_LOCKED"){
document.getElementById("result").innerHTML="Account already locked";
}
else{
document.getElementById("result").innerHTML="Lock created successfully";
document.getElementById("lockForm").reset();
}

});

});

</script>

</body>
</html>
