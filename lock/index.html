<!DOCTYPE html>
<html>

<head>

<title>DCA Lock Payment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;}

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.12);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
text-transform:uppercase;
}

textarea{
text-transform:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
background:#007bff;
color:white;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
font-size:13px;
margin-top:-8px;
margin-bottom:10px;
display:none;
}

.shake{
animation:shake 0.3s;
border-color:red;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.loading{
margin-top:20px;
text-align:center;
font-weight:bold;
}

.spinner{
margin:auto;
margin-top:10px;
width:30px;
height:30px;
border:4px solid #ccc;
border-top:4px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.success-card{
margin-top:20px;
padding:20px;
border-radius:8px;
background:#f8f9fa;
border-left:6px solid #28a745;
}

</style>

</head>

<body>

<div class="container">

<h2>DCA Lock Payment</h2>

<div id="formSection">

<form id="lockForm">

Account No
<input type="text" id="acc_no" name="acc_no">
<div class="error" id="err_acc">Account No required</div>

Branch
<select id="branch" name="branch_id">
<option value="">SELECT BRANCH</option>
</select>
<div class="error" id="err_branch">Please select branch</div>

Lock Amount
<input type="number" id="amount" name="amount">
<div class="error" id="err_amount">Amount required</div>

Promise Date
<input type="date" id="promise_date" name="promise_date">
<div class="error" id="err_date">Promise date required</div>

DCA ID
<input type="text" id="dca_id" name="dca_id">
<div class="error" id="err_dca">DCA ID required</div>

Remarks
<textarea name="remarks" maxlength="100"></textarea>

<button id="submitBtn" type="submit">Submit Lock</button>

</form>

</div>

<div id="result"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbwUPcWT10WoDDYE5z2Dcfv4bDtXY2nNF1tL2OL8TMKaYAwxPwHeFxQZtZJI3xgAi-lT/exec";

/* load branch */

fetch(api+"?action=branches")
.then(res=>res.json())
.then(data=>{

var select=document.getElementById("branch");

data.forEach(b=>{
var option=document.createElement("option");
option.value=b.id;
option.text=b.name;
select.appendChild(option);
});

});

/* uppercase input */

document.querySelectorAll("input[type=text]").forEach(el=>{
el.addEventListener("input",()=>{
el.value=el.value.toUpperCase();
});
});

/* validation */

function showError(input,errorId){

input.classList.add("shake");
document.getElementById(errorId).style.display="block";

setTimeout(()=>{
input.classList.remove("shake");
},300);

}

/* submit */

document.getElementById("lockForm").addEventListener("submit",e=>{

e.preventDefault();

document.querySelectorAll(".error").forEach(e=>e.style.display="none");

var acc=document.getElementById("acc_no");
var branch=document.getElementById("branch");
var amount=document.getElementById("amount");
var date=document.getElementById("promise_date");
var dca=document.getElementById("dca_id");

if(!acc.value){
showError(acc,"err_acc");
return;
}

if(!branch.value){
showError(branch,"err_branch");
return;
}

if(!amount.value){
showError(amount,"err_amount");
return;
}

if(!date.value){
showError(date,"err_date");
return;
}

if(!dca.value){
showError(dca,"err_dca");
return;
}

/* processing */

document.getElementById("submitBtn").disabled=true;

document.getElementById("result").innerHTML=
"<div class='loading'>Processing Lock<div class='spinner'></div></div>";

var formData=new FormData(e.target);

var branchName=branch.selectedOptions[0].text;
formData.append("branch_name",branchName);

fetch(api,{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{

document.getElementById("submitBtn").disabled=false;

if(data=="ACCOUNT_ALREADY_LOCKED"){

document.getElementById("result").innerHTML=
"<div class='success-card' style='border-left:6px solid red'>"+
"<b>ACCOUNT ALREADY LOCKED</b>"+
"</div>";

}
else{

showSuccess(formData);

}

});

});

/* success page */

function showSuccess(formData){

var acc=formData.get("acc_no");
var branch=document.getElementById("branch").selectedOptions[0].text;
var amount="RM "+Number(formData.get("amount")).toLocaleString();
var promise=formData.get("promise_date");
var remarks=formData.get("remarks")||"-";

document.getElementById("formSection").style.display="none";

document.getElementById("result").innerHTML=

"<div class='success-card'>"+
"<h3>LOCK CREATED</h3><br>"+

"<b>ACCOUNT</b><br>"+acc+"<br><br>"+

"<b>BRANCH</b><br>"+branch+"<br><br>"+

"<b>AMOUNT</b><br>"+amount+"<br><br>"+

"<b>PROMISE DATE</b><br>"+promise+"<br><br>"+

"<b>REMARKS</b><br>"+remarks+

"</div>"+

"<button onclick='location.reload()'>New Lock</button>";

}

</script>

</body>
</html>
