}

input{
width:90px;
border:none;
text-align:center;
}

h2{
margin-top:40px;

</style>

</head>

<body>

<h1>Batch 1</h1>
Start : 8/12/26 – 7/4/26

<script>

function calcCycle(className,t1,t2,t3){

let inputs=document.querySelectorAll("."+className)

let a1=Number(inputs[0].value)||0
let a2=Number(inputs[1].value)||0
let a3=Number(inputs[2].value)||0
let b1=Number(inputs[3].value)||0
let b2=Number(inputs[4].value)||0
let b3=Number(inputs[5].value)||0

document.getElementById(t1).innerHTML=a1+b1
document.getElementById(t2).innerHTML=a2+b2
document.getElementById(t3).innerHTML=a3+b3

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",()=>{

calcCycle("c1","c1t1","c1t2","c1t3")
calcCycle("c2","c2t1","c2t2","c2t3")
calcCycle("c3","c3t1","c3t2","c3t3")
calcCycle("c4","c4t1","c4t2","c4t3")

})
})

</script>
