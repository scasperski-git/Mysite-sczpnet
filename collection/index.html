<!DOCTYPE html>
<html>
<head>

<title>Collection Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

table{
border-collapse:collapse;
margin-bottom:40px;
background:white;
}

td,th{
border:1px solid #999;
padding:8px;
text-align:center;
min-width:90px;
}

th{
background:#e9ecef;
}

input{
width:80px;
border:none;
text-align:center;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h1>Collection Dashboard</h1>

<div id="tables"></div>

<button onclick="save()">SAVE</button>

<script>

const api="YOUR_SCRIPT_URL"

let batches=[]

async function loadBatches(){

let res=await fetch(api)
batches=await res.json()

createTables()

}

function createTables(){

let html=""

for(let c=1;c<=4;c++){

html+=`<h2>Cycle ${c}</h2>`

html+=`<table>
<tr>
<th>Batch</th>
<th>7hb</th>
<th>20hb</th>
<th>30hb</th>
</tr>`

batches.forEach(b=>{

let name=b[0]

html+=`<tr>
<td>${name}</td>
<td><input data-cycle="${c}" data-batch="${name}" data-date="7"></td>
<td><input data-cycle="${c}" data-batch="${name}" data-date="20"></td>
<td><input data-cycle="${c}" data-batch="${name}" data-date="30"></td>
</tr>`

})

html+="</table>"

}

document.getElementById("tables").innerHTML=html

}

function save(){

let rows=[]

document.querySelectorAll("input").forEach(i=>{

if(i.value!=""){

rows.push({

cycle:i.dataset.cycle,
batch:i.dataset.batch,
date:i.dataset.date,
amount:i.value

})

}

})

fetch(api,{

method:"POST",
body:JSON.stringify(rows)

})

alert("Saved")

}

loadBatches()

</script>

</body>
</html>
