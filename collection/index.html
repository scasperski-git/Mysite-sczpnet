<!DOCTYPE html>
<html>
<head>

<title>Collection Dashboard</title>

<style>

body{
font-family:Arial;
margin:40px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #444;
padding:8px;
text-align:center;
}

input{
width:80px;
}

select{
padding:5px;
}

button{
padding:10px 20px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>Collection Update Portal</h2>

<label>DCA Name:</label>

<select id="dca">
<option>abc debt</option>
<option>def debt</option>
</select>

<h3>Cycle 1</h3>

<table>

<tr>
<th>Batch</th>
<th>20/2</th>
<th>28/2</th>
<th>7/3</th>
<th>Total</th>
</tr>

<tr>

<td>batch 9a</td>

<td><input type="number" class="amt"></td>
<td><input type="number" class="amt"></td>
<td><input type="number" class="amt"></td>

<td class="total">0</td>

</tr>

<tr>

<td>batch 9a-tcs</td>

<td><input type="number" class="amt"></td>
<td><input type="number" class="amt"></td>
<td><input type="number" class="amt"></td>

<td class="total">0</td>

</tr>

<tr>

<td>batch 9a-coop</td>

<td><input type="number" class="amt"></td>
<td><input type="number" class="amt"></td>
<td><input type="number" class="amt"></td>

<td class="total">0</td>

</tr>

</table>

<button onclick="submitData()">Submit</button>

<script>

let inputs=document.querySelectorAll(".amt")

inputs.forEach(i=>{
i.addEventListener("input",calc)
})

function calc(){

let rows=document.querySelectorAll("table tr")

rows.forEach((row,i)=>{

if(i==0)return

let cells=row.querySelectorAll("input")

let total=0

cells.forEach(c=>{
total+=Number(c.value)
})

row.querySelector(".total").innerText=total

})

}

function submitData(){

alert("Collection submitted!")

}

</script>

</body>

</html>
